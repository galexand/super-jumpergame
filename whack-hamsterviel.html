<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Whack Hämsterviel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    position: fixed;
    cursor: default;
  }
  #game { display: block; width: 100%; height: 100%; }
  #homeLink {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font: 600 14px -apple-system, sans-serif;
    color: #fff;
    text-decoration: none;
    background: rgba(0,0,0,0.35);
    padding: 5px 12px;
    border-radius: 14px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<a id="homeLink" href="index.html">← Games</a>

<script>
'use strict';

// ============ I18N ============
let LANG = 'en';
try { LANG = localStorage.getItem('ohanaLang') === 'ro' ? 'ro' : 'en'; } catch (e) {}
const T = {
  en: {
    titleLine1: 'WHACK',
    titleLine2: 'HÄMSTERVIEL! 🔨',
    howTo: 'Whack him with the hammer when he pops out of his burrow!',
    dontHit: 'But do NOT hit his friends: Stitch, Lilo or Angel! 💙',
    tapToStart: 'Tap the screen to start!',
    record: '🏆 Best: ',
    timeUp: "Time's up!",
    scoreLabel: 'Score: ',
    newRecord: '🎉 New record!',
    tapAgain: 'Tap to play again',
    ohanaCheer: '🌺 Ohana means nobody got hurt! +50',
    goldenLabel: 'GOLDEN!',
    freezeLabel: 'FREEZE!',
    ouch: 'OUCH -5',
    combo: 'COMBO x',
  },
  ro: {
    titleLine1: 'BATE-L PE',
    titleLine2: 'HÄMSTERVIEL! 🔨',
    howTo: 'Pocnește-l cu ciocanul când iese din vizuină!',
    dontHit: 'Dar NU lovi prietenii: Stitch, Lilo sau Angel! 💙',
    tapToStart: 'Atinge ecranul ca să începi!',
    record: '🏆 Record: ',
    timeUp: 'Timpul a expirat!',
    scoreLabel: 'Scor: ',
    newRecord: '🎉 Record nou!',
    tapAgain: 'Atinge ca să joci din nou',
    ohanaCheer: '🌺 Ohana înseamnă că nimeni nu a pățit nimic! +50',
    goldenLabel: 'AURIU!',
    freezeLabel: 'ÎNGHEȚ!',
    ouch: 'AU -5',
    combo: 'COMBO x',
  },
};
function tr(key) { return T[LANG][key]; }

// ============ SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutHoles();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// ============ SOUND ============
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  type = type || 'square'; vol = vol || 0.07; slide = slide || 0;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sfx = {
  pop()   { beep(520, 0.09, 'square', 0.05, 220); },
  bonk()  { beep(180, 0.14, 'square', 0.09, -110); setTimeout(() => beep(1000, 0.1, 'square', 0.05), 40); },
  ouch()  { beep(300, 0.3, 'sawtooth', 0.08, -170); },
  tick()  { beep(760, 0.05, 'square', 0.04); },
  go()    { beep(880, 0.35, 'square', 0.09); },
  over()  { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'square', 0.07), i * 130)); },
  golden() { [660, 880, 1320].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'triangle', 0.07), i * 60)); },
  freeze() { beep(1400, 0.25, 'sine', 0.05, -600); },
  streak() { [784, 988, 1175].forEach((f, i) => setTimeout(() => beep(f, 0.16, 'triangle', 0.08), i * 70)); },
};

// ============ STATE ============
const GAME_TIME = 45; // seconds
const RISE = 0.85;    // how far a critter lifts out of its burrow (× hole radius)
function critterY(h) { return h.cy - h.occ.up * h.r * RISE; }
const state = { mode: 'title', score: 0, best: 0, timeLeft: GAME_TIME, t: 0, combo: 0, comboT: 0,
  freezeT: 0, friendsHit: 0, overInputLockT: 0, newBest: false, ohanaBonus: false };
let holes = [];       // {cx, cy, r}
let pops = [];        // bonk stars / effects
let hand = null;      // { x, y, t, hit } Hammerface hammer-head slam

try { state.best = parseInt(localStorage.getItem('whackHamBest') || '0', 10) || 0; } catch (e) { state.best = 0; }

function layoutHoles() {
  holes = [];
  const cols = 3, rows = 3;
  const top = H * 0.24, bot = H * 0.97;
  const left = W * 0.06, right = W * 0.94;
  const cw = (right - left) / cols, ch = (bot - top) / rows;
  const r = Math.min(cw, ch) * 0.34;
  for (let row = 0; row < rows; row++) {
    for (let c = 0; c < cols; c++) {
      holes.push({
        cx: left + (c + 0.5) * cw,
        cy: top + (row + 0.62) * ch,
        r,
        occ: null,       // occupant: { type, up, life, state }
      });
    }
  }
}

function startGame() {
  state.mode = 'play';
  state.score = 0;
  state.timeLeft = GAME_TIME;
  state.t = 0;
  state.combo = 0;
  state.comboT = 0;
  state.freezeT = 0;
  state.friendsHit = 0;
  state.newBest = false;
  state.ohanaBonus = false;
  pops = [];
  hand = null;
  holes.forEach(h => h.occ = null);
  state.spawnT = 30;
  sfx.go();
}

function endGame() {
  state.mode = 'over';
  state.overInputLockT = 60; // ~1s lockout to prevent accidental instant restart
  if (state.friendsHit === 0) {
    state.score += 50;
    state.ohanaBonus = true;
  }
  if (state.score > state.best) {
    state.best = state.score;
    try { localStorage.setItem('whackHamBest', String(state.best)); } catch (e) {}
    state.newBest = true;
  } else state.newBest = false;
  sfx.over();
}

// difficulty ramps up as time runs down
function difficulty() {
  return 1 - state.timeLeft / GAME_TIME; // 0 -> 1
}

function spawnCritter() {
  const empty = holes.filter(h => !h.occ);
  if (!empty.length) return;
  const h = empty[Math.floor(Math.random() * empty.length)];
  const d = difficulty();
  // most are Hämsterviel; some are friends you must NOT hit (more later on);
  // rarely a freeze flower pops up too
  const friendChance = 0.16 + d * 0.16;
  const flowerChance = 0.07;
  let type = 'H';
  const roll = Math.random();
  if (roll < flowerChance) {
    type = 'F';
  } else if (roll < flowerChance + friendChance) {
    type = ['S', 'L', 'A'][Math.floor(Math.random() * 3)];
  } else if (Math.random() < 0.10) {
    type = 'G'; // golden Hämsterviel — rare, worth triple, up less long
  }
  let upTime = 95 - d * 45 + Math.random() * 25; // frames fully up
  if (type === 'G') upTime *= 0.6;
  h.occ = { type, up: 0, state: 'rising', life: upTime, wob: Math.random() * 6 };
}

// ============ INPUT ============
function whackAt(px, py) {
  let hitSomething = false;
  for (const h of holes) {
    if (!h.occ || h.occ.state === 'bonked' || h.occ.state === 'falling') continue;
    if (h.occ.up < 0.35) continue;
    const dx = px - h.cx, dy = py - critterY(h);
    if (dx * dx + dy * dy < (h.r * 1.15) * (h.r * 1.15)) {
      hitSomething = true;
      if (h.occ.type === 'H' || h.occ.type === 'G') {
        // bonk!
        state.combo++;
        state.comboT = 60;
        const golden = h.occ.type === 'G';
        let pts = 10 + Math.min(20, (state.combo - 1) * 2);
        if (golden) pts *= 3;
        state.score += pts;
        h.occ.state = 'bonked';
        h.occ.life = 18;
        sfx.bonk();
        addPop(h.cx, critterY(h), '+' + pts, golden ? '#ffd700' : '#ffe066', 'star');
        if (golden) addPop(h.cx, critterY(h) - 26, tr('goldenLabel'), '#ffd700', 'text');
        // streak rewards at combo 5 and 10
        if (state.combo === 5 || state.combo === 10) {
          const bonus = state.combo === 5 ? 25 : 60;
          state.score += bonus;
          sfx.streak();
          addSparkle();
          addPop(h.cx, critterY(h) - 50, '+' + bonus, '#7fe8a0', 'text');
        }
      } else if (h.occ.type === 'F') {
        // freeze flower — pauses the countdown briefly, no penalty
        state.freezeT = 180; // 3 seconds at 60fps
        h.occ.state = 'bonked';
        h.occ.life = 18;
        sfx.freeze();
        addPop(h.cx, critterY(h), tr('freezeLabel'), '#8fe3ff', 'text');
      } else {
        // hit a friend — oops!
        state.score = Math.max(0, state.score - 5);
        state.timeLeft = Math.max(0, state.timeLeft - 2);
        state.combo = 0;
        state.friendsHit++;
        h.occ.state = 'falling';
        sfx.ouch();
        addPop(h.cx, critterY(h), tr('ouch'), '#ff6b6b', 'text');
      }
      break; // one whack, one target
    }
  }
  if (!hitSomething) state.combo = 0;
  hand = { x: px, y: py, t: 0, hit: hitSomething };
}

function addSparkle() {
  pops.push({ x: W / 2, y: H / 2, text: '', color: '#fff', kind: 'sparkle', t: 0, life: 40,
    sparks: Array.from({ length: 18 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      a: Math.random() * Math.PI * 2,
    })) });
}

function addPop(x, y, text, color, kind) {
  pops.push({ x, y, text, color, kind, t: 0, life: kind === 'star' ? 30 : (kind === 'dirt' ? 20 : 44),
    stars: kind === 'star' ? Array.from({ length: 6 }, () => ({
      a: Math.random() * Math.PI * 2, v: 2 + Math.random() * 3,
    })) : null,
    dirt: kind === 'dirt' ? Array.from({ length: 7 }, () => ({
      a: Math.random() * Math.PI * 2, v: 1.5 + Math.random() * 2.5,
    })) : null });
}

function tapAt(px, py) {
  initAudio();
  if (state.mode === 'title') {
    startGame();
  } else if (state.mode === 'over') {
    if (state.overInputLockT > 0) return; // brief lockout to avoid accidental instant restart
    startGame();
  } else if (state.mode === 'play') {
    whackAt(px, py);
  }
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.changedTouches.length) tapAt(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });
canvas.addEventListener('mousedown', e => tapAt(e.clientX, e.clientY));
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    initAudio();
    if (state.mode === 'title' || (state.mode === 'over' && state.overInputLockT <= 0)) startGame();
    e.preventDefault();
  }
});

// ============ UPDATE ============
function update() {
  state.t++;
  // effects run always
  for (let i = pops.length - 1; i >= 0; i--) {
    const p = pops[i];
    p.t++;
    if (p.stars) p.stars.forEach(s => { s.a += 0.02; });
    if (p.t >= p.life) pops.splice(i, 1);
  }
  if (hand) { hand.t++; if (hand.t > 16) hand = null; }

  if (state.mode === 'over') {
    if (state.overInputLockT > 0) state.overInputLockT--;
    return;
  }
  if (state.mode !== 'play') return;

  // countdown — paused while a freeze flower effect is active
  if (state.freezeT > 0) {
    state.freezeT--;
  } else if (state.t % 60 === 0 && state.timeLeft > 0) {
    state.timeLeft--;
    if (state.timeLeft <= 5 && state.timeLeft > 0) sfx.tick();
  }
  // game over fires the moment timeLeft hits 0, however it got there
  // (per-second countdown OR a friend-hit penalty dropping it straight to 0)
  if (state.timeLeft <= 0) {
    endGame();
    return;
  }
  if (state.comboT > 0) state.comboT--; else state.combo = 0;

  // spawn critters
  const d = difficulty();
  state.spawnT--;
  if (state.spawnT <= 0) {
    spawnCritter();
    state.spawnT = (58 - d * 34) + Math.random() * (30 - d * 18);
  }

  // animate occupants
  for (const h of holes) {
    const o = h.occ;
    if (!o) continue;
    if (o.state === 'rising') {
      o.up += 0.14;
      if (o.up >= 1) {
        o.up = 1; o.state = 'up'; sfx.pop();
        addPop(h.cx, h.cy + h.r * 0.2, '', '#c9a45c', 'dirt');
      }
    } else if (o.state === 'up') {
      o.life--;
      o.wob += 0.15;
      if (o.life <= 0) o.state = 'falling';
    } else if (o.state === 'falling') {
      o.up -= 0.16;
      if (o.up <= 0) h.occ = null;
    } else if (o.state === 'bonked') {
      o.life--;
      o.up = Math.max(0, o.up - 0.05);
      if (o.life <= 0) h.occ = null;
    }
  }
}

// ============ DRAW ============
function draw() {
  const t = Date.now();
  // sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3f9bd9');
  grad.addColorStop(0.4, '#8fd0ee');
  grad.addColorStop(0.6, '#ffe9c4');
  grad.addColorStop(1, '#e6c98f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // sun + clouds
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath();
  ctx.arc(W * 0.85, H * 0.12, 24, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 4; i++) {
    const cx = (i * 260 + 80 + Math.sin(t / 3000 + i) * 20) % (W + 200) - 100;
    const cy = H * 0.09 + (i % 2) * 34;
    ctx.beginPath();
    ctx.arc(cx, cy, 16, 0, Math.PI * 2);
    ctx.arc(cx + 20, cy - 7, 20, 0, Math.PI * 2);
    ctx.arc(cx + 42, cy, 15, 0, Math.PI * 2);
    ctx.fill();
  }
  // sandy field
  ctx.fillStyle = '#e8c98a';
  ctx.fillRect(0, H * 0.2, W, H * 0.8);
  ctx.fillStyle = '#d9b673';
  ctx.fillRect(0, H * 0.2, W, 6);
  // little grass tufts
  ctx.strokeStyle = '#7fc25c';
  ctx.lineWidth = 3;
  for (let i = 0; i < 22; i++) {
    const gx = (i * 97 % W), gy = H * 0.24 + (i * 53 % (H * 0.7));
    ctx.beginPath();
    ctx.moveTo(gx, gy); ctx.lineTo(gx - 4, gy - 8);
    ctx.moveTo(gx, gy); ctx.lineTo(gx, gy - 10);
    ctx.moveTo(gx, gy); ctx.lineTo(gx + 4, gy - 8);
    ctx.stroke();
  }

  // holes (back), critters, holes (front rim)
  for (const h of holes) {
    // hole opening
    ctx.fillStyle = '#6b4a28';
    ctx.beginPath();
    ctx.ellipse(h.cx, h.cy, h.r, h.r * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4d3419';
    ctx.beginPath();
    ctx.ellipse(h.cx, h.cy + 2, h.r * 0.86, h.r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // critter, clipped so its lower half hides in the hole
    if (h.occ && h.occ.up > 0.01) {
      const o = h.occ;
      const cy = critterY(h);
      ctx.save();
      ctx.beginPath();
      ctx.rect(h.cx - h.r * 1.6, 0, h.r * 3.2, h.cy + h.r * 0.2);
      ctx.clip();
      const wob = Math.sin(o.wob) * 3 * (o.state === 'up' ? 1 : 0);
      const wave = o.state === 'up' ? Math.sin(o.wob * 0.8) : 0;
      // squash-stretch on rise: wide & short at first, settling tall by the time it's fully up
      const stretch = o.state === 'rising' ? (1 - o.up) : 0;
      const sx = 1 + 0.28 * stretch, sy = 1 - 0.22 * stretch;
      ctx.save();
      ctx.translate(h.cx + wob, cy);
      ctx.scale(sx, sy);
      ctx.translate(-(h.cx + wob), -cy);
      if (o.type === 'H' || o.type === 'G') drawHamster(h.cx + wob, cy, h.r, o.state === 'bonked', o.type === 'G');
      else if (o.type === 'F') drawFlower(h.cx + wob, cy, h.r);
      else if (o.type === 'S') drawStitch(h.cx + wob, cy, h.r, wave);
      else if (o.type === 'L') drawLilo(h.cx + wob, cy, h.r, wave);
      else drawAngel(h.cx + wob, cy, h.r, wave);
      ctx.restore();
      ctx.restore();
    }

    // front rim (mound lip) to sell "coming out of the hole"
    ctx.fillStyle = '#c9a45c';
    ctx.beginPath();
    ctx.ellipse(h.cx, h.cy + h.r * 0.3, h.r * 1.05, h.r * 0.42, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#b8934a';
    ctx.beginPath();
    ctx.ellipse(h.cx, h.cy + h.r * 0.3, h.r * 1.05, h.r * 0.2, 0, 0, Math.PI);
    ctx.fill();
  }

  // pop effects
  for (const p of pops) {
    const a = 1 - p.t / p.life;
    if (p.kind === 'star') {
      ctx.fillStyle = p.color;
      for (const s of p.stars) {
        const d = s.v * p.t;
        drawStar(p.x + Math.cos(s.a) * d, p.y + Math.sin(s.a) * d - p.t, 4 * a + 1);
      }
    } else if (p.kind === 'dirt') {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      for (const d of p.dirt) {
        const dist = d.v * p.t;
        ctx.beginPath();
        ctx.arc(p.x + Math.cos(d.a) * dist, p.y + Math.sin(d.a) * dist * 0.6 - p.t * 0.4, 2.4 * a + 1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      continue;
    } else if (p.kind === 'sparkle') {
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = a;
      for (const s of p.sparks) {
        drawStar(s.x, s.y, (3 + Math.sin(p.t * 0.4 + s.a) * 2) * a);
      }
      ctx.globalAlpha = 1;
      continue;
    }
    if (!p.text) continue;
    ctx.globalAlpha = Math.min(1, a * 1.4);
    ctx.fillStyle = p.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 4;
    ctx.font = 'bold ' + Math.max(18, W * 0.035) + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(p.text, p.x, p.y - 26 - p.t * 0.6);
    ctx.fillText(p.text, p.x, p.y - 26 - p.t * 0.6);
    ctx.globalAlpha = 1;
  }

  // Hammerface slamming his hammer-shaped head down on the tap point
  if (hand) drawHammerface(hand.x, hand.y, hand.t, hand.hit);

  drawHUD();
  drawOverlays();
}

function drawStar(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const rr = i % 2 ? r * 0.45 : r;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const sx = x + Math.cos(a) * rr, sy = y + Math.sin(a) * rr;
    if (i) ctx.lineTo(sx, sy); else ctx.moveTo(sx, sy);
  }
  ctx.closePath();
  ctx.fill();
}

function drawHammerface(x, y, t, hit) {
  // Hammerface (Experiment 033): his hammer-shaped head IS the mallet.
  // He swings in from the upper right, head trailing, and slams face-first
  // onto the tap point, then squashes the hammer block and recovers.
  const MAIN = '#7e96ad', DARK = '#4d6175', LIGHT = '#c3d2de', EYE = '#14181f', PALE = '#f7f4ea';

  // position/rotation: fast slam (0-3), held squash (3-5), slow recovery (5-16)
  let yy, rot, dx;
  if (t <= 3) {
    const p = 1 - t / 3;
    yy = (y + 2) - 44 * p * (2 - p);
    rot = -0.45 * p;
    dx = 16 * p;
  } else if (t < 5) {
    yy = y + 2;
    rot = 0;
    dx = 0;
  } else {
    const p = (t - 5) / 11;
    yy = (y + 2) - 44 * Math.pow(p, 1.6);
    rot = 0.15 * p;
    dx = 0;
  }

  // squash scale for the hammer-head block + teeth only (frames 3-5)
  let bsx = 1, bsy = 1;
  if (t === 3) { bsx = 1.12; bsy = 0.85; }
  else if (t === 4) { bsx = 1.06; bsy = 0.93; }

  ctx.save();
  ctx.translate(x + dx, yy);
  ctx.rotate(rot);

  // 1. body (torso), partly off-screen above, like the old fist
  ctx.fillStyle = MAIN;
  ctx.strokeStyle = DARK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-16, -58, 32, 26, 10);
  ctx.fill();
  ctx.stroke();
  // back-ridge spine triangles
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.moveTo(-9, -58); ctx.lineTo(-3, -58); ctx.lineTo(-6, -63); ctx.closePath();
  ctx.moveTo(1, -58); ctx.lineTo(7, -58); ctx.lineTo(4, -63); ctx.closePath();
  ctx.fill();

  // 2. belly patch
  ctx.fillStyle = LIGHT;
  ctx.beginPath();
  ctx.ellipse(0, -45, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // 3. stubby arms gripping down toward the head
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.translate(19 * side, -46);
    ctx.rotate(0.35 * side);
    ctx.fillStyle = MAIN;
    ctx.strokeStyle = DARK;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-4, 0, 8, 15, 4);
    ctx.fill();
    ctx.stroke();
    // tiny claw tips
    ctx.fillStyle = PALE;
    ctx.beginPath();
    ctx.moveTo(-3.5, 15); ctx.lineTo(-0.5, 15); ctx.lineTo(-2, 19); ctx.closePath();
    ctx.moveTo(0.5, 15); ctx.lineTo(3.5, 15); ctx.lineTo(2, 19); ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // 4. neck (tucks behind the hammer-head block)
  ctx.fillStyle = MAIN;
  ctx.strokeStyle = DARK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-10, -34, 20, 18, 6);
  ctx.fill();
  ctx.stroke();

  // 5-8. hammer-head block, end caps, face, teeth — squashed as a unit
  ctx.save();
  ctx.translate(0, -10);
  ctx.scale(bsx, bsy);
  ctx.translate(0, 10);

  // 5. hammer-head block
  ctx.fillStyle = MAIN;
  ctx.strokeStyle = DARK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-28, -20, 56, 20, 9);
  ctx.fill();
  ctx.stroke();

  // 6. mallet end caps
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.roundRect(-28, -20, 11, 20, { tl: 9, tr: 0, br: 0, bl: 9 });
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(17, -20, 11, 20, { tl: 0, tr: 9, br: 9, bl: 0 });
  ctx.fill();

  // 7. face
  ctx.fillStyle = EYE;
  ctx.beginPath();
  ctx.arc(-7, -13, 2.6, 0, Math.PI * 2);
  ctx.arc(7, -13, 2.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = DARK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-11, -17); ctx.lineTo(-4, -15);
  ctx.moveTo(11, -17); ctx.lineTo(4, -15);
  ctx.stroke();
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.arc(-3, -7, 1.2, 0, Math.PI * 2);
  ctx.arc(3, -7, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 8. teeth on the striking edge
  ctx.fillStyle = PALE;
  ctx.strokeStyle = DARK;
  ctx.lineWidth = 1;
  for (const tx of [-9, 0, 9]) {
    ctx.beginPath();
    ctx.moveTo(tx - 2.5, -4);
    ctx.lineTo(tx + 2.5, -4);
    ctx.lineTo(tx, -1);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  ctx.restore(); // end block squash

  // impact flash on the striking edge (frames 3-5, always)
  if (t >= 3 && t <= 5) {
    ctx.globalAlpha = t === 3 ? 0.75 : (t === 4 ? 0.4 : 0.15);
    ctx.fillStyle = PALE;
    ctx.beginPath();
    ctx.roundRect(-24, -7, 48, 5, 2.5);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore(); // end sprite translate/rotate

  // dust puffs on whiffs only (frames 3-9), anchored to the tap point
  if (!hit && t >= 3 && t <= 9) {
    const dt = t - 3;
    ctx.fillStyle = '#c9a45c';
    ctx.globalAlpha = 0.6 * (1 - dt / 6);
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(x + side * (14 + dt * 1.5), y + 2, 5 - dt * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ---- critters ----
function drawHamster(cx, cy, r, bonked, golden) {
  const s = r / 34;
  const FUR = golden ? '#ffe066' : '#f4f4f6', PINK = golden ? '#ffb347' : '#f3aec6';
  // ears
  ctx.fillStyle = FUR;
  ctx.beginPath();
  ctx.arc(cx - 15 * s, cy - 20 * s, 10 * s, 0, Math.PI * 2);
  ctx.arc(cx + 15 * s, cy - 20 * s, 10 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = PINK;
  ctx.beginPath();
  ctx.arc(cx - 15 * s, cy - 20 * s, 5 * s, 0, Math.PI * 2);
  ctx.arc(cx + 15 * s, cy - 20 * s, 5 * s, 0, Math.PI * 2);
  ctx.fill();
  // head
  ctx.fillStyle = FUR;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 24 * s, 26 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d7d7de';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  if (bonked) {
    // dizzy eyes + bump
    ctx.strokeStyle = '#7a2c20';
    ctx.lineWidth = 2.4 * s;
    for (const ex of [-9, 9]) {
      ctx.beginPath();
      ctx.moveTo(cx + ex * s - 4 * s, cy - 7 * s); ctx.lineTo(cx + ex * s + 4 * s, cy + 1 * s);
      ctx.moveTo(cx + ex * s + 4 * s, cy - 7 * s); ctx.lineTo(cx + ex * s - 4 * s, cy + 1 * s);
      ctx.stroke();
    }
    ctx.fillStyle = '#c9506f';
    ctx.beginPath();
    ctx.arc(cx, cy - 30 * s, 6 * s, 0, Math.PI * 2);
    ctx.fill();
    // open "ow" mouth
    ctx.fillStyle = '#7a2c20';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 12 * s, 5 * s, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // red eyes + glasses look
    ctx.fillStyle = '#d8283c';
    ctx.beginPath();
    ctx.arc(cx - 9 * s, cy - 3 * s, 5.5 * s, 0, Math.PI * 2);
    ctx.arc(cx + 9 * s, cy - 3 * s, 5.5 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a0810';
    ctx.beginPath();
    ctx.arc(cx - 9 * s, cy - 3 * s, 2.4 * s, 0, Math.PI * 2);
    ctx.arc(cx + 9 * s, cy - 3 * s, 2.4 * s, 0, Math.PI * 2);
    ctx.fill();
    // buck teeth
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 5 * s, cy + 8 * s, 4.5 * s, 7 * s);
    ctx.fillRect(cx + 0.5 * s, cy + 8 * s, 4.5 * s, 7 * s);
    ctx.strokeStyle = '#d0d0d0';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx - 5 * s, cy + 8 * s, 4.5 * s, 7 * s);
    // nose
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 5 * s, 3 * s, 2.2 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // angry brows
    ctx.strokeStyle = '#9a9aa5';
    ctx.lineWidth = 2.2 * s;
    ctx.beginPath();
    ctx.moveTo(cx - 16 * s, cy - 11 * s); ctx.lineTo(cx - 4 * s, cy - 6 * s);
    ctx.moveTo(cx + 16 * s, cy - 11 * s); ctx.lineTo(cx + 4 * s, cy - 6 * s);
    ctx.stroke();
  }
}

// friends wave a paw/hand while up, so kids read "don't hit" faster
function drawWaveHand(cx, cy, r, wave, color) {
  const s = r / 34;
  ctx.save();
  ctx.translate(cx + 20 * s, cy - 30 * s);
  ctx.rotate(0.5 + wave * 0.5);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 0, 4 * s, 9 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawFlower(cx, cy, r) {
  const s = r / 34;
  // hibiscus-style freeze flower cue
  ctx.fillStyle = '#3d9e4f';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 16 * s, 6 * s, 20 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  const petals = 5;
  for (let i = 0; i < petals; i++) {
    const a = (i / petals) * Math.PI * 2 - Math.PI / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a);
    ctx.fillStyle = '#ff6f9c';
    ctx.beginPath();
    ctx.ellipse(0, -18 * s, 8 * s, 16 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = '#ffd54d';
  ctx.beginPath();
  ctx.arc(cx, cy, 7 * s, 0, Math.PI * 2);
  ctx.fill();
  // sparkle/snowflake cue: this flower freezes the clock
  ctx.strokeStyle = '#8fe3ff';
  ctx.lineWidth = 2 * s;
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx - 26 * s + Math.cos(a) * 6 * s, cy - 8 * s - 26 * s + Math.sin(a) * 6 * s);
    ctx.lineTo(cx - 26 * s - Math.cos(a) * 6 * s, cy - 8 * s - 26 * s - Math.sin(a) * 6 * s);
    ctx.stroke();
  }
}

function drawStitch(cx, cy, r, wave) {
  wave = wave || 0;
  const s = r / 34;
  const BLUE = '#3d7bc9', BELLY = '#bfe0f4', PINK = '#e88db4';
  for (const sg of [-1, 1]) {
    ctx.save();
    ctx.translate(cx + sg * 17 * s, cy - 16 * s);
    ctx.rotate(sg * 1.1);
    ctx.fillStyle = BLUE;
    ctx.beginPath();
    ctx.ellipse(0, -8 * s, 6 * s, 13 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(0, -7 * s, 3 * s, 8 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 25 * s, 24 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = BELLY;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 6 * s, 14 * s, 12 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#14181f';
  ctx.beginPath();
  ctx.ellipse(cx - 8 * s, cy - 4 * s, 4 * s, 5.5 * s, 0, 0, Math.PI * 2);
  ctx.ellipse(cx + 8 * s, cy - 4 * s, 4 * s, 5.5 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - 9 * s, cy - 6 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.arc(cx + 7 * s, cy - 6 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1b2a45';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 3 * s, 4 * s, 2.6 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#1b2a45';
  ctx.lineWidth = 1.6 * s;
  ctx.beginPath();
  ctx.arc(cx, cy + 5 * s, 6 * s, 0.3, Math.PI - 0.3);
  ctx.stroke();
  drawWaveHand(cx, cy, r, wave, BLUE);
}

function drawLilo(cx, cy, r, wave) {
  wave = wave || 0;
  const s = r / 34;
  const SKIN = '#d9976a', HAIR = '#1c1b22';
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(cx, cy - 2 * s, 26 * s, 26 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 2 * s, 20 * s, 21 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(cx, cy - 12 * s, 22 * s, 12 * s, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // flower
  ctx.fillStyle = '#f7f7fb';
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx + 17 * s + Math.cos(a) * 4 * s, cy - 12 * s + Math.sin(a) * 4 * s, 3 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#ffd54d';
  ctx.beginPath();
  ctx.arc(cx + 17 * s, cy - 12 * s, 2.4 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#26211f';
  ctx.beginPath();
  ctx.arc(cx - 7 * s, cy, 2.4 * s, 0, Math.PI * 2);
  ctx.arc(cx + 7 * s, cy, 2.4 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8a4b32';
  ctx.lineWidth = 2 * s;
  ctx.beginPath();
  ctx.arc(cx, cy + 6 * s, 5 * s, 0.3, Math.PI - 0.3);
  ctx.stroke();
  drawWaveHand(cx, cy, r, wave, SKIN);
}

function drawAngel(cx, cy, r, wave) {
  wave = wave || 0;
  const s = r / 34;
  const PINK = '#ef86b8', BELLY = '#fbd6e7';
  for (const sg of [-1, 1]) {
    ctx.save();
    ctx.translate(cx + sg * 14 * s, cy - 16 * s);
    ctx.rotate(sg * 1.2);
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(0, -8 * s, 6 * s, 13 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = PINK;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 25 * s, 23 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = BELLY;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 6 * s, 13 * s, 11 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#221a20';
  ctx.beginPath();
  ctx.ellipse(cx - 8 * s, cy - 3 * s, 3.4 * s, 4.6 * s, 0, 0, Math.PI * 2);
  ctx.ellipse(cx + 8 * s, cy - 3 * s, 3.4 * s, 4.6 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - 9 * s, cy - 5 * s, 1.2 * s, 0, Math.PI * 2);
  ctx.arc(cx + 7 * s, cy - 5 * s, 1.2 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8c3a63';
  ctx.lineWidth = 1.6 * s;
  ctx.beginPath();
  ctx.arc(cx, cy + 5 * s, 5 * s, 0.3, Math.PI - 0.3);
  ctx.stroke();
  drawWaveHand(cx, cy, r, wave, PINK);
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.3);
  ctx.bezierCurveTo(x - s, y + s * 0.8, x, y + s * 1.1, x, y + s * 1.4);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.8, x + s, y + s * 0.3);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function drawHUD() {
  if (state.mode !== 'play') return;
  const pad = Math.max(14, H * 0.02);
  ctx.textBaseline = 'top';
  ctx.font = 'bold 22px -apple-system, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  // score
  ctx.textAlign = 'left';
  ctx.strokeText('★ ' + state.score, pad, pad);
  ctx.fillText('★ ' + state.score, pad, pad);
  // timer — turns red and pulses at 5s or less
  ctx.textAlign = 'right';
  const warn = state.timeLeft <= 5;
  ctx.fillStyle = warn ? '#ff5555' : '#fff';
  if (warn) {
    const pulse = 1 + 0.14 * Math.abs(Math.sin(Date.now() / 150));
    ctx.save();
    ctx.translate(W - pad, pad);
    ctx.scale(pulse, pulse);
    ctx.strokeText('⏱ ' + state.timeLeft + 's', 0, 0);
    ctx.fillText('⏱ ' + state.timeLeft + 's', 0, 0);
    ctx.restore();
  } else {
    ctx.strokeText('⏱ ' + state.timeLeft + 's', W - pad, pad);
    ctx.fillText('⏱ ' + state.timeLeft + 's', W - pad, pad);
  }
  // combo (below the score, so it never overlaps the ← Games link)
  if (state.combo >= 2) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold ' + Math.max(18, W * 0.036) + 'px -apple-system, sans-serif';
    ctx.strokeText(tr('combo') + state.combo + '!', pad, pad + 30);
    ctx.fillText(tr('combo') + state.combo + '!', pad, pad + 30);
    // combo meter bar (fills up toward the next 5-hit streak milestone)
    const barW = Math.min(180, W * 0.4), barH = 8;
    const barY = pad + 58, barX = pad;
    const fillPct = Math.min(1, (state.combo % 5 === 0 ? 5 : state.combo % 5) / 5);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 4);
    ctx.fill();
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * fillPct, barH, 4);
    ctx.fill();
  }
}

function drawOverlays() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (state.mode === 'title') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + Math.min(46, W * 0.082) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('titleLine1'), W / 2, H * 0.3);
    ctx.fillText(tr('titleLine2'), W / 2, H * 0.4);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('howTo'), W / 2, H * 0.54);
    ctx.font = Math.min(18, W * 0.033) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#dce9f5';
    ctx.fillText(tr('dontHit'), W / 2, H * 0.62);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold ' + Math.min(24, W * 0.045) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('tapToStart'), W / 2, H * 0.74);
    if (state.best > 0) {
      ctx.fillStyle = '#fff';
      ctx.font = '17px -apple-system, sans-serif';
      ctx.fillText(tr('record') + state.best, W / 2, H * 0.82);
    }
  } else if (state.mode === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + Math.min(52, W * 0.09) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('timeUp'), W / 2, H * 0.32);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.min(30, W * 0.056) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('scoreLabel') + state.score, W / 2, H * 0.46);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold ' + Math.min(24, W * 0.045) + 'px -apple-system, sans-serif';
    ctx.fillText(state.newBest ? tr('newRecord') : tr('record') + state.best, W / 2, H * 0.56);
    if (state.ohanaBonus) {
      ctx.fillStyle = '#7fe8a0';
      ctx.font = 'bold ' + Math.min(20, W * 0.038) + 'px -apple-system, sans-serif';
      ctx.fillText(tr('ohanaCheer'), W / 2, H * 0.65);
    }
    ctx.fillStyle = '#fff';
    ctx.font = '18px -apple-system, sans-serif';
    ctx.fillText(tr('tapAgain'), W / 2, H * 0.74);
  }
}

// ============ MAIN LOOP ============
resize();
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(t) {
  requestAnimationFrame(loop);
  // keep layout in sync even if the initial size was 0 (some webviews)
  if (W !== window.innerWidth || H !== window.innerHeight || (holes[0] && holes[0].r === 0)) resize();
  if (!last) last = t;
  acc += Math.min(t - last, 100);
  last = t;
  while (acc >= STEP) { update(); acc -= STEP; }
  draw();
}
requestAnimationFrame(loop);
</script>
