<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ohana Karts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    position: fixed;
  }
  #game { display: block; width: 100%; height: 100%; }
  .btn {
    position: fixed;
    right: max(20px, env(safe-area-inset-right));
    width: 78px; height: 78px;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    border: 3px solid rgba(255,255,255,0.55);
    color: #fff;
    font-size: 32px;
    font-family: -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    touch-action: none;
  }
  .btn:active, .btn.pressed { background: rgba(255,255,255,0.55); }
  .btn.hidden { display: none; }
  #btnUp   { bottom: calc(max(20px, env(safe-area-inset-bottom)) + 92px); }
  #btnDown { bottom: max(20px, env(safe-area-inset-bottom)); }
  #homeLink {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font: 600 14px -apple-system, sans-serif;
    color: #fff;
    text-decoration: none;
    background: rgba(0,0,0,0.35);
    padding: 5px 12px;
    border-radius: 14px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<a id="homeLink" href="index.html">← Games</a>
<div class="btn hidden" id="btnUp">⬆</div>
<div class="btn hidden" id="btnDown">⬇</div>

<script>
'use strict';

// ============ SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, K = 1;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  K = Math.max(0.8, Math.min(1.5, H / 460)); // sprite scale
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// ============ SOUND ============
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  type = type || 'square'; vol = vol || 0.07; slide = slide || 0;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sfx = {
  tick()  { beep(700, 0.06, 'square', 0.05); },
  count() { beep(440, 0.18, 'square', 0.08); },
  go()    { beep(880, 0.4, 'square', 0.09); },
  crash() { beep(160, 0.35, 'sawtooth', 0.1, -100); },
  zap()   { beep(320, 0.14, 'sawtooth', 0.06, -180); },
  thud()  { beep(140, 0.12, 'triangle', 0.08, -60); },
  splat() { beep(240, 0.2, 'triangle', 0.08, -140); },
  boost() { beep(500, 0.3, 'square', 0.07, 600); },
  fix()   { beep(880, 0.08, 'square', 0.05); },
  yell()  { beep(600, 0.2, 'sawtooth', 0.07, -80); },
  win()   { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.22, 'square', 0.08), i * 140)); },
  lose()  { [392, 330, 262].forEach((f, i) => setTimeout(() => beep(f, 0.28, 'triangle', 0.07), i * 170)); },
};

// ============ i18n ============
// NOTE: draw functions pervasively use `t` for animation time, so the translation
// helper is named `tr` (not `t`) to avoid clashing.
let LANG = 'en';
try { LANG = localStorage.getItem('ohanaLang') === 'ro' ? 'ro' : 'en'; } catch (e) {}
const T = {
  en: {
    title: '🏎 OHANA KARTS 🏁',
    selectPrompt: 'Who is racing today? Tap a driver!',
    track: 'TRACK',
    trackNames: ['BEACH', 'ISLAND', 'HOUSE', 'PLANET', 'SPACE'],
    stitch: 'STITCH',
    lilo: 'LILO',
    bestPrefix: 'best: ',
    noTime: 'no time yet',
    hint: '⌨  1 = Stitch · 2 = Lilo · ↑ ↓ pick track · dodge Gantu, Hämsterviel & Reuben!',
    go: 'GO!',
    finish: 'FINISH',
    goldenMedal: '🏅 GOLDEN MEDAL!',
    firstPlace: '🏆 1st PLACE!',
    secondPlace: '🥈 2nd place…',
    time: 'Time',
    newBest: '🎉 New best time!',
    best: 'Best',
    councilwomanHonor: 'The Grand Councilwoman honors you! 🌺',
    ohanaPride: 'Ohana pride! 🌺',
    rematch: 'So close — rematch?',
    tapRace: 'Tap to race again',
    medalEarned: '🏅 Golden Medal earned!',
    tapSkip: 'Tap to skip',
    place1: '🥇 1st',
    place2: '🥈 2nd',
    taunts: ['Later, cuz!', 'Catch me!', 'Ohana speed!', 'Too slow, cuz!'],
    home: '← Games',
  },
  ro: {
    title: '🏎 OHANA KARTS 🏁',
    selectPrompt: 'Cine concurează astăzi? Atinge un pilot!',
    track: 'TRASEU',
    trackNames: ['PLAJĂ', 'INSULĂ', 'CASĂ', 'PLANETĂ', 'SPAȚIU'],
    stitch: 'STITCH',
    lilo: 'LILO',
    bestPrefix: 'record: ',
    noTime: 'niciun timp încă',
    hint: '⌨  1 = Stitch · 2 = Lilo · ↑ ↓ alege traseul · evită-i pe Gantu, Hämsterviel și Reuben!',
    go: 'START!',
    finish: 'SOSIRE',
    goldenMedal: '🏅 MEDALIE DE AUR!',
    firstPlace: '🏆 LOCUL 1!',
    secondPlace: '🥈 Locul 2…',
    time: 'Timp',
    newBest: '🎉 Record nou!',
    best: 'Record',
    councilwomanHonor: 'Marea Consilieră te onorează! 🌺',
    ohanaPride: 'Mândrie de ohana! 🌺',
    rematch: 'Așa aproape — o revanșă?',
    tapRace: 'Atinge pentru cursă nouă',
    medalEarned: '🏅 Medalie de aur câștigată!',
    tapSkip: 'Atinge pentru a sări',
    place1: '🥇 loc 1',
    place2: '🥈 loc 2',
    taunts: ['Pa, verișoare!', 'Prinde-mă!', 'Viteză de ohana!', 'Prea încet, cuz!'],
    home: '← Jocuri',
  },
};
function tr(key) { return T[LANG][key]; }
document.getElementById('homeLink').textContent = tr('home');

// ============ GAME STATE ============
const LENS = [13000, 13000, 17000, 21000, 25000]; // race distances for tracks 1-5
let LEN = LENS[0];                // race distance (set per-race in startRace)
const MAXSPD = 7, RIVALBASE = 6.15;
const state = { mode: 'select', sel: 0, char: 'S', level: 1, countT: 0, raceT: 0, place: 1, bestMsg: '', endT: 0, medalWon: false };
const player = { x: 0, lane: 1, laneF: 1, speed: 0, hearts: 3, invuln: 0, stun: 0, sleepT: 0, finT: 0, boostT: 0, tauntT: 0, tauntMsg: '', shakeT: 0, dmgFlashHeart: -1, dmgFlashT: 0 };
const rival  = { x: 0, lane: 0, laneF: 0, speed: 0, weaveT: 120, finT: 0, tauntT: 0, tauntMsg: '' };
let hazards = [], pads = [], bolts = [], sandwiches = [], heartPickups = [], parts = [];
let camX = 0, endRoll = 0, lastPassOrder = 0, comebackHeartUsed = false;

function bestKey(c, lvl) { return 'ohanaKartsBest' + c + 'L' + lvl; }
function getBest(c, lvl) {
  let raw = null;
  try { raw = localStorage.getItem(bestKey(c, lvl)); } catch (e) {}
  const v = parseFloat(raw);
  return isNaN(v) ? null : v;
}

function startRace(c) {
  state.char = c;
  state.mode = 'count';
  state.countT = 0;
  state.raceT = 0;
  state.bestMsg = '';
  LEN = LENS[state.level - 1];
  player.x = 260; player.lane = 1; player.laneF = 1; player.speed = 0;
  player.hearts = 3; player.invuln = 0; player.stun = 0; player.sleepT = 0; player.finT = 0; player.boostT = 0;
  player.tauntT = 0; player.tauntMsg = ''; player.shakeT = 0; player.dmgFlashHeart = -1; player.dmgFlashT = 0;
  rival.x = 260; rival.lane = 0; rival.laneF = 0; rival.speed = 0; rival.weaveT = 150; rival.finT = 0;
  rival.tauntT = 0; rival.tauntMsg = '';
  hazards = []; pads = []; bolts = []; sandwiches = []; heartPickups = []; parts = [];
  camX = 0; endRoll = 0; lastPassOrder = 0; comebackHeartUsed = false;
  state.medalWon = false;
  // build the track: Gantu, Hämsterviel, Reuben and boost pads take turns
  let x = 1000, i = 0, gCount = 0;
  while (x < LEN - 700) {
    const lane = Math.random() < 0.5 ? 0 : 1;
    const r = i % 4;
    if (r === 0) hazards.push({ type: 'H', x, lane, sp: 2.2, cool: 0 });
    else if (r === 1) {
      // on track 3, alternate between Gantu (heart loss) and Myrtle (sleep) so both are present
      const sub = state.level === 3 ? (gCount % 2 === 0 ? 'gantu' : 'myrtle') : undefined;
      hazards.push({ type: 'G', x, lane, gunT: 70, flash: 0, sub });
      gCount++;
    }
    else if (r === 2) hazards.push({ type: 'B', x, cd: 60, arm: 0 });
    else pads.push({ x, lane, cd: 0 });
    x += 430 + Math.random() * 340;
    i++;
  }
}

function setLane(l) {
  l = Math.max(0, Math.min(1, l));
  if (l !== player.lane && state.mode === 'race' && player.stun <= 0 && player.sleepT <= 0) {
    player.lane = l;
    sfx.tick();
  }
}

function damageKart() {
  if (player.invuln > 0 || player.stun > 0) return;
  player.dmgFlashHeart = player.hearts - 1; // index of the heart being lost
  player.dmgFlashT = 40;
  player.hearts--;
  player.invuln = 100;
  player.shakeT = 20;
  player.speed = Math.min(player.speed, 2);
  sfx.crash();
  burst(player.x, laneY(player.laneF) - 20 * K, '#ff8a5c', 12);
  if (player.hearts <= 0) {
    player.stun = 190; // pit repair
    player.speed = 0;
  }
}

function burst(wx, sy, color, n) {
  for (let i = 0; i < n; i++) {
    parts.push({
      wx, sy,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 5 - 1,
      life: 30 + Math.random() * 20,
      color,
    });
  }
}

// ============ LAYOUT ============
function roadTop() { return H * 0.52; }
function roadBot() { return H * 0.95; }
function laneY(l) {
  const t = roadTop(), b = roadBot();
  return t + (b - t) * (0.30 + 0.42 * l);
}

// track-length pill rects for the select-screen level picker (shared by draw + tap hit-testing)
function trackPillRects() {
  const pw = Math.min(60, W * 0.15), ph = H * 0.075, gap = Math.min(10, W * 0.02);
  const totalW = pw * 5 + gap * 4;
  const startX = W / 2 - totalW / 2, cy = H * 0.31;
  const rects = [];
  for (let lvl = 1; lvl <= 5; lvl++) {
    rects.push({ level: lvl, x: startX + (lvl - 1) * (pw + gap), y: cy - ph / 2, w: pw, h: ph });
  }
  return rects;
}

// ============ INPUT ============
function bindButton(id, dir) {
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); initAudio(); el.classList.add('pressed'); setLane(player.lane + dir); };
  const off = e => { e.preventDefault(); el.classList.remove('pressed'); };
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
}
bindButton('btnUp', -1);
bindButton('btnDown', 1);

const btnUpEl = document.getElementById('btnUp'), btnDownEl = document.getElementById('btnDown');
let lastBtnMode = null;
function syncTouchButtons() {
  if (state.mode === lastBtnMode) return;
  lastBtnMode = state.mode;
  const show = state.mode === 'race' || state.mode === 'count';
  btnUpEl.classList.toggle('hidden', !show);
  btnDownEl.classList.toggle('hidden', !show);
}

function tapAt(x, y) {
  initAudio();
  if (state.mode === 'select') {
    for (const r of trackPillRects()) {
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        if (state.level !== r.level) { state.level = r.level; sfx.tick(); }
        return;
      }
    }
    startRace(x < W / 2 ? 'S' : 'L');
  } else if (state.mode === 'race') {
    setLane(y < H * 0.62 ? 0 : 1);
  } else if (state.mode === 'finish') {
    state.mode = 'select';
  } else if (state.mode === 'ending') {
    if (state.endT > 60) state.endT = 450;
  }
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  tapAt(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('mousedown', e => tapAt(e.clientX, e.clientY));

window.addEventListener('keydown', e => {
  initAudio();
  if (state.mode === 'select') {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') { state.sel = 1 - state.sel; sfx.tick(); }
    if (e.code === 'ArrowUp' && state.level > 1) { state.level--; sfx.tick(); }
    if (e.code === 'ArrowDown' && state.level < 5) { state.level++; sfx.tick(); }
    if (e.code === 'Digit1') startRace('S');
    if (e.code === 'Digit2') startRace('L');
    if (e.code === 'Enter' || e.code === 'Space') startRace(state.sel === 0 ? 'S' : 'L');
  } else if (state.mode === 'race') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') setLane(player.lane - 1);
    if (e.code === 'ArrowDown' || e.code === 'KeyS') setLane(player.lane + 1);
  } else if (state.mode === 'finish') {
    if (e.code === 'Enter' || e.code === 'Space') state.mode = 'select';
  } else if (state.mode === 'ending') {
    if ((e.code === 'Enter' || e.code === 'Space') && state.endT > 60) state.endT = 450;
  }
  if (e.code === 'Space' || e.code.startsWith('Arrow')) e.preventDefault();
});

// ============ UPDATE ============
function update() {
  syncTouchButtons();
  // particles run in every mode
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.wx += p.vx; p.sy += p.vy; p.vy += 0.25; p.life--;
    if (p.life <= 0) parts.splice(i, 1);
  }

  if (state.mode === 'count') {
    state.countT++;
    if (state.countT === 1 || state.countT === 60 || state.countT === 120) sfx.count();
    if (state.countT >= 180) { state.mode = 'race'; sfx.go(); }
    return;
  }
  if (state.mode === 'ending') {
    state.endT++;
    if (state.endT === 300) sfx.win(); // chime reprise as the medal appears
    if (state.endT > 460) state.mode = 'finish';
    return;
  }
  if (state.mode !== 'race') return;

  state.raceT++;

  // --- player kart ---
  if (player.stun > 0) {
    player.stun--;
    player.speed = 0;
    if (player.stun % 30 === 0) sfx.fix();
    if (player.stun === 0) { player.hearts = 3; player.invuln = 120; }
  } else if (player.sleepT > 0) {
    player.sleepT--;
    player.speed = 0;
    if (player.sleepT === 0) player.invuln = Math.max(player.invuln, 60); // brief grace period waking up
  } else {
    const cap = player.boostT > 0 ? 10.5 : MAXSPD;
    if (player.speed < cap) player.speed = Math.min(cap, player.speed + 0.07);
    else player.speed = Math.max(cap, player.speed - 0.06);
  }
  if (player.boostT > 0) player.boostT--;
  if (player.invuln > 0) player.invuln--;
  if (player.shakeT > 0) player.shakeT--;
  if (player.dmgFlashT > 0) player.dmgFlashT--; else player.dmgFlashHeart = -1;
  if (player.tauntT > 0) player.tauntT--;
  player.x += player.speed;
  player.laneF += (player.lane - player.laneF) * 0.18;

  // --- rival kart (rubber-banded so the race stays close) ---
  let target = RIVALBASE + Math.max(-0.9, Math.min(0.9, (player.x - rival.x) / 1500));
  rival.speed += (target - rival.speed) * 0.05;
  rival.x += rival.speed;
  rival.laneF += (rival.lane - rival.laneF) * 0.1;
  if (--rival.weaveT <= 0) {
    // prefer whichever lane has no hazard within the next ~600 units ahead of the rival;
    // if the rival's current lane is the one with the upcoming hazard, switch early
    const laneHasHazard = l => hazards.some(hz => hz.lane === l && hz.x - rival.x > 0 && hz.x - rival.x < 600);
    const otherLane = 1 - rival.lane;
    if (laneHasHazard(rival.lane) && !laneHasHazard(otherLane)) rival.lane = otherLane;
    else rival.lane = 1 - rival.lane;
    rival.weaveT = 150 + Math.random() * 200;
  }
  if (rival.tauntT > 0) rival.tauntT--;

  // --- taunt bubbles: whoever just took the lead gets a sweet callout ---
  const passOrder = player.x > rival.x ? 1 : (player.x < rival.x ? -1 : lastPassOrder);
  if (lastPassOrder !== 0 && passOrder !== 0 && passOrder !== lastPassOrder && !player.finT && !rival.finT) {
    const taunts = tr('taunts');
    const msg = taunts[Math.floor(Math.random() * taunts.length)];
    if (passOrder === 1) { player.tauntMsg = msg; player.tauntT = 90; }
    else { rival.tauntMsg = msg; rival.tauntT = 90; }
  }
  lastPassOrder = passOrder;

  // --- comeback heart: trailing by a lot with almost no hearts left gets one shot at relief ---
  if (!comebackHeartUsed && player.hearts <= 1 && rival.x - player.x > 1500 && !player.finT) {
    comebackHeartUsed = true;
    heartPickups.push({ x: player.x + 400 + Math.random() * 200, lane: player.lane, taken: false });
  }
  for (let i = heartPickups.length - 1; i >= 0; i--) {
    const hp = heartPickups[i];
    if (Math.abs(player.laneF - hp.lane) < 0.4 && Math.abs(hp.x - player.x) < 40 * K && player.stun <= 0) {
      heartPickups.splice(i, 1);
      player.hearts = Math.min(3, player.hearts + 1);
      sfx.fix();
      burst(player.x, laneY(hp.lane) - 15 * K, '#ff4d6d', 10);
    } else if (hp.x < player.x - 400) {
      heartPickups.splice(i, 1);
    }
  }

  // --- hazards ---
  for (const hz of hazards) {
    if (hz.type === 'H') {
      hz.x += hz.sp;
      if (hz.cool > 0) hz.cool--;
      // rolling roadblock: getting stuck behind him slows you right down
      if (Math.abs(player.laneF - hz.lane) < 0.4 && player.stun <= 0) {
        const gap = hz.x - player.x;
        if (gap > 0 && gap < 78 * K) {
          player.x = hz.x - 78 * K;
          if (player.speed > hz.sp) {
            player.speed = hz.sp * 0.9;
            if (hz.cool <= 0) { sfx.thud(); hz.cool = 40; burst(player.x + 40, laneY(hz.lane) - 10, '#f4f4f6', 5); }
          }
        }
      }
    } else if (hz.type === 'G') {
      if (hz.flash > 0) hz.flash--;
      const isMyrtle = state.level === 3 && hz.sub === 'myrtle';
      // Gantu (and his track re-skins) guards his lane and fires down the road;
      // on track 3 Myrtle takes his place and "yells" a dodgeable sleep-bolt instead
      const dist = hz.x - player.x;
      if (dist > 120 && dist < 720) {
        if (--hz.gunT <= 0) {
          hz.gunT = 105;
          hz.flash = 8;
          if (isMyrtle) {
            bolts.push({ x: hz.x - 40 * K, lane: hz.lane, vx: -6.2, sleep: true });
            sfx.yell();
          } else {
            bolts.push({ x: hz.x - 40 * K, lane: hz.lane, vx: -6.2 });
            sfx.zap();
          }
        }
      }
      // crashing into the guard himself really hurts — except Myrtle, who just startles you awake... to sleep
      if (Math.abs(player.laneF - hz.lane) < 0.4 && Math.abs(player.x - hz.x) < 55 * K) {
        if (player.invuln <= 0) {
          if (!isMyrtle) damageKart();
          player.x = hz.x - 70 * K;
        }
      }
    } else if (hz.type === 'B') {
      // Reuben lobs sandwiches onto the road ahead of you
      if (hz.arm > 0) hz.arm--;
      const dist = hz.x - player.x;
      if (dist > 150 && dist < 700) {
        if (--hz.cd <= 0) {
          hz.cd = 150;
          hz.arm = 12;
          sandwiches.push({ x: player.x + Math.max(300, player.speed * 45), lane: player.lane, t: -28, life: 430 });
          sfx.splat();
        }
      }
    }
  }

  // --- bolts ---
  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i];
    b.x += b.vx;
    if (b.x < camX - 300) { bolts.splice(i, 1); continue; }
    if (Math.abs(player.laneF - b.lane) < 0.4 && Math.abs(b.x - player.x) < 40 * K && player.invuln <= 0 && player.stun <= 0 && player.sleepT <= 0) {
      bolts.splice(i, 1);
      if (b.sleep) {
        player.sleepT = 300;
        sfx.yell();
        burst(player.x, laneY(player.laneF) - 20 * K, '#be8cff', 12);
      } else {
        damageKart();
      }
    }
  }

  // --- sandwiches on the road ---
  for (let i = sandwiches.length - 1; i >= 0; i--) {
    const s = sandwiches[i];
    s.t++;
    if (--s.life <= 0) { sandwiches.splice(i, 1); continue; }
    if (s.t >= 0 && Math.abs(player.laneF - s.lane) < 0.4 && Math.abs(s.x - player.x) < 42 * K && player.stun <= 0) {
      sandwiches.splice(i, 1);
      player.speed *= 0.32; // sticky!
      sfx.splat();
      burst(player.x, laneY(s.lane) - 8, '#e8c66a', 10);
    }
  }

  // --- boost pads ---
  for (const p of pads) {
    if (p.cd > 0) p.cd--;
    if (p.cd <= 0 && Math.abs(player.laneF - p.lane) < 0.4 && Math.abs(p.x - player.x) < 45 * K && player.stun <= 0) {
      p.cd = 90;
      player.boostT = 55;
      player.speed = 10.5;
      sfx.boost();
      burst(player.x - 30, laneY(p.lane) - 10, '#ffe066', 10);
    }
  }

  // --- finish line ---
  if (!player.finT && player.x >= LEN) player.finT = state.raceT;
  if (!rival.finT && rival.x >= LEN) rival.finT = state.raceT;
  if (player.finT) {
    endRoll++;
    if (endRoll > 55) {
      state.place = rival.finT && rival.finT < player.finT ? 2 : 1;
      const secs = player.finT / 60;
      const best = getBest(state.char, state.level);
      if (state.place === 1 && (best === null || secs < best)) {
        try { localStorage.setItem(bestKey(state.char, state.level), secs.toFixed(2)); } catch (e) {}
        state.bestMsg = tr('newBest');
      } else if (best !== null) {
        state.bestMsg = tr('best') + ': ' + best.toFixed(1) + 's';
      } else {
        state.bestMsg = '';
      }
      if (state.level === 5 && state.place === 1) {
        state.mode = 'ending';
        state.endT = 0;
        state.medalWon = true;
      } else {
        state.mode = 'finish';
      }
      if (state.place === 1) {
        sfx.win();
        for (let i = 0; i < 60; i++) parts.push({
          wx: camX + Math.random() * W, sy: -20 - Math.random() * 150,
          vx: (Math.random() - 0.5) * 2, vy: 1 + Math.random() * 2.5,
          life: 120 + Math.random() * 80,
          color: ['#ff6b8a', '#ffe066', '#7dff8a', '#7adcff', '#c77dff'][i % 5],
        });
      } else sfx.lose();
    }
  }

  // --- camera ---
  camX = player.x - W * 0.30;
}

// ============ DRAWING ============
function draw() {
  const t = Date.now();
  // per-track scenery (sky/backdrop, roadside decor, road surface + divider)
  drawScenery(t);
  // start + finish
  drawCheckerLine(300 - camX);
  drawFinish(LEN - camX, t);

  // boost pads
  for (const p of pads) drawPad(p.x - camX, laneY(p.lane), p.cd > 0, t);
  // comeback heart pickup
  for (const hp of heartPickups) {
    const sx = hp.x - camX;
    if (sx < -40 || sx > W + 40) continue;
    const bob = Math.sin(t / 220) * 5 * K;
    ctx.fillStyle = '#ff4d6d';
    drawHeart(sx, laneY(hp.lane) - 6 * K + bob, 11 * K);
  }
  // sandwiches
  for (const s of sandwiches) {
    const sx = s.x - camX;
    if (sx < -80 || sx > W + 80) continue;
    const drop = s.t < 0 ? (-s.t) * 6 * K : 0;
    drawSandwichSm(sx, laneY(s.lane) + 8 * K - drop, 16 * K);
  }
  // bolts — recolored per track: orange blasters for 1/2, cyan lasers for 4 (Leroy) and 5 (alien sentry).
  // Track 4's bolt reads as a "beam" (more elongated) rather than a round blast.
  for (const b of bolts) {
    const sx = b.x - camX;
    const bolted = b.sleep
      ? '#be8cff'
      : state.level === 4 ? '#7dffcd'
      : state.level === 5 ? '#7dffcd'
      : '#ffb066';
    ctx.fillStyle = bolted;
    ctx.beginPath();
    ctx.ellipse(sx, laneY(b.lane) - 16 * K, state.level === 4 ? 15 * K : 11 * K, state.level === 4 ? 3.6 * K : 5 * K, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(sx, laneY(b.lane) - 16 * K, state.level === 4 ? 8 * K : 5 * K, 1.6 * K, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // villains — re-skinned per track (Track 3 swaps Gantu for Myrtle, Track 4 swaps him for Leroy)
  for (const hz of hazards) {
    const sx = hz.x - camX;
    if (sx < -140 || sx > W + 140) continue;
    if (hz.type === 'H') {
      const fn = [drawHamKart, drawHamKart2, drawHamKart3, drawHamKart4, drawHamKart5][state.level - 1];
      fn(sx, laneY(hz.lane), hz.x);
    } else if (hz.type === 'G') {
      if (state.level === 3 && hz.sub === 'myrtle') drawMyrtleGuard(sx, laneY(hz.lane), hz.flash > 0);
      else if (state.level === 3 && hz.sub === 'gantu') drawGantuGuard(sx, laneY(hz.lane), hz.flash > 0);
      else if (state.level === 4) drawLeroyGuard(sx, laneY(hz.lane), hz.flash > 0);
      else if (state.level === 2) drawGantuGuard2(sx, laneY(hz.lane), hz.flash > 0);
      else if (state.level === 5) drawGantuGuard5(sx, laneY(hz.lane), hz.flash > 0);
      else drawGantuGuard(sx, laneY(hz.lane), hz.flash > 0);
    } else {
      const fn = [drawReubenSide, drawReubenSide2, drawReubenSide3, drawReubenSide4, drawReubenSide5][state.level - 1];
      fn(sx, roadTop() - 6, hz.arm > 0, t);
    }
  }

  // karts (draw far lane first)
  const karts = [
    { k: rival, who: state.char === 'S' ? 'L' : 'S', isP: false },
    { k: player, who: state.char, isP: true },
  ].sort((a, b) => a.k.laneF - b.k.laneF);
  for (const kk of karts) drawKart(kk.k, kk.who, kk.isP, t);

  // particles
  for (const p of parts) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.wx - camX - 3, p.sy - 3, 6, 6);
    ctx.globalAlpha = 1;
  }

  drawSpeedLines(t);
  drawHUD(t);
  drawOverlays(t);
}

// screen-space white streaks at the left/right edges while the player is boosting
function drawSpeedLines(t) {
  if (state.mode !== 'race' || player.boostT <= 0) return;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i = 0; i < 6; i++) {
    const y = (i * 97 + (t / 3) % 97) % H;
    const len = 40 * K + (i % 3) * 20 * K;
    ctx.fillRect(0, y, len, 2.4 * K);
    ctx.fillRect(W - len, H - y, len, 2.4 * K);
  }
}

// ============ TRACK SCENERY ============
function drawScenery(t) {
  if (state.level === 1) drawBeachScene(t);
  else if (state.level === 2) drawIslandScene(t);
  else if (state.level === 3) drawHouseScene(t);
  else if (state.level === 4) drawPlanetScene(t);
  else drawSpaceScene(t);
}

// Track 1: beach — verbatim original background, unmoved (only its length changed via LENS[0]).
function drawBeachScene(t) {
  // sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3f9bd9');
  grad.addColorStop(0.45, '#8fd0ee');
  grad.addColorStop(1, '#ffe9c4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // sun
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath();
  ctx.arc(W * 0.82, H * 0.12, 26 * K, 0, Math.PI * 2);
  ctx.fill();
  // clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 340 + 120 - camX * 0.15) % (W + 300) + W + 300) % (W + 300) - 150;
    const cy = H * 0.07 + (i % 3) * H * 0.05;
    ctx.beginPath();
    ctx.arc(cx, cy, 16 * K, 0, Math.PI * 2);
    ctx.arc(cx + 20 * K, cy - 6 * K, 19 * K, 0, Math.PI * 2);
    ctx.arc(cx + 40 * K, cy, 15 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  // ocean with waves + island
  const hor = H * 0.34, beach = H * 0.46;
  ctx.fillStyle = '#2e86c9';
  ctx.fillRect(0, hor, W, beach - hor);
  ctx.fillStyle = '#3d6b4f';
  ctx.beginPath();
  ctx.ellipse(((900 - camX * 0.1) % (W + 500) + W + 500) % (W + 500) - 250, hor + 2, 90 * K, 16 * K, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 14; i++) {
    const wx = ((i * 150 - camX * 0.3 + Math.sin(t / 900 + i) * 10) % (W + 200) + W + 200) % (W + 200) - 100;
    ctx.fillRect(wx, hor + 8 + (i % 4) * (beach - hor - 14) / 4, 30 * K, 2.5);
  }
  // dry sand
  ctx.fillStyle = '#f0d998';
  ctx.fillRect(0, beach, W, roadTop() - beach);
  // roadside palms + umbrellas (world anchored)
  for (let i = 0; i < 40; i++) {
    const wx = i * 420 + 150;
    const sx = wx - camX * 0.85;
    if (sx < -120 || sx > W + 120) continue;
    if (i % 3 === 2) drawUmbrellaSm(sx, roadTop() - 4);
    else drawPalmSm(sx, roadTop() - 2);
  }
  // road (packed sand)
  ctx.fillStyle = '#d8ae62';
  ctx.fillRect(0, roadTop(), W, roadBot() - roadTop());
  ctx.fillStyle = '#c19a4f';
  ctx.fillRect(0, roadTop(), W, 5);
  ctx.fillRect(0, roadBot() - 5, W, 5);
  // dashed lane divider
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const divY = (laneY(0) + laneY(1)) / 2 + 14 * K;
  for (let wx = Math.floor(camX / 90) * 90; wx < camX + W + 90; wx += 90) {
    ctx.fillRect(wx - camX, divY, 42, 4);
  }
}

// shared: draws a wrapped, parallax-scrolling band of hill humps (used by the island scene)
function drawHillLayer(baseY, height, factor, color, spacing) {
  ctx.fillStyle = color;
  const count = Math.ceil(W / spacing) + 3;
  for (let i = 0; i < count; i++) {
    const cx = ((i * spacing - camX * factor) % (W + spacing * 2) + W + spacing * 2) % (W + spacing * 2) - spacing;
    ctx.beginPath();
    ctx.ellipse(cx, baseY, spacing * 0.7, height, 0, Math.PI, 0);
    ctx.fill();
  }
}

function drawFernSm(x, gy) {
  ctx.strokeStyle = '#2f6b2a';
  ctx.lineWidth = 3.5 * K;
  ctx.lineCap = 'round';
  for (let a = 0; a < 4; a++) {
    const ang = -Math.PI * 0.75 + a * 0.5;
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.quadraticCurveTo(
      x + Math.cos(ang) * 10 * K, gy - 14 * K,
      x + Math.cos(ang) * 20 * K, gy - 26 * K + Math.sin(ang) * 6 * K);
    ctx.stroke();
  }
}

// Track 2: island — same tropical sky as the beach (continuity: same island chain, different route),
// jungle interior with parallax hills, dense canopy, and a dirt-trail road.
function drawIslandScene(t) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3f9bd9');
  grad.addColorStop(0.45, '#8fd0ee');
  grad.addColorStop(1, '#ffe9c4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath();
  ctx.arc(W * 0.82, H * 0.12, 26 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 340 + 120 - camX * 0.15) % (W + 300) + W + 300) % (W + 300) - 150;
    const cy = H * 0.07 + (i % 3) * H * 0.05;
    ctx.beginPath();
    ctx.arc(cx, cy, 16 * K, 0, Math.PI * 2);
    ctx.arc(cx + 20 * K, cy - 6 * K, 19 * K, 0, Math.PI * 2);
    ctx.arc(cx + 40 * K, cy, 15 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  // parallax rolling jungle hills
  drawHillLayer(H * 0.40, H * 0.14, 0.05, '#6ab04c', 340);
  drawHillLayer(H * 0.44, H * 0.13, 0.1, '#4aa32e', 260);
  drawHillLayer(roadTop(), H * 0.14, 0.18, '#3d8c28', 200);
  // dense jungle canopy lining both roadsides (tighter than the beach's palms)
  for (let i = 0; i < 90; i++) {
    const wx = i * 260 + 130;
    const sx = wx - camX * 0.85;
    if (sx < -120 || sx > W + 120) continue;
    if (i % 3 === 1) drawFernSm(sx, roadTop() - 2);
    else drawPalmSm(sx, roadTop() - 2);
  }
  // road (dirt trail)
  ctx.fillStyle = '#8a6238';
  ctx.fillRect(0, roadTop(), W, roadBot() - roadTop());
  ctx.fillStyle = '#6d4a26';
  ctx.fillRect(0, roadTop(), W, 5);
  ctx.fillRect(0, roadBot() - 5, W, 5);
  // dashed divider, pale leaf-green tint
  ctx.fillStyle = 'rgba(214,255,196,0.65)';
  const divY = (laneY(0) + laneY(1)) / 2 + 14 * K;
  for (let wx = Math.floor(camX / 90) * 90; wx < camX + W + 90; wx += 90) {
    ctx.fillRect(wx - camX, divY, 42, 4);
  }
}

// Track 3: Lilo's house — floor doubles as the road, split into 4 rooms in a fixed order:
// kitchen -> bedroom -> living room -> spaceship tower bedroom.
function roomAt(x) { return Math.min(3, Math.floor(Math.max(0, x) / (LEN / 4))); }
const HOUSE_WALLS = ['#f7ecd9', '#eaf1fb', '#f5e6c8', '#2d3548'];
const HOUSE_FLOORS = ['', '#b98450', '#a8763f', '#4a5570']; // room 0 (kitchen) floor is a checker, drawn separately
const HOUSE_TRIM = ['#8a5a34', '#7c5930', '#6d4526', '#232a3a']; // solid wall/floor boundary edge per room

function drawHouseScene(t) {
  const roomLen = LEN / 4;
  const rt = roadTop(), rb = roadBot();
  const rightEdgeWorld = camX + W;
  // wall + floor, walked in room-sized chunks across the visible span
  let wx = Math.floor(camX / roomLen) * roomLen;
  for (; wx < rightEdgeWorld; wx += roomLen) {
    const room = roomAt(wx + roomLen / 2);
    const segL = Math.max(wx, camX), segR = Math.min(wx + roomLen, rightEdgeWorld);
    if (segR <= segL) continue;
    const sxL = segL - camX, sxR = segR - camX;
    ctx.fillStyle = HOUSE_WALLS[room];
    ctx.fillRect(sxL, 0, sxR - sxL, rt);
    drawRoomFloor(room, sxL, sxR, rt, rb);
  }
  // doorframes at the 3 internal room boundaries
  for (let i = 1; i <= 3; i++) {
    const sx = i * roomLen - camX;
    if (sx > -50 && sx < W + 50) drawDoorFrame(sx, rt);
  }
  // tiled room props (every ~260 world units, style follows the room they land in)
  for (let wxp = Math.floor(camX / 260) * 260; wxp < rightEdgeWorld; wxp += 260) {
    const sx = wxp - camX;
    if (sx < -60 || sx > W + 60) continue;
    drawRoomProp(roomAt(wxp), sx, wxp, rt, t);
  }
  // dashed centerline — dark halo behind a white dash so it reads on every room's floor color
  const divY = (laneY(0) + laneY(1)) / 2 + 14 * K;
  ctx.fillStyle = 'rgba(20,16,10,0.55)';
  for (let dx = Math.floor(camX / 90) * 90; dx < camX + W + 90; dx += 90) {
    ctx.fillRect(dx - camX - 1, divY - 1, 44, 6);
  }
  ctx.fillStyle = '#fff';
  for (let dx = Math.floor(camX / 90) * 90; dx < camX + W + 90; dx += 90) {
    ctx.fillRect(dx - camX, divY, 42, 4);
  }
}

function drawRoomFloor(room, sxL, sxR, rt, rb) {
  if (room === 0) {
    // kitchen: soft two-tone tile checker (deliberately not the sharp finish-line checker)
    const sq = 26 * K;
    for (let y = rt; y < rb; y += sq) {
      for (let x = Math.floor(sxL / sq) * sq; x < sxR; x += sq) {
        ctx.fillStyle = (Math.round(x / sq) + Math.round(y / sq)) % 2 ? '#dba86a' : '#a8703f';
        ctx.fillRect(x, y, sq, Math.min(sq, rb - y));
      }
    }
  } else {
    ctx.fillStyle = HOUSE_FLOORS[room];
    ctx.fillRect(sxL, rt, sxR - sxL, rb - rt);
    if (room === 3) {
      // grated metal deck texture
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      for (let y = rt + 8; y < rb; y += 9) {
        ctx.beginPath(); ctx.moveTo(sxL, y); ctx.lineTo(sxR, y); ctx.stroke();
      }
    }
  }
  ctx.fillStyle = HOUSE_TRIM[room];
  ctx.fillRect(sxL, rt, sxR - sxL, 4);
  ctx.fillRect(sxL, rb - 4, sxR - sxL, 4);
}

function drawDoorFrame(sx, rt) {
  ctx.fillStyle = '#6d4526';
  ctx.fillRect(sx - 32 * K, rt - 88 * K, 9 * K, 88 * K);
  ctx.fillRect(sx + 23 * K, rt - 88 * K, 9 * K, 88 * K);
  ctx.fillRect(sx - 32 * K, rt - 96 * K, 64 * K, 10 * K);
}

function drawRoomProp(room, sx, wxp, rt, t) {
  const kind = Math.floor(wxp / 260) % 3;
  if (room === 0) {
    // kitchen: hanging pot + fruit bowl along the upper wall
    ctx.fillStyle = '#8a5a34';
    ctx.fillRect(sx - 3, rt - 46 * K, 6, 20 * K);
    ctx.fillStyle = '#7d8898';
    ctx.beginPath(); ctx.arc(sx, rt - 48 * K, 9 * K, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e0763a';
    ctx.beginPath();
    ctx.arc(sx - 3 * K, rt - 12 * K, 4 * K, 0, Math.PI * 2);
    ctx.arc(sx + 4 * K, rt - 11 * K, 4 * K, 0, Math.PI * 2);
    ctx.fill();
  } else if (room === 1) {
    if (kind === 1) {
      // dresser
      ctx.fillStyle = '#8a5a34';
      ctx.fillRect(sx - 16 * K, rt - 34 * K, 32 * K, 34 * K);
      ctx.fillStyle = '#6d4526';
      ctx.fillRect(sx - 12 * K, rt - 24 * K, 24 * K, 4 * K);
      ctx.fillRect(sx - 12 * K, rt - 14 * K, 24 * K, 4 * K);
    } else {
      // bed silhouette (headboard + pillow) + warm lamp glow
      ctx.fillStyle = '#e8b8cf';
      ctx.fillRect(sx - 26 * K, rt - 30 * K, 52 * K, 30 * K);
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx - 20 * K, rt - 28 * K, 16 * K, 10 * K);
      ctx.fillStyle = 'rgba(255,214,140,0.45)';
      ctx.beginPath(); ctx.arc(sx + 36 * K, rt - 24 * K, 12 * K, 0, Math.PI * 2); ctx.fill();
    }
  } else if (room === 2) {
    if (kind === 0) {
      // window onto the Hawaiian night sky
      ctx.fillStyle = '#1d2a52';
      ctx.fillRect(sx - 22 * K, rt - 50 * K, 44 * K, 40 * K);
      ctx.fillStyle = 'rgba(255,230,150,0.55)';
      ctx.beginPath(); ctx.arc(sx + 8 * K, rt - 34 * K, 8 * K, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(sx - 16 * K + i * 8 * K, rt - 44 * K + (i % 3) * 6 * K, 1.2 * K, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.strokeStyle = '#caa06b';
      ctx.lineWidth = 3 * K;
      ctx.strokeRect(sx - 22 * K, rt - 50 * K, 44 * K, 40 * K);
    } else if (kind === 1) {
      // couch
      ctx.fillStyle = '#b8524a';
      ctx.fillRect(sx - 26 * K, rt - 24 * K, 52 * K, 24 * K);
      ctx.fillRect(sx - 26 * K, rt - 34 * K, 12 * K, 14 * K);
      ctx.fillRect(sx + 14 * K, rt - 34 * K, 12 * K, 14 * K);
    } else {
      // bookshelf + glowing floor lamp
      ctx.fillStyle = '#8a5a34';
      ctx.fillRect(sx - 20 * K, rt - 44 * K, 24 * K, 44 * K);
      const spineColors = ['#e04438', '#f2b035', '#3d9c4f', '#3d7bc9'];
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = spineColors[i];
        ctx.fillRect(sx - 18 * K + i * 5 * K, rt - 40 * K, 4 * K, 30 * K);
      }
      ctx.fillStyle = '#dcd0b0';
      ctx.fillRect(sx + 10 * K, rt - 38 * K, 3 * K, 34 * K);
      ctx.fillStyle = 'rgba(255,224,150,0.55)';
      ctx.beginPath(); ctx.arc(sx + 11 * K, rt - 38 * K, 8 * K, 0, Math.PI * 2); ctx.fill();
    }
  } else {
    if (kind === 0) {
      // porthole onto the alien night sky
      ctx.fillStyle = '#241040';
      ctx.beginPath(); ctx.arc(sx, rt - 34 * K, 20 * K, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 4; i++) {
        const a = i / 4 * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(sx + Math.cos(a) * 10 * K, rt - 34 * K + Math.sin(a) * 10 * K, 1 * K, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = 'rgba(220,200,255,0.5)';
      ctx.beginPath(); ctx.arc(sx - 4 * K, rt - 38 * K, 5 * K, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#7d8898';
      ctx.lineWidth = 4 * K;
      ctx.beginPath(); ctx.arc(sx, rt - 34 * K, 20 * K, 0, Math.PI * 2); ctx.stroke();
    } else if (kind === 1) {
      // Stitch's blue-tinted and Lilo's red-tinted bed/hammock silhouettes, side by side
      ctx.fillStyle = 'rgba(80,140,220,0.6)';
      ctx.fillRect(sx - 30 * K, rt - 24 * K, 24 * K, 24 * K);
      ctx.fillStyle = 'rgba(220,90,90,0.6)';
      ctx.fillRect(sx + 6 * K, rt - 24 * K, 24 * K, 24 * K);
    } else {
      // control panel with a few blinking amber dots
      ctx.fillStyle = '#4a5570';
      ctx.fillRect(sx - 20 * K, rt - 30 * K, 40 * K, 30 * K);
      for (let i = 0; i < 4; i++) {
        const on = Math.floor(t / 260 + i) % 2 === 0;
        ctx.fillStyle = on ? '#ffd94d' : 'rgba(255,217,77,0.2)';
        ctx.beginPath();
        ctx.arc(sx - 12 * K + i * 8 * K, rt - 16 * K, 2.4 * K, 0, Math.PI * 2);
        ctx.fill();

// Track 4: alien planet — matches Super Jumper's W8-10 alien-planet palette.
function drawPlanetScene(t) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#241040');
  grad.addColorStop(0.5, '#4a2470');
  grad.addColorStop(1, '#7a4694');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 97 - camX * 0.05) % (W + 100) + W + 100) % (W + 100) - 50;
    const sy = (i * 53) % (H * 0.55);
    ctx.fillRect(sx, sy, 1.6, 1.6);
  }
  // two moons
  ctx.fillStyle = '#e8d9f7';
  ctx.beginPath(); ctx.arc(W * 0.2, H * 0.14, 22 * K, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#b9e0d9';
  ctx.beginPath(); ctx.arc(W * 0.75, H * 0.2, 15 * K, 0, Math.PI * 2); ctx.fill();
  // jagged violet spires far in the background
  ctx.fillStyle = '#33184f';
  for (let i = 0; i < 12; i++) {
    const wx = i * 260;
    const sx = ((wx - camX * 0.2) % (W + 200) + W + 200) % (W + 200) - 100;
    const hgt = 40 + (i % 3) * 26;
    ctx.beginPath();
    ctx.moveTo(sx - 20 * K, roadTop() - 4);
    ctx.lineTo(sx, roadTop() - 4 - hgt * K);
    ctx.lineTo(sx + 20 * K, roadTop() - 4);
    ctx.closePath();
    ctx.fill();
  }
  // glowing crystal shards lining the roadside
  for (let i = 0; i < 90; i++) {
    const wx = i * 300 + 150;
    const sx = wx - camX * 0.85;
    if (sx < -60 || sx > W + 60) continue;
    drawCrystalShard(sx, roadTop() - 2, i % 2 === 0);
  }
  // road (alien dirt)
  ctx.fillStyle = '#6d4090';
  ctx.fillRect(0, roadTop(), W, roadBot() - roadTop());
  ctx.fillStyle = '#54307a';
  ctx.fillRect(0, roadTop(), W, 5);
  ctx.fillRect(0, roadBot() - 5, W, 5);
  // dashed divider, teal glow tint
  ctx.fillStyle = 'rgba(111,227,193,0.75)';
  const divY = (laneY(0) + laneY(1)) / 2 + 14 * K;
  for (let wx = Math.floor(camX / 90) * 90; wx < camX + W + 90; wx += 90) {
    ctx.fillRect(wx - camX, divY, 42, 4);

}

// Track 5: deep space between planets — starfield, no ground terrain, fixed one-time planet flybys.
function drawSpaceScene(t) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#05030f');
  grad.addColorStop(0.5, '#120a24');
  grad.addColorStop(1, '#1c1440');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 70; i++) {
    const sx = ((i * 71 - camX * 0.05) % (W + 100) + W + 100) % (W + 100) - 50;
    const sy = (i * 37) % (H * 0.7);
    const s = i % 5 === 0 ? 2.2 : 1.3;
    ctx.fillRect(sx, sy, s, s);
  }
  ctx.fillStyle = 'rgba(140,170,255,0.7)';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 53 - camX * 0.08) % (W + 100) + W + 100) % (W + 100) - 50;
    const sy = (i * 29) % (H * 0.6);
    ctx.fillRect(sx, sy, 1.4, 1.4);
  }
  // soft nebula blobs
  ctx.fillStyle = 'rgba(220,80,220,0.10)';
  ctx.beginPath();
  ctx.ellipse(((2200 - camX * 0.1) % (W + 800) + W + 800) % (W + 800) - 400, H * 0.2, 220 * K, 110 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(80,220,220,0.10)';
  ctx.beginPath();
  ctx.ellipse(((900 - camX * 0.15) % (W + 700) + W + 700) % (W + 700) - 350, H * 0.35, 180 * K, 90 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // distant planets at fixed world positions — passed once, not tiled
  drawSpacePlanet(4000, H * 0.18, 0.12, 34 * K, '#c9a06b', true);
  drawSpacePlanet(12000, H * 0.24, 0.25, 26 * K, '#4aa3a0', false);
  drawSpacePlanet(20000, H * 0.5, 0.5, 16 * K, '#b0554a', false);
  // floating asteroid clusters along the road
  for (let i = 0; i < 60; i++) {
    const wx = i * 500 + 250;
    const sx = wx - camX * 0.9;
    if (sx < -60 || sx > W + 60) continue;
    drawAsteroidCluster(sx, roadTop() - 10);
  }
  // road: glowing translucent energy-trail strip, not solid ground
  const rt = roadTop(), rb = roadBot();
  const rgrad = ctx.createLinearGradient(0, rt, 0, rb);
  rgrad.addColorStop(0, 'rgba(140,110,255,0.35)');
  rgrad.addColorStop(1, 'rgba(110,220,255,0.35)');
  ctx.fillStyle = rgrad;
  ctx.fillRect(0, rt, W, rb - rt);
  // pulsing cyan-glow dashed centerline
  const pulse = 0.55 + Math.sin(t / 220) * 0.25;
  ctx.fillStyle = 'rgba(110,240,255,' + pulse + ')';
  const divY = (laneY(0) + laneY(1)) / 2 + 14 * K;
  for (let wx = Math.floor(camX / 90) * 90; wx < camX + W + 90; wx += 90) {
    ctx.fillRect(wx - camX, divY, 42, 4);
  }
}

function drawSpacePlanet(wx, cy, factor, r, color, ringed) {

  ctx.beginPath(); ctx.arc(sx, cy, r, 0, Math.PI * 2); ctx.fill();
  if (ringed) {
    ctx.strokeStyle = 'rgba(230,210,170,0.7)';
    ctx.lineWidth = 3 * K;
    ctx.beginPath();
    ctx.ellipse(sx, cy, r * 1.7, r * 0.5, -0.3, 0, Math.PI * 2);

}

function drawLeroyGuard(sx, ly, firing) {

  const y = ly + 12 * K, w = 46 * K, h = 74 * K;

  ctx.quadraticCurveTo(sx, y - h * 0.7, sx + w * 0.09, y - h * 0.75);

  ctx.fillRect(sx - w * 0.5 - 20 * K, y - h * 0.42, 24 * K, 7 * K);

function wheel(x, y, r, wx) {
  ctx.fillStyle = '#222';
  ctx.beginPath();

  ctx.fill();
  ctx.fillStyle = '#9aa7c7';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.45, 0, Math.PI * 2);
  ctx.fill();
  const a = (wx || 0) / 14;
  ctx.strokeStyle = '#4a4a4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - Math.cos(a) * r * 0.8, y - Math.sin(a) * r * 0.8);
  ctx.lineTo(x + Math.cos(a) * r * 0.8, y + Math.sin(a) * r * 0.8);
  ctx.stroke();
}

function drawKart(k, who, isP, t) {
  const sx = k.x - camX;
  if (sx < -160 || sx > W + 160) return;
  const y = laneY(k.laneF);
  const bob = Math.sin(k.x / 42) * 1.6 * K;
  if (isP && k.invuln > 0 && Math.floor(k.invuln / 4) % 2) return; // blink
  // tilt: lean into lane changes, proportional to how far laneF still has to catch up to lane
  const tilt = Math.max(-0.08, Math.min(0.08, (k.lane - k.laneF) * 0.08));
  ctx.save();
  ctx.translate(sx, y);
  ctx.rotate(tilt);
  ctx.translate(-sx, -y);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 13 * K, 44 * K, 8 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // boost flames
  if (isP && k.boostT > 0) {
    ctx.fillStyle = 'rgba(255,150,60,0.85)';
    ctx.beginPath();
    ctx.moveTo(sx - 42 * K, y - 6 * K + bob);
    ctx.lineTo(sx - 42 * K - (16 + Math.random() * 10) * K, y + bob);
    ctx.lineTo(sx - 42 * K, y + 5 * K + bob);
    ctx.closePath();
    ctx.fill();
  }
  // kart body
  ctx.fillStyle = who === 'S' ? '#e04438' : '#f2b035';
  ctx.beginPath();
  ctx.moveTo(sx - 42 * K, y - 14 * K + bob);
  ctx.lineTo(sx + 30 * K, y - 14 * K + bob);
  ctx.quadraticCurveTo(sx + 46 * K, y - 12 * K + bob, sx + 44 * K, y + 2 * K + bob);
  ctx.lineTo(sx - 42 * K, y + 2 * K + bob);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(sx - 34 * K, y - 10 * K + bob, 60 * K, 4 * K);
  // steering wheel
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3 * K;
  ctx.beginPath();
  ctx.arc(sx + 18 * K, y - 20 * K + bob, 6 * K, Math.PI * 0.9, Math.PI * 1.9);
  ctx.stroke();
  // wheels
  wheel(sx - 26 * K, y + 6 * K, 12 * K, k.x);
  wheel(sx + 26 * K, y + 6 * K, 12 * K, k.x);
  // driver
  if (who === 'S') drawStitchDriver(sx - 4 * K, y - 26 * K + bob);
  else drawLiloDriver(sx - 4 * K, y - 26 * K + bob);
  ctx.restore(); // end tilt transform — icons/bubbles below stay upright
  // taunt speech bubble when this kart just took the lead
  if (k.tauntT > 0) drawTauntBubble(sx, y - 68 * K, k.tauntMsg);
  // repair stop
  if (isP && k.stun > 0) {
    ctx.font = 'bold ' + 20 * K + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔧', sx, y - 58 * K + Math.sin(t / 120) * 4);
    ctx.fillStyle = 'rgba(120,120,120,' + (0.4 + Math.sin(t / 200) * 0.15) + ')';
    ctx.beginPath();
    ctx.arc(sx - 20 * K, y - 40 * K, 7 * K, 0, Math.PI * 2);
    ctx.arc(sx - 32 * K, y - 50 * K, 5 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  // asleep (Myrtle's scream, track 3)
  if (isP && k.sleepT > 0) {
    ctx.font = 'bold ' + 20 * K + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💤', sx, y - 58 * K + Math.sin(t / 160) * 4);
  }
}

function drawTauntBubble(sx, by, msg) {
  ctx.font = 'bold ' + 12 * K + 'px -apple-system, sans-serif';
  const padX = 8 * K, padY = 5 * K;
  const w = ctx.measureText(msg).width + padX * 2, h = 16 * K + padY;
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(sx - w / 2, by - h, w, h, 8 * K) : ctx.rect(sx - w / 2, by - h, w, h);
  ctx.fill();
  ctx.stroke();
  // little pointer tail
  ctx.beginPath();
  ctx.moveTo(sx - 5 * K, by);
  ctx.lineTo(sx, by + 6 * K);
  ctx.lineTo(sx + 5 * K, by);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#2b2013';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(msg, sx, by - h / 2);
}

function drawStitchDriver(x, y) {
  const BLUE = '#3d7bc9', DARK = '#26508f', BELLY = '#bfe0f4', PINK = '#e88db4';
  ctx.lineWidth = 1.4 * K;
  ctx.strokeStyle = DARK;
  // torso
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(x, y + 8 * K, 10 * K, 9 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // ears
  for (const s of [-1, 1]) {
    ctx.save();
    ctx.translate(x + s * 8 * K, y - 12 * K);
    ctx.rotate(s * 1.1);
    ctx.fillStyle = BLUE;
    ctx.beginPath();
    ctx.ellipse(0, -6 * K, 4 * K, 9 * K, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(0, -5 * K, 2 * K, 5.5 * K, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // head
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(x, y - 6 * K, 11 * K, 9.5 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = BELLY;
  ctx.beginPath();
  ctx.ellipse(x + 2 * K, y - 3 * K, 6 * K, 4.5 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // eyes forward (racing!)
  ctx.fillStyle = '#14181f';
  ctx.beginPath();
  ctx.ellipse(x + 5 * K, y - 8 * K, 2.6 * K, 3.6 * K, 0.3, 0, Math.PI * 2);
  ctx.ellipse(x - 3 * K, y - 8 * K, 2.4 * K, 3.4 * K, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + 5.6 * K, y - 9 * K, 1 * K, 0, Math.PI * 2);
  ctx.fill();
  // nose + grin
  ctx.fillStyle = '#1b2a45';
  ctx.beginPath();
  ctx.ellipse(x + 8 * K, y - 4 * K, 2.4 * K, 1.8 * K, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawLiloDriver(x, y) {
  const SKIN = '#d9976a', HAIR = '#1c1b22';
  // hair behind
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(x - 3 * K, y - 4 * K, 11 * K, 11 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(x - 14 * K, y - 4 * K, 14 * K, 14 * K);
  // dress torso
  ctx.fillStyle = '#d63a2f';
  ctx.beginPath();
  ctx.ellipse(x, y + 9 * K, 9 * K, 8 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x - 2 * K, y + 8 * K, 1.4 * K, 3 * K, 0.5, 0, Math.PI * 2);
  ctx.fill();
  // face
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(x + 2 * K, y - 6 * K, 8 * K, 7.5 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // bangs
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(x + 1 * K, y - 10 * K, 9 * K, 4.5 * K, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // flower
  ctx.fillStyle = '#f7f7fb';
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(x - 6 * K + Math.cos(a) * 2 * K, y - 12 * K + Math.sin(a) * 2 * K, 1.5 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#ffd54d';
  ctx.beginPath();
  ctx.arc(x - 6 * K, y - 12 * K, 1.1 * K, 0, Math.PI * 2);
  ctx.fill();
  // eye + smile
  ctx.fillStyle = '#26211f';
  ctx.beginPath();
  ctx.arc(x + 5 * K, y - 6 * K, 1.5 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8a4b32';
  ctx.lineWidth = 1.3 * K;
  ctx.beginPath();
  ctx.arc(x + 4 * K, y - 3 * K, 2.6 * K, 0.3, Math.PI - 0.5);
  ctx.stroke();
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.3);
  ctx.bezierCurveTo(x - s, y + s * 0.8, x, y + s * 1.1, x, y + s * 1.4);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.8, x + s, y + s * 0.3);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function drawHUD(t) {
  if (state.mode === 'select') return;
  const pad = Math.max(14, H * 0.02);
  // hearts — shake briefly on damage, and the just-lost heart flashes red before greying out
  const shake = player.shakeT > 0 ? (Math.random() - 0.5) * 4 : 0;
  for (let i = 0; i < 3; i++) {
    const flashing = i === player.dmgFlashHeart && player.dmgFlashT > 0;
    if (flashing) {
      ctx.fillStyle = Math.floor(player.dmgFlashT / 5) % 2 ? '#ff4d6d' : 'rgba(0,0,0,0.25)';
    } else {
      ctx.fillStyle = i < player.hearts ? '#ff4d6d' : 'rgba(0,0,0,0.25)';
    }
    drawHeart(pad + 14 + i * 32 + shake, pad + 6 + shake, 12);
  }
  // time + place
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  const secs = (state.raceT / 60).toFixed(1) + 's';
  const ahead = player.finT ? state.place === 1 : player.x >= rival.x;
  const label = (ahead ? tr('place1') : tr('place2')) + '   ' + secs;
  ctx.strokeText(label, W - pad, pad);
  ctx.fillText(label, W - pad, pad);
  // progress bar
  const bw = W * 0.44, bx = (W - bw) / 2, by = pad + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(bx, by, bw, 6);
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏁', bx + bw + 12, by + 3);
  const dot = (k, col) => {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(bx + bw * Math.min(1, k.x / LEN), by + 3, 6, 0, Math.PI * 2);
    ctx.fill();
  };
  dot(rival, state.char === 'S' ? '#f2b035' : '#e04438');
  dot(player, state.char === 'S' ? '#e04438' : '#f2b035');
}

function drawOverlays(t) {
  if (state.mode === 'race') return;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (state.mode === 'select') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    const big = Math.min(52, W * 0.085);
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText(tr('title'), W / 2, H * 0.13);
    ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(tr('selectPrompt'), W / 2, H * 0.21);
    // track-length picker
    const pillRects = trackPillRects();
    ctx.font = 'bold ' + Math.min(14, W * 0.028) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#dce9f5';
    ctx.fillText(tr('track'), W / 2, pillRects[0].y - 12);
    for (const r of pillRects) {
      ctx.fillStyle = state.level === r.level ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(r.x, r.y, r.w, r.h, 10) : ctx.rect(r.x, r.y, r.w, r.h);
      ctx.fill();
      ctx.font = 'bold ' + Math.min(18, W * 0.036) + 'px -apple-system, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(String(r.level), r.x + r.w / 2, r.y + r.h / 2 - 5);
      ctx.font = 'bold ' + Math.min(9, W * 0.02) + 'px -apple-system, sans-serif';
      ctx.fillStyle = '#dce9f5';
      ctx.fillText(tr('trackNames')[r.level - 1], r.x + r.w / 2, r.y + r.h / 2 + 10);
    }
    // two picks
    for (const [i, who] of [[0, 'S'], [1, 'L']]) {
      const cx = W * (i === 0 ? 0.3 : 0.7), cy = H * 0.58;
      ctx.fillStyle = state.sel === i ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      const rw = Math.min(220, W * 0.36), rh = H * 0.32;
      ctx.roundRect ? ctx.roundRect(cx - rw / 2, cy - rh / 2, rw, rh, 18) : ctx.rect(cx - rw / 2, cy - rh / 2, rw, rh);
      ctx.fill();
      const fake = { x: camX + cx, laneF: 0, invuln: 0, stun: 0, boostT: 0 };
      // draw a preview kart at the card position
      ctx.save();
      ctx.translate(0, cy + 20 - laneY(0));
      drawKart(fake, who, false, t);
      ctx.restore();
      ctx.font = 'bold ' + Math.min(24, W * 0.045) + 'px -apple-system, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(who === 'S' ? tr('stitch') : tr('lilo'), cx, cy + rh / 2 - 40);
      const best = getBest(who, state.level);
      ctx.font = '14px -apple-system, sans-serif';
      ctx.fillStyle = '#ffe066';
      ctx.fillText(best ? tr('bestPrefix') + best.toFixed(1) + 's' : tr('noTime'), cx, cy + rh / 2 - 18);
    }
    ctx.font = '14px -apple-system, sans-serif';
    ctx.fillStyle = '#dce9f5';
    ctx.fillText(tr('hint'), W / 2, H * 0.88);
  } else if (state.mode === 'count') {
    const n = 3 - Math.floor(state.countT / 60);
    // scale-pop: each number/GO pops in large then settles to normal size
    const cycleT = state.countT % 60;
    const pop = cycleT < 12 ? 1.3 - (cycleT / 12) * 0.3 : 1;
    const baseSize = Math.min(110, W * 0.2);
    ctx.save();
    ctx.translate(W / 2, H * 0.4);
    ctx.scale(pop, pop);
    ctx.font = 'bold ' + baseSize + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 8;
    ctx.strokeText(n > 0 ? String(n) : tr('go'), 0, 0);
    ctx.fillText(n > 0 ? String(n) : tr('go'), 0, 0);
    ctx.restore();
  } else if (state.mode === 'finish') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    const big = Math.min(56, W * 0.09);
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = state.place === 1 ? '#ffd700' : '#dce9f5';
    ctx.fillText(state.medalWon ? tr('goldenMedal') : (state.place === 1 ? tr('firstPlace') : tr('secondPlace')), W / 2, H * 0.34);
    ctx.font = 'bold ' + Math.min(26, W * 0.05) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(tr('time') + ': ' + (player.finT / 60).toFixed(1) + 's    ' + state.bestMsg, W / 2, H * 0.48);
    ctx.fillText(state.medalWon ? tr('councilwomanHonor') : (state.place === 1 ? tr('ohanaPride') : tr('rematch')), W / 2, H * 0.58);
    ctx.font = '17px -apple-system, sans-serif';
    ctx.fillStyle = '#ffe066';
    ctx.fillText(tr('tapRace'), W / 2, H * 0.7);
  } else if (state.mode === 'ending') {
    drawEndingCeremony(t);
  }
}

// ============ TRACK 5 WIN CEREMONY ============
// Grand Councilwoman's ship descends, she walks out, and a medal rises —
// mirroring super-jumper.html's World 12 finale, palette-matched.
function drawEndingCeremony(t) {
  const sx = player.x - camX;
  const anchorX = Math.max(W * 0.15, Math.min(sx, W * 0.85));
  const gy = roadTop();
  const shipX = anchorX + 60 * K;

  // --- beat 1: ship descends (endT 0 -> ~150) ---
  const descendP = Math.min(1, state.endT / 150);
  const eased = 1 - Math.pow(1 - descendP, 3); // ease-out
  const shipTargetY = gy - 130 * K;
  const shipY = -140 * K + (shipTargetY - -140 * K) * eased;
  const landed = descendP >= 1;

  // thruster glow while still descending
  if (!landed) {
    ctx.fillStyle = 'rgba(125,220,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(shipX, shipY + 46 * K, 22 * K, 34 * K, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ship hull (saucer-ish body)
  ctx.fillStyle = '#9aa7c7';
  ctx.strokeStyle = '#5d6a8a';
  ctx.lineWidth = 2 * K;
  ctx.beginPath();
  ctx.moveTo(shipX - 60 * K, shipY);
  ctx.quadraticCurveTo(shipX - 66 * K, shipY + 26 * K, shipX - 30 * K, shipY + 32 * K);
  ctx.lineTo(shipX + 30 * K, shipY + 32 * K);
  ctx.quadraticCurveTo(shipX + 66 * K, shipY + 26 * K, shipX + 60 * K, shipY);
  ctx.quadraticCurveTo(shipX, shipY - 18 * K, shipX - 60 * K, shipY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // glass dome
  ctx.fillStyle = 'rgba(170,225,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(shipX, shipY - 4 * K, 26 * K, 16 * K, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // blinking amber lights along the hull rim
  const blink = Math.floor(t / 10) % 2;
  for (let i = -1; i <= 1; i++) {
    if ((i + 1) % 2 === blink) continue;
    ctx.fillStyle = '#ffd94d';
    ctx.beginPath();
    ctx.arc(shipX + i * 34 * K, shipY + 30 * K, 3.5 * K, 0, Math.PI * 2);
    ctx.fill();
  }

  // landing ramp, once landed
  if (landed) {
    ctx.fillStyle = '#b9c7d6';
    ctx.beginPath();
    ctx.moveTo(shipX - 20 * K, shipY + 30 * K);
    ctx.lineTo(shipX - 40 * K, gy + 4 * K);
    ctx.lineTo(shipX - 18 * K, gy + 4 * K);
    ctx.lineTo(shipX - 4 * K, shipY + 30 * K);
    ctx.closePath();
    ctx.fill();
  }

  if (!landed) return;

  // --- beat 2: the Grand Councilwoman walks out (endT ~150 -> ~280) ---
  const walk = Math.min(1, Math.max(0, (state.endT - 150) / 100));
  if (walk > 0) {
    const cwX = shipX - 30 * K + (anchorX - (shipX - 30 * K)) * walk;
    const cwY = gy + 2 * K;
    drawGrandCouncilwoman(cwX, cwY, t);
  }

  // --- beat 3: medal rises above the kart driver (endT ~280+) ---
  if (state.endT >= 280) {
    const rise = Math.min(1, (state.endT - 280) / 60);
    const medalY = (gy - 40 * K) - 26 * K * rise;
    ctx.globalAlpha = rise;
    drawWinnerMedal(anchorX, medalY, t);
    ctx.globalAlpha = 1;
  }

  // beat 4: payoff caption once the medal has fully risen
  if (state.endT >= 340) {
    const captionIn = Math.min(1, (state.endT - 340) / 40);
    ctx.globalAlpha = captionIn;
    ctx.font = 'bold ' + Math.min(30, W * 0.05) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 4;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(tr('medalEarned'), W / 2, H * 0.72);
    ctx.fillText(tr('medalEarned'), W / 2, H * 0.72);
    ctx.globalAlpha = 1;
  }

  // skip hint
  ctx.font = '17px -apple-system, sans-serif';
  ctx.fillStyle = '#ffe066';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(tr('tapSkip'), W / 2, H * 0.93);
}

function drawGrandCouncilwoman(x, gy, t) {
  const ROBE = '#4a3f7a', TRIM = '#5d5296', SKIN = '#cfc4e8';
  const sway = Math.sin(t / 140) * 2 * K;
  // long robe silhouette
  ctx.fillStyle = ROBE;
  ctx.beginPath();
  ctx.moveTo(x - 16 * K, gy);
  ctx.quadraticCurveTo(x - 20 * K, gy - 40 * K, x - 10 * K, gy - 68 * K);
  ctx.lineTo(x + 10 * K, gy - 68 * K);
  ctx.quadraticCurveTo(x + 20 * K, gy - 40 * K, x + 16 * K, gy);
  ctx.closePath();
  ctx.fill();
  // center-stripe trim
  ctx.fillStyle = TRIM;
  ctx.fillRect(x - 3 * K + sway, gy - 66 * K, 6 * K, 64 * K);
  // elongated neck
  ctx.fillStyle = SKIN;
  ctx.fillRect(x - 5 * K, gy - 84 * K, 10 * K, 18 * K);
  // high collar
  ctx.fillStyle = TRIM;
  ctx.beginPath();
  ctx.moveTo(x - 13 * K, gy - 68 * K);
  ctx.lineTo(x - 8 * K, gy - 80 * K);
  ctx.lineTo(x + 8 * K, gy - 80 * K);
  ctx.lineTo(x + 13 * K, gy - 68 * K);
  ctx.closePath();
  ctx.fill();
  // elongated head
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(x, gy - 96 * K, 10 * K, 15 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // serene closed eyes
  ctx.strokeStyle = '#3a2f60';
  ctx.lineWidth = 1.4 * K;
  ctx.beginPath();
  ctx.moveTo(x - 5 * K, gy - 96 * K);
  ctx.quadraticCurveTo(x - 2 * K, gy - 94 * K, x + 1 * K, gy - 96 * K);
  ctx.stroke();
}

function drawWinnerMedal(x, y, t) {
  // ribbon tails
  ctx.fillStyle = '#c62f42';
  ctx.beginPath();
  ctx.moveTo(x - 8 * K, y - 6 * K);
  ctx.lineTo(x - 1 * K, y - 6 * K);
  ctx.lineTo(x - 5 * K, y + 12 * K);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 1 * K, y - 6 * K);
  ctx.lineTo(x + 8 * K, y - 6 * K);
  ctx.lineTo(x + 5 * K, y + 12 * K);
  ctx.closePath();
  ctx.fill();

  // gold disc
  ctx.fillStyle = '#ffd24a';
  ctx.strokeStyle = '#d4a017';
  ctx.lineWidth = 2 * K;
  ctx.beginPath();
  ctx.arc(x, y, 14 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 5-point star cutout
  ctx.fillStyle = '#b8860b';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + i * (Math.PI * 2 / 5);
    const a2 = a + Math.PI / 5;
    const ox = x + Math.cos(a) * 6 * K, oy = y + Math.sin(a) * 6 * K;
    const ix = x + Math.cos(a2) * 2.4 * K, iy = y + Math.sin(a2) * 2.4 * K;
    if (i === 0) ctx.moveTo(ox, oy); else ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();

  // orbiting sparkles
  ctx.fillStyle = '#fff8d0';
  for (let i = 0; i < 4; i++) {
    const a = t / 40 + i * (Math.PI / 2);
    ctx.fillRect(x + Math.cos(a) * 22 * K - 1.5 * K, y + Math.sin(a) * 22 * K - 1.5 * K, 3 * K, 3 * K);
  }
}

// ============ MAIN LOOP ============
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(t) {
  requestAnimationFrame(loop);
  if (!last) last = t;
  acc += Math.min(t - last, 100);
  last = t;
  while (acc >= STEP) {
    update();
    acc -= STEP;
  }
  draw();
}
requestAnimationFrame(loop);
</script>
