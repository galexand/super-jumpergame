<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Super Jumper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    position: fixed;
  }
  #game {
    display: block;
    width: 100%; height: 100%;
  }
  .btn {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 3px solid rgba(255,255,255,0.5);
    color: #fff;
    font-size: 30px;
    font-family: -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    touch-action: none;
  }
  .btn:active, .btn.pressed { background: rgba(255,255,255,0.55); }
  #btnLeft  { left: max(20px, env(safe-area-inset-left)); }
  #btnRight { left: calc(max(20px, env(safe-area-inset-left)) + 90px); }
  #btnJump  {
    right: max(20px, env(safe-area-inset-right));
    width: 90px; height: 90px;
    background: rgba(255, 90, 90, 0.35);
    border-color: rgba(255, 120, 120, 0.6);
  }
  #btnJump:active, #btnJump.pressed { background: rgba(255, 90, 90, 0.65); }
  #btnFire {
    right: calc(max(20px, env(safe-area-inset-right)) + 110px);
    background: rgba(125, 255, 138, 0.3);
    border-color: rgba(125, 255, 138, 0.6);
    display: none;
  }
  #btnFire:active, #btnFire.pressed { background: rgba(125, 255, 138, 0.6); }
  #scores {
    position: fixed; inset: 0; z-index: 30;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.45);
    font-family: -apple-system, sans-serif;
  }
  #scoresCard {
    background: rgba(18,28,48,0.95);
    border: 2px solid rgba(255,215,0,0.5);
    border-radius: 18px;
    padding: 18px 22px;
    width: min(92vw, 400px);
    max-height: 90vh;
    color: #fff;
    display: flex; flex-direction: column; gap: 10px;
  }
  #scoresTitle { font-size: 24px; font-weight: 800; color: #ffd700; text-align: center; }
  #scoresSub { text-align: center; font-size: 16px; color: #cfe0ff; }
  #nameRow { display: flex; gap: 8px; }
  #nameInput {
    flex: 1; font-size: 18px; padding: 10px 12px; border-radius: 10px;
    border: 1px solid #6a7ba0; background: #0e1830; color: #fff; outline: none; min-width: 0;
  }
  #saveBtn, #againBtn {
    font-size: 17px; font-weight: 700; padding: 10px 16px; border-radius: 10px; border: none;
  }
  #saveBtn { background: #ffd700; color: #333; }
  #againBtn { background: #2ecc71; color: #fff; font-size: 19px; padding: 12px; }
  #scoreList {
    list-style: none; margin: 0; padding: 4px 2px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px; min-height: 40px;
  }
  #scoreList li {
    display: flex; gap: 8px; font-size: 16px; padding: 5px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.07); align-items: center;
  }
  #scoreList li.me { background: rgba(255,215,0,0.25); }
  #scoreList .rank { width: 24px; color: #ffd700; font-weight: 700; }
  #scoreList .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #scoreList .wl { color: #9fb4d8; font-size: 13px; }
  #scoreList .sc { font-weight: 700; color: #ffd700; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="btn" id="btnLeft">◀</div>
<div class="btn" id="btnRight">▶</div>
<div class="btn" id="btnJump">⬆</div>
<div class="btn" id="btnFire">✦</div>
<div id="scores">
  <div id="scoresCard">
    <div id="scoresTitle">🏆 High Scores</div>
    <div id="scoresSub"></div>
    <div id="nameRow">
      <input id="nameInput" maxlength="12" placeholder="Type your name" autocomplete="off" autocapitalize="characters">
      <button id="saveBtn">Save</button>
    </div>
    <ol id="scoreList"></ol>
    <button id="againBtn">Play again!</button>
  </div>
</div>

<script>
'use strict';

// ============ SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const TILE = 48;
let W = 0, H = 0, SCALE = 1;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Scale the game so ~7 tiles fit vertically on any screen
  SCALE = H / (TILE * 7.5);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// ============ SOUND (WebAudio, no files needed) ============
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type = 'square', vol = 0.08, slide = 0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sfx = {
  jump()  { beep(300, 0.25, 'square', 0.06, 400); },
  coin()  { beep(1200, 0.08, 'square', 0.06); setTimeout(() => beep(1600, 0.15, 'square', 0.06), 70); },
  stomp() { beep(200, 0.15, 'triangle', 0.1, -120); },
  hurt()  { beep(220, 0.4, 'sawtooth', 0.08, -160); },
  win()   { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'square', 0.07), i * 130)); },
  powerup(){ [400, 600, 800].forEach((f, i) => setTimeout(() => beep(f, 0.1, 'square', 0.06), i * 60)); },
  sprout(){ beep(440, 0.3, 'square', 0.06, 380); },
  aloha() { [523, 659, 880, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.16, 'triangle', 0.09), i * 90)); },
  toss()  { beep(300, 0.12, 'square', 0.05, -100); },
  drop()  { beep(700, 0.3, 'sawtooth', 0.05, -400); },
  pew()   { beep(900, 0.09, 'square', 0.05, -550); },
  zap()   { beep(320, 0.12, 'sawtooth', 0.05, -180); },
  scream(){ beep(1100, 0.5, 'sawtooth', 0.07, -600); setTimeout(() => beep(900, 0.35, 'square', 0.05, -400), 80); },
};

// ============ LEVELS ============
// = brick   ? coin-block   M panini-block   o coin   W pistol pickup   S rideable spacecraft   P start   F flag
// villains: H hamster   G big bruiser   R red clone (saucer-drop in W5+)   B sandwich thrower   T Mertle (scream = 10s nap)
// experiments: 1 Babyfier-151 (W6, like the hamster)   3 Amnesio-303 (W7, back to World 3!)
//              2 Sample-258 (W8, hyper curse: moves doubled)   0 Fibber-032 (W9, costs TWO hearts)
// friends:  L Lilo (speed + 4 arms)   N Nani (+1 heart)   D David (higher jump)
//           K Pleakley (coin magnet)  A Angel (heart refill)  J Jumba (shield)
const LEVELS = [
[
  '                                                                                          ',
  '                                                                                          ',
  '                                                                                          ',
  '            o o                 ooo                                                       ',
  '           =====        M                    oo                =                          ',
  '                                =?=         ====      o o                                 ',
  '   P             H                                 G  ===   H        G           F       ',
  '  ==========================  =====================================================       ',
  '  ==========================  =====================================================       ',
],
[
  '                                                                                              ',
  '                                                                                              ',
  '                  ooo                                oo                                       ',
  '                 =====            o o o                    K                                  ',
  '        M                        =======        ====     ====                                 ',
  '   P          H         G                  T              o                G       F          ',
  '  ========  =====  ==============================  ==   =====  =====================          ',
  '  ========  =====  ==============================  ==   =====  =====================          ',
  '                                                                                              ',
],
[
  '                                                                                                    ',
  '                                                                                                    ',
  '     oo         o                                                                                   ',
  '    ====     M  =   Doo     ooo       o o o o                        ooo                            ',
  '                    ====   =====     =========            =        =====                            ',
  '   P     H              G          B             G    H   =    G             H  G        F          ',
  '  =====================================  ==========================  =====================          ',
  '  =====================================  ==========================  =====================          ',
  '                                                                                                    ',
],
[
  '                                                                                                  ',
  '                                                                                                  ',
  '                                 L                                                                ',
  '                                ===                                                               ',
  '                            ==              oo                   ooo                              ',
  '        oo              ==         ooo     ====        M       =====        o o o                 ',
  '   P          H                =====     G      B             G     T           G      F         ',
  '  ==========================================================  ====================================',
  '  ==========================================================  ====================================',
],
[
  '                                                                                                              ',
  '                                                                                                              ',
  '                                                                                                              ',
  '                              oo                                                                              ',
  '        o o                                             ooo                       N                           ',
  '                    ===                 M              ====                     ===                           ',
  '   P   S    H     G              G   R            G  R              G     G   B             G   G      F     ',
  '  ========================   ================  ===============   =======================  ====================',
  '  ========================   ================  ===============   =======================  ====================',
],
[
  '',
  '',
  '                                 J',
  '                                ===               oo',
  '                            ==                         ooo',
  '                        ==                             M                    ===',
  '   P        H       R          =====       R    G   B       R         G     R     1       G         F',
  '  ======================================  ======================   ===================  ====================',
  '  ======================================  ======================   ===================  ====================',
],
[
  '',
  '',
  '',
  '                                                            oo',
  '                   Woo                        A',
  '                    M                        ===',
  '   P          R         R     B       R                G    R       R     3     R       G         F',
  '  ===============================   ===============  ==================  =================================',
  '  ===============================   ===============  ==================  =================================',
],
[
  '',
  '',
  '                                                                     N',
  '                                        Woo                         ===',
  '                               oo                               ==',
  '                              M                             ==',
  '   P        G     R     B           G     R       G     R          =====    G     R   2     G         F',
  '  =========================   ================   =======================================  ====================',
  '  =========================   ================   =======================================  ====================',
],
[
  '',
  '',
  '',
  '                                                                                          ooo',
  '                          A                     Wo                     o',
  '                         ===                   ====                   M',
  '   P        R   G     H         R     G       R     0           G   R     G         R     G   H         F',
  '  =======================================  ===============   ===================  ==============================',
  '  =======================================  ===============   ===================  ==============================',
],
[
  '',
  '',
  '',
  '               oo',
  '                               W               o                   o',
  '                              ===             ===                 M',
  '   P      G   R           G   R   H         G     R           G       R         G   R           G   G       F',
  '  ==================   ===============  ===============   ================  ==============   =======================',
  '  ==================   ===============  ===============   ================  ==============   =======================',
],
[
  '',
  '',
  '',
  '            oo                 ooo                                  ooo',
  '           ====               =====              W         ====   =====',
  '                        M',
  '   P      H     R      B        G     1      R     T       0     G      R     B       G      F',
  '  ==========================  ====================================================   ===============',
  '  ==========================  ====================================================   ===============',
],
];

// ============ GAME STATE ============
const state = {
  level: 0,
  lives: 3,
  maxLives: 3,
  coins: 0,
  score: 0,
  mode: 'title', // title | play | dead | win | gameover | levelclear
  modeTimer: 0,
};

let tiles = [], levelW = 0, levelH = 0;
let coinsList = [], enemies = [], particles = [], bumps = [], mushrooms = [], friends = [], sandwiches = [];
let guns = [], bolts = [], rideShips = [];
let camX = 0;

const player = {
  x: 0, y: 0, vx: 0, vy: 0,
  w: TILE * 0.62, h: TILE * 0.8,
  onGround: false, facing: 1,
  coyote: 0, jumpBuf: 0, invuln: 0,
  runFrame: 0,
};

function loadLevel(n) {
  const map = LEVELS[n];
  levelH = map.length;
  levelW = Math.max(...map.map(r => r.length));
  tiles = [];
  coinsList = [];
  enemies = [];
  particles = [];
  bumps = [];
  mushrooms = [];
  friends = [];
  sandwiches = [];
  guns = [];
  bolts = [];
  rideShips = [];
  player.flying = false; // the spacecraft stays behind between levels
  player.hyper = 0;       // Sample's curse wears off between levels
  player.sleep = 0;       // and Stitch wakes up
  for (let y = 0; y < levelH; y++) {
    tiles[y] = [];
    for (let x = 0; x < levelW; x++) {
      const c = map[y][x] || ' ';
      tiles[y][x] = ' ';
      if (c === '=' || c === '?' || c === 'M') tiles[y][x] = c;
      else if (c === 'F') tiles[y][x] = 'F';
      else if (c === 'o') coinsList.push({ x, y, taken: false, phase: Math.random() * 6 });
      else if ('EGHRB1320T'.includes(c)) {
        // G bruiser, H/E hamster, R red clone, B sandwich-thrower, digits = experiments
        const kind = c === 'E' ? 'H' : c;
        const SPEC = {
          G: { w: 0.9,  h: 1.0,  vx: -0.9 },
          H: { w: 0.7,  h: 0.62, vx: -1.6 },
          R: { w: 0.68, h: 0.74, vx: -2.1 },
          B: { w: 0.78, h: 0.68, vx: 0 },
          '1': { w: 0.7,  h: 0.64, vx: -1.6 },
          '3': { w: 0.7,  h: 0.66, vx: -1.2 },
          '2': { w: 0.7,  h: 0.68, vx: -1.4 },
          '0': { w: 0.72, h: 0.66, vx: -1.0 },
          T:   { w: 0.6,  h: 0.95, vx: -0.8 },
        }[kind];
        const eh = TILE * SPEC.h;
        const en = {
          x: x * TILE, y: y * TILE + TILE - eh,
          w: TILE * SPEC.w, h: eh, kind,
          vx: SPEC.vx,
          alive: true, squash: 0, frame: Math.random() * 10,
        };
        // from world 5 on, red clones arrive by spacecraft
        if (kind === 'R' && n >= 4) {
          en.inShip = true;
          en.shipY = TILE * 1.4;
          en.y = en.shipY;
        }
        // from world 7 the bruisers carry blasters; from world 9 the red clones too.
        // Amnesio, Sample and Fibber always shoot.
        if ((kind === 'G' && n >= 6) || (kind === 'R' && n >= 8) || '320'.includes(kind)) en.armed = true;
        enemies.push(en);
      }
      else if (c === 'W') guns.push({ x, y, taken: false, phase: Math.random() * 6 });
      else if (c === 'S') rideShips.push({
        x: x * TILE - TILE * 0.15, y: y * TILE + TILE * 0.25,
        w: TILE * 1.3, h: TILE * 0.75, taken: false, phase: Math.random() * 6,
      });
      else if ('LNDKAJ'.includes(c)) {
        const fw = c === 'J' ? TILE * 0.85 : TILE * 0.6;
        const fh = c === 'J' ? TILE * 0.9 : TILE * 0.95;
        friends.push({ kind: c, x: x * TILE + (TILE - fw) / 2, y: y * TILE + TILE - fh, w: fw, h: fh, found: false, wave: Math.random() * 6 });
      }
      else if (c === 'P') { player.x = x * TILE; player.y = y * TILE; }
    }
  }
  player.vx = 0; player.vy = 0; player.invuln = 0;
  camX = 0;
}

// ============ INPUT ============
const keys = { left: false, right: false, jump: false, fire: false };
let jumpPressed = false; // edge trigger

function setKey(k, v) {
  if (k === 'jump' && v && !keys.jump) jumpPressed = true;
  keys[k] = v;
}

window.addEventListener('keydown', e => {
  initAudio();
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') setKey('left', true);
  if (e.code === 'ArrowRight' || e.code === 'KeyD') setKey('right', true);
  if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') { setKey('jump', true); e.preventDefault(); }
  if (e.code === 'KeyF' || e.code === 'KeyX') setKey('fire', true);
  if (e.code === 'KeyP') {
    if (state.mode === 'play') state.mode = 'paused';
    else if (state.mode === 'paused') state.mode = 'play';
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') setKey('left', false);
  if (e.code === 'ArrowRight' || e.code === 'KeyD') setKey('right', false);
  if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') setKey('jump', false);
  if (e.code === 'KeyF' || e.code === 'KeyX') setKey('fire', false);
});

function bindButton(id, key) {
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); initAudio(); setKey(key, true); el.classList.add('pressed'); };
  const off = e => { e.preventDefault(); setKey(key, false); el.classList.remove('pressed'); };
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindButton('btnLeft', 'left');
bindButton('btnRight', 'right');
bindButton('btnJump', 'jump');
bindButton('btnFire', 'fire');
const btnFireEl = document.getElementById('btnFire');

// Tap anywhere to start / continue
canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); handleTap(); }, { passive: false });
canvas.addEventListener('mousedown', () => { initAudio(); handleTap(); });

function handleTap() {
  if (state.mode === 'title' || state.mode === 'gameover' || state.mode === 'win') {
    state.level = 0; state.lives = 3; state.maxLives = 3; state.coins = 0; state.score = 0;
    setSize(false);
    player.fast = false; player.surf = false; player.magnet = false; player.shield = false;
    player.gun = false; player.fireCD = 0;
    loadLevel(0);
    state.mode = 'play';
  } else if (state.mode === 'play') {
    state.mode = 'paused';
  } else if (state.mode === 'paused') {
    state.mode = 'play';
  }
}

// Prevent iOS bounce/zoom (but let the high-score list scroll)
document.addEventListener('touchmove', e => {
  if (!scoresEl.contains(e.target)) e.preventDefault();
}, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());

// ============ HIGH SCORES ============
const SCORES_KEY = 'superJumperScores', NAME_KEY = 'superJumperName';
const scoresEl = document.getElementById('scores');
const nameRowEl = document.getElementById('nameRow');
const nameInputEl = document.getElementById('nameInput');
const scoreListEl = document.getElementById('scoreList');
let scoreSaved = false;
let scoresCache = null;

function loadScores() {
  if (scoresCache) return scoresCache;
  try { scoresCache = JSON.parse(localStorage.getItem(SCORES_KEY)) || []; }
  catch (e) { scoresCache = []; }
  return scoresCache;
}

function renderScoreList(highlight) {
  const scores = loadScores();
  scoreListEl.innerHTML = '';
  if (!scores.length) {
    scoreListEl.innerHTML = '<li><span class="nm">No scores yet — be the first!</span></li>';
    return;
  }
  scores.forEach((s, i) => {
    const li = document.createElement('li');
    if (i === highlight) li.className = 'me';
    li.innerHTML = '<span class="rank">' + (i + 1) + '</span><span class="nm"></span>' +
                   '<span class="wl">W' + (s.world || 1) + '</span><span class="sc">' + s.score + '</span>';
    li.querySelector('.nm').textContent = s.name;
    scoreListEl.appendChild(li);
  });
}

function showScoreOverlay() {
  if (state.mode !== 'gameover' && state.mode !== 'win') return;
  scoresEl.style.display = 'flex';
  document.getElementById('scoresSub').textContent = 'Your score: ' + state.score + '  ·  coins: ' + state.coins;
  nameRowEl.style.display = scoreSaved ? 'none' : 'flex';
  nameInputEl.value = localStorage.getItem(NAME_KEY) || '';
  renderScoreList(-1);
}

function submitScore() {
  if (scoreSaved) return;
  const name = (nameInputEl.value.trim() || 'STITCH').slice(0, 12);
  try { localStorage.setItem(NAME_KEY, name); } catch (e) {}
  const scores = loadScores().slice();
  const entry = { name, score: state.score, coins: state.coins, world: state.level + 1 };
  scores.push(entry);
  scores.sort((a, b) => b.score - a.score);
  scoresCache = scores.slice(0, 10);
  try { localStorage.setItem(SCORES_KEY, JSON.stringify(scoresCache)); } catch (e) {}
  scoreSaved = true;
  nameRowEl.style.display = 'none';
  renderScoreList(scoresCache.indexOf(entry));
  sfx.coin();
  nameInputEl.blur();
}

function onRunEnd() {
  scoreSaved = false;
  setTimeout(showScoreOverlay, 900);
}

document.getElementById('saveBtn').addEventListener('click', () => { initAudio(); submitScore(); });
document.getElementById('againBtn').addEventListener('click', () => {
  initAudio();
  scoresEl.style.display = 'none';
  nameInputEl.blur();
  if (state.mode === 'gameover' || state.mode === 'win') handleTap();
});
nameInputEl.addEventListener('keydown', e => {
  e.stopPropagation(); // don't let typing drive the game controls
  if (e.key === 'Enter') submitScore();
});

// ============ PHYSICS ============
function solidAt(px, py) {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (ty < 0 || tx < 0 || tx >= levelW) return false;
  if (ty >= levelH) return false;
  const t = tiles[ty] && tiles[ty][tx];
  return t === '=' || t === '?' || t === 'M';
}

function tileAt(px, py) {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (ty < 0 || tx < 0 || tx >= levelW || ty >= levelH) return ' ';
  return tiles[ty][tx];
}

function moveEntity(e) {
  // horizontal
  e.x += e.vx;
  if (e.vx > 0) {
    if (solidAt(e.x + e.w, e.y + 2) || solidAt(e.x + e.w, e.y + e.h - 2)) {
      e.x = Math.floor((e.x + e.w) / TILE) * TILE - e.w - 0.01;
      e.hitWall = true;
    } else e.hitWall = false;
  } else if (e.vx < 0) {
    if (solidAt(e.x, e.y + 2) || solidAt(e.x, e.y + e.h - 2)) {
      e.x = (Math.floor(e.x / TILE) + 1) * TILE + 0.01;
      e.hitWall = true;
    } else e.hitWall = false;
  }
  // vertical
  e.y += e.vy;
  e.onGround = false;
  if (e.vy > 0) {
    if (solidAt(e.x + 2, e.y + e.h) || solidAt(e.x + e.w - 2, e.y + e.h)) {
      e.y = Math.floor((e.y + e.h) / TILE) * TILE - e.h - 0.01;
      e.vy = 0;
      e.onGround = true;
    }
  } else if (e.vy < 0) {
    if (solidAt(e.x + 2, e.y) || solidAt(e.x + e.w - 2, e.y)) {
      const ty = Math.floor(e.y / TILE);
      e.y = (ty + 1) * TILE + 0.01;
      e.vy = 0;
      return ty; // hit a block above — return tile row for ?-blocks
    }
  }
  return -1;
}

function hitBlockAbove(ty) {
  // which tile did the player's head hit?
  const txL = Math.floor((player.x + 2) / TILE);
  const txR = Math.floor((player.x + player.w - 2) / TILE);
  for (const tx of [txL, txR]) {
    const t = tiles[ty] && tiles[ty][tx];
    if (t === '?') {
      tiles[ty][tx] = '=';
      state.coins++;
      state.score += 100;
      sfx.coin();
      bumps.push({ x: tx, y: ty, t: 0 });
      spawnParticles(tx * TILE + TILE / 2, ty * TILE, '#ffd700', 8);
      return;
    }
    if (t === 'M') {
      tiles[ty][tx] = '=';
      sfx.sprout();
      bumps.push({ x: tx, y: ty, t: 0 });
      mushrooms.push({
        x: tx * TILE + TILE * 0.15, y: ty * TILE - TILE * 0.72,
        w: TILE * 0.7, h: TILE * 0.7, vx: 1.4, vy: 0,
        ice: Math.random() < 0.5, // sometimes it's ice cream!
      });
      return;
    }
  }
}

function setSize(big) {
  const feet = player.y + player.h;
  player.big = big;
  player.w = big ? TILE * 0.8 : TILE * 0.62;
  player.h = big ? TILE * 1.04 : TILE * 0.8;
  player.y = feet - player.h;
}

function crashShip() {
  // the spacecraft takes the hit — Stitch hops out unharmed
  player.flying = false;
  player.invuln = 90;
  sfx.hurt();
  spawnParticles(player.x + player.w / 2, player.y + player.h, '#9aa7c7', 14);
}

function applyExperimentHit(kind) {
  // the experiments' special attacks (touch or bolt)
  if (player.invuln > 0 || state.mode !== 'play') return;
  if (kind === '3') {
    // Amnesio-303: total memory wipe — Stitch wakes up back in World 3
    sfx.hurt();
    setSize(false);
    player.flying = false;
    state.level = 2;
    loadLevel(2);
    player.invuln = 120;
    state.mode = 'amnesia';
    state.modeTimer = 130;
  } else if (kind === '2') {
    // Sample-258: the beat curse — runs and jumps are doubled for a while
    player.hyper = 600;
    player.invuln = 60;
    sfx.zap();
    spawnParticles(player.x + player.w / 2, player.y, '#c77dff', 10);
  } else if (kind === '0') {
    // Fibber-032: harsh — TWO hearts at once (the shield still saves you)
    if (player.shield) {
      player.shield = false;
      player.invuln = 90;
      sfx.hurt();
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#7adcff', 12);
      return;
    }
    state.lives--;
    killPlayer();
  }
}

function damagePlayer() {
  if (player.invuln > 0 || state.mode !== 'play') return;
  if (player.flying) {
    crashShip();
    return;
  }
  if (player.shield) {
    // Jumba's shield absorbs one hit completely
    player.shield = false;
    player.invuln = 90;
    sfx.hurt();
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#7adcff', 12);
  } else if (player.big) {
    // big Stitch just shrinks back — no heart lost
    setSize(false);
    player.invuln = 90;
    sfx.hurt();
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#5fa8e8', 10);
  } else {
    killPlayer();
  }
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 6 - 2,
      life: 30 + Math.random() * 20,
      color,
    });
  }
}

// ============ UPDATE ============
function update() {
  if (state.mode === 'dead' || state.mode === 'levelclear' || state.mode === 'amnesia') {
    state.modeTimer--;
    if (state.modeTimer <= 0) {
      if (state.mode === 'amnesia') {
        state.mode = 'play'; // World 3 was already loaded by Amnesio
      } else if (state.mode === 'dead') {
        if (state.lives <= 0) { state.mode = 'gameover'; onRunEnd(); }
        else { loadLevel(state.level); state.mode = 'play'; }
      } else {
        state.level++;
        if (state.level >= LEVELS.length) { state.mode = 'win'; onRunEnd(); }
        else { loadLevel(state.level); state.mode = 'play'; }
      }
    }
    return;
  }
  if (state.mode !== 'play') return;

  // --- player movement ---
  const FRICTION = 0.82, GRAVITY = 0.62;
  const hyper = player.hyper > 0; // Sample's beat curse: every move is doubled
  const asleep = player.sleep > 0; // Mertle screamed — nap time
  const JUMP = (player.surf ? -15.4 : -13.2) * (hyper ? 1.35 : 1);
  const ACCEL = (player.fast ? 0.72 : 0.55) * (hyper ? 1.7 : 1);
  const MAXSPD = (player.fast ? 6.4 : 4.6) * (hyper ? 2 : 1);
  if (keys.left && !asleep)  { player.vx -= ACCEL; player.facing = -1; }
  if (keys.right && !asleep) { player.vx += ACCEL; player.facing = 1; }
  if ((!keys.left && !keys.right) || asleep) player.vx *= FRICTION;
  player.vx = Math.max(-MAXSPD, Math.min(MAXSPD, player.vx));
  if (Math.abs(player.vx) < 0.05) player.vx = 0;

  if (player.flying) {
    // spacecraft: hold jump to rise, release to sink gently
    player.vy += keys.jump ? -0.5 : 0.35;
    player.vy = Math.max(-4.5, Math.min(4, player.vy));
    jumpPressed = false;
    if (player.y < 4) { player.y = 4; player.vy = Math.max(0, player.vy); }
  } else {
    player.vy += GRAVITY;
    if (player.vy > 14) player.vy = 14;

    // coyote time + jump buffer make jumping feel forgiving for kids
    if (player.onGround) player.coyote = 8; else player.coyote--;
    if (jumpPressed) { if (!asleep) player.jumpBuf = 8; jumpPressed = false; }
    else player.jumpBuf--;

    if (player.jumpBuf > 0 && player.coyote > 0) {
      player.vy = JUMP;
      player.coyote = 0;
      player.jumpBuf = 0;
      sfx.jump();
    }
    // variable jump height: release early = shorter jump
    if (!keys.jump && player.vy < -5) player.vy = -5;
  }

  const headHit = moveEntity(player);
  if (headHit >= 0) hitBlockAbove(headHit);

  if (player.invuln > 0) player.invuln--;
  if (player.hyper > 0) player.hyper--;
  if (player.sleep > 0) {
    player.sleep--;
    player.invuln = Math.max(player.invuln, 2); // nobody bothers a sleeping Stitch
  }
  if (Math.abs(player.vx) > 0.5 && player.onGround) player.runFrame += Math.abs(player.vx) * 0.06;

  // --- plasma pistol ---
  player.fireCD = Math.max(0, (player.fireCD || 0) - 1);
  if (player.fireAnim) player.fireAnim--;
  if (player.gun && keys.fire && player.fireCD === 0 && !asleep) {
    player.fireCD = 18;
    player.fireAnim = 6;
    bolts.push({
      x: player.x + (player.facing > 0 ? player.w + 2 : -2),
      y: player.y + player.h * 0.45,
      vx: player.facing * 9, from: 'player', life: 90,
    });
    sfx.pew();
  }

  // parked spacecraft: walk into it to board and fly
  for (const sp of rideShips) {
    if (sp.taken) continue;
    sp.phase += 0.06;
    if (player.x < sp.x + sp.w && player.x + player.w > sp.x &&
        player.y < sp.y + sp.h && player.y + player.h > sp.y) {
      sp.taken = true;
      player.flying = true;
      player.vy = -2;
      state.score += 500;
      sfx.powerup();
      spawnParticles(sp.x + sp.w / 2, sp.y, '#9ad9ff', 12);
    }
  }

  // pistol pickups
  for (const g of guns) {
    if (g.taken) continue;
    g.phase += 0.08;
    const gx = g.x * TILE + TILE / 2, gy = g.y * TILE + TILE / 2 + Math.sin(g.phase) * 4;
    if (player.x < gx + 16 && player.x + player.w > gx - 16 &&
        player.y < gy + 16 && player.y + player.h > gy - 16) {
      g.taken = true;
      player.gun = true;
      state.score += 500;
      sfx.powerup();
      spawnParticles(gx, gy, '#7dff8a', 12);
    }
  }

  // --- plasma bolts ---
  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i];
    b.x += b.vx;
    b.life--;
    if (b.life <= 0 || solidAt(b.x, b.y)) {
      spawnParticles(b.x, b.y, b.from === 'player' ? '#7dff8a' : '#ffb066', 4);
      bolts.splice(i, 1);
      continue;
    }
    if (b.from === 'player') {
      // bolts cancel each other in mid-air
      const counter = bolts.findIndex(o => o.from === 'enemy' && Math.abs(o.x - b.x) < 16 && Math.abs(o.y - b.y) < 16);
      if (counter >= 0) {
        spawnParticles(b.x, b.y, '#fff', 8);
        bolts.splice(Math.max(i, counter), 1);
        bolts.splice(Math.min(i, counter), 1);
        sfx.zap();
        continue;
      }
      let hit = false;
      for (const en of enemies) {
        if (!en.alive || en.inShip || en.kind === 'T') continue; // bolts never hit Mertle
        if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
          hit = true;
          if (en.kind === 'G' && !en.shell) {
            // plasma knocks the bruiser into his shell; a second bolt finishes him
            en.shell = true; en.shellTimer = 300; en.dir = Math.sign(en.vx) || -1; en.vx = 0;
            state.score += 100;
          } else {
            en.alive = false;
            en.squash = 0;
            state.score += { G: 500, R: 300, B: 250, '0': 400, '3': 350, '2': 350 }[en.kind] || 200;
          }
          sfx.zap();
          spawnParticles(b.x, b.y, '#7dff8a', 8);
          break;
        }
      }
      if (hit) { bolts.splice(i, 1); continue; }
    } else {
      // enemy bolt vs Stitch
      if (b.x > player.x - 4 && b.x < player.x + player.w + 4 &&
          b.y > player.y - 4 && b.y < player.y + player.h + 4) {
        bolts.splice(i, 1);
        spawnParticles(b.x, b.y, '#ffb066', 6);
        if (b.fx && '320'.includes(b.fx)) applyExperimentHit(b.fx);
        else damagePlayer();
        if (state.mode !== 'play') return; // Amnesio may have swapped the whole level
        continue;
      }
    }
  }

  // golden sparkle trail while Lilo's speed boost is active
  if (player.fast && player.onGround && Math.abs(player.vx) > 5 && Math.random() < 0.35) {
    particles.push({
      x: player.x + player.w / 2 - player.facing * 14, y: player.y + player.h - 4,
      vx: -player.facing * (1 + Math.random()), vy: -Math.random() * 1.2,
      life: 16, color: '#ffe066',
    });
  }

  // fell off the world
  if (player.y > levelH * TILE + TILE * 3) killPlayer();

  // keep inside level bounds on the left
  if (player.x < 0) { player.x = 0; player.vx = 0; }

  // --- coins ---
  for (const c of coinsList) {
    if (c.taken) continue;
    c.phase += 0.1;
    let cx = c.x * TILE + TILE / 2 + (c.ox || 0), cy = c.y * TILE + TILE / 2 + (c.oy || 0);
    // Pleakley's coin magnet pulls nearby coins in
    if (player.magnet) {
      const ddx = player.x + player.w / 2 - cx, ddy = player.y + player.h / 2 - cy;
      const d = Math.hypot(ddx, ddy) || 1;
      if (d < 150) {
        c.ox = (c.ox || 0) + ddx / d * 3.5;
        c.oy = (c.oy || 0) + ddy / d * 3.5;
        cx = c.x * TILE + TILE / 2 + c.ox;
        cy = c.y * TILE + TILE / 2 + c.oy;
      }
    }
    if (player.x < cx + 14 && player.x + player.w > cx - 14 &&
        player.y < cy + 14 && player.y + player.h > cy - 14) {
      c.taken = true;
      state.coins++;
      state.score += 50;
      sfx.coin();
      spawnParticles(cx, cy, '#ffd700', 6);
    }
  }

  // --- enemies ---
  for (const en of enemies) {
    if (en.inShip) {
      // riding his spacecraft until Stitch gets close, then he drops in
      en.frame += 0.15;
      if (Math.abs((player.x + player.w / 2) - (en.x + en.w / 2)) < TILE * 7) {
        en.inShip = false;
        en.shipLeave = 1;
        en.vy = 1.5;
        sfx.drop();
      }
      continue;
    }
    if (en.shipLeave && en.shipLeave < 90) en.shipLeave++;
    if (!en.alive) {
      en.squash++;
      // squashed hamster cries a little tear fountain
      if ('H1'.includes(en.kind) && en.squash < 45 && en.squash % 6 === 0) {
        for (const s of [-1, 1]) particles.push({
          x: en.x + en.w / 2 + s * en.w * 0.2, y: en.y + en.h - 8,
          vx: s * (1 + Math.random() * 1.5), vy: -2.5 - Math.random() * 1.5,
          life: 26, color: '#8fd0ff',
        });
      }
      continue;
    }
    en.frame += 0.15;
    en.vy = (en.vy || 0) + 0.62;
    if (en.vy > 12) en.vy = 12;
    if (en.shell) {
      // tucked in his shell: sits still until he pops back out
      en.shellTimer--;
      if (en.shellTimer <= 0) { en.shell = false; en.vx = (en.dir || -1) * 0.9; }
      moveEntity(en);
    } else {
      // turn around at walls and cliff edges
      const aheadX = en.vx < 0 ? en.x - 2 : en.x + en.w + 2;
      const groundAhead = solidAt(aheadX, en.y + en.h + 6);
      moveEntity(en);
      if (en.hitWall || (en.onGround && !groundAhead)) en.vx = -en.vx;
      // the red clone hops along
      if (en.kind === 'R' && en.onGround) {
        en.hopT = (en.hopT || 0) + 1;
        if (en.hopT > 90) { en.vy = -8.5; en.hopT = Math.random() * 40; }
      }
      // armed villains fire back when Stitch is in range and roughly level with them
      if (en.armed) {
        en.gunT = (en.gunT === undefined ? 100 : en.gunT) - 1;
        const gdx = (player.x + player.w / 2) - (en.x + en.w / 2);
        if (en.gunT <= 0 && Math.abs(gdx) < 520 &&
            Math.abs((player.y + player.h) - (en.y + en.h)) < TILE * 1.5) {
          en.gunT = en.kind === 'R' ? 200 : 160;
          bolts.push({
            x: en.x + (gdx > 0 ? en.w + 4 : -4),
            y: en.y + en.h * 0.4,
            vx: Math.sign(gdx) * 6.5, from: 'enemy', fx: en.kind, life: 120,
          });
          sfx.zap();
        }
      }
      // the lazy golden clone stands his ground and lobs sandwiches
      if (en.kind === 'B') {
        en.vx = 0;
        const pdx = (player.x + player.w / 2) - (en.x + en.w / 2);
        en.face = pdx < 0 ? -1 : 1;
        en.throwT = (en.throwT === undefined ? 90 : en.throwT) - 1;
        if (en.throwT <= 0 && Math.abs(pdx) < 430 && Math.abs(player.y - en.y) < 220) {
          en.throwT = 150;
          sandwiches.push({
            x: en.x + en.w / 2, y: en.y + 8,
            vx: en.face * (2.6 + Math.min(2, Math.abs(pdx) / 250)),
            vy: -6.5, spin: Math.random() * 6,
          });
          sfx.toss();
        }
      }
      // Mertle stops to scream when Stitch is near
      if (en.kind === 'T') {
        if (en.scream > 0) {
          en.scream--;
          en.vx = 0;
          if (en.scream === 0) en.vx = (en.sdir || -1) * 0.8;
        } else {
          en.sdir = Math.sign(en.vx) || en.sdir || -1;
          en.screamT = (en.screamT === undefined ? 140 : en.screamT) - 1;
          const tdx = Math.abs((player.x + player.w / 2) - (en.x + en.w / 2));
          if (en.screamT <= 0 && tdx < 380) {
            en.screamT = 220;
            en.scream = 45;
            sfx.scream();
          }
        }
      }
    }
    // fell into a pit
    if (en.y > levelH * TILE + TILE * 4) { en.alive = false; en.squash = 999; continue; }

    // collide with player
    if (player.x < en.x + en.w && player.x + player.w > en.x &&
        player.y < en.y + en.h && player.y + player.h > en.y) {
      if (player.vy > 1.5 && player.y + player.h - en.y < TILE * 0.6) {
        if (en.kind === 'T') {
          // you can't squash Mertle — she just screams louder
          player.vy = -8;
          en.scream = 45;
          en.screamT = 220;
          sfx.scream();
        } else if (en.kind === 'G' && !en.shell) {
          // the big bruiser is tough: first stomp tucks him into his shell
          en.shell = true;
          en.shellTimer = 300;
          en.dir = Math.sign(en.vx) || -1;
          en.vx = 0;
          player.vy = -8;
          state.score += 100;
          sfx.stomp();
          spawnParticles(en.x + en.w / 2, en.y, '#8296ab', 6);
        } else {
          // stomp!
          en.alive = false;
          en.squash = 0;
          player.vy = -8;
          state.score += { G: 500, R: 300, B: 250, '0': 400, '3': 350, '2': 350 }[en.kind] || 200;
          sfx.stomp();
          spawnParticles(en.x + en.w / 2, en.y,
            { G: '#8296ab', R: '#e05252', B: '#e8c66a', '1': '#f2a0c0', '3': '#6db8ff', '2': '#c77dff', '0': '#ff5555' }[en.kind] || '#f0f0f0', 8);
        }
      } else if (player.invuln <= 0 && !en.shell) {
        if (en.kind === 'T') {
          // Mertle's scream knocks Stitch asleep for 10 seconds
          player.sleep = 600;
          player.vx = 0;
          en.scream = 45;
          en.screamT = 220;
          sfx.scream();
          spawnParticles(player.x + player.w / 2, player.y, '#cfc4f5', 10);
        }
        else if ('320'.includes(en.kind)) applyExperimentHit(en.kind);
        else damagePlayer();
        if (state.mode !== 'play') return; // Amnesio may have swapped the whole level
      }
    }
  }

  // --- friends ---
  for (const fr of friends) {
    fr.wave += 0.08;
    if (fr.found) {
      // they cheer and send up little hearts
      if (Math.random() < 0.02) particles.push({
        x: fr.x + fr.w / 2, y: fr.y - 4,
        vx: (Math.random() - 0.5) * 1.5, vy: -1.2, life: 40, color: '#ff87a2',
      });
      continue;
    }
    if (player.x < fr.x + fr.w && player.x + player.w > fr.x &&
        player.y < fr.y + fr.h && player.y + player.h > fr.y) {
      fr.found = true;
      state.score += 1000;
      sfx.aloha();
      spawnParticles(fr.x + fr.w / 2, fr.y + fr.h / 2, '#ff87a2', 14);
      if (fr.kind === 'L') player.fast = true;                 // Lilo: speed + 4 arms
      else if (fr.kind === 'D') player.surf = true;            // David: higher jumps
      else if (fr.kind === 'K') player.magnet = true;          // Pleakley: coin magnet
      else if (fr.kind === 'J') player.shield = true;          // Jumba: one-hit shield
      else if (fr.kind === 'A') state.lives = state.maxLives;  // Angel: heart refill
      else if (fr.kind === 'N') {                              // Nani: +1 max heart
        state.maxLives = Math.min(5, state.maxLives + 1);
        state.lives = Math.min(state.maxLives, state.lives + 1);
      }
    }
  }

  // --- mushrooms ---
  for (let i = mushrooms.length - 1; i >= 0; i--) {
    const m = mushrooms[i];
    m.vy += 0.4;
    if (m.vy > 10) m.vy = 10;
    moveEntity(m);
    if (m.hitWall) m.vx = -m.vx;
    if (m.y > levelH * TILE + TILE * 3) { mushrooms.splice(i, 1); continue; }
    if (player.x < m.x + m.w && player.x + player.w > m.x &&
        player.y < m.y + m.h && player.y + player.h > m.y) {
      mushrooms.splice(i, 1);
      state.score += m.ice ? 750 : 500;
      sfx.powerup();
      if (!player.big) setSize(true);
      spawnParticles(m.x + m.w / 2, m.y + m.h / 2, m.ice ? '#ff9ec6' : '#e2574c', 10);
    }
  }

  // --- thrown sandwiches: they only shrink you, never hurt ---
  for (let i = sandwiches.length - 1; i >= 0; i--) {
    const s = sandwiches[i];
    s.vy += 0.35;
    s.x += s.vx;
    s.y += s.vy;
    s.spin += 0.15;
    if (solidAt(s.x, s.y) || s.y > levelH * TILE + TILE * 2) {
      spawnParticles(s.x, s.y, '#e8c66a', 5);
      sandwiches.splice(i, 1);
      continue;
    }
    if (s.x > player.x - 10 && s.x < player.x + player.w + 10 &&
        s.y > player.y - 10 && s.y < player.y + player.h + 10) {
      sandwiches.splice(i, 1);
      spawnParticles(s.x, s.y, '#e8c66a', 8);
      if (player.big) {
        setSize(false);
        player.invuln = 60;
        sfx.hurt();
      } else {
        sfx.stomp(); // just a bop — a sandwich can't hurt a small Stitch
      }
    }
  }

  // --- flag / level end ---
  const midX = player.x + player.w / 2, midY = player.y + player.h / 2;
  if (tileAt(midX, midY) === 'F' || tileAt(midX, midY + player.h / 2 - 2) === 'F') {
    state.mode = 'levelclear';
    state.modeTimer = 120;
    state.score += 1000;
    sfx.win();
  }

  // --- particles & block bumps ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = bumps.length - 1; i >= 0; i--) {
    bumps[i].t++;
    if (bumps[i].t > 14) bumps.splice(i, 1);
  }

  // --- camera ---
  const viewW = W / SCALE;
  let target = player.x + player.w / 2 - viewW * 0.4;
  target = Math.max(0, Math.min(target, levelW * TILE - viewW));
  camX += (target - camX) * 0.12;
}

function killPlayer() {
  if (state.mode !== 'play') return;
  setSize(false); // the panini size is lost, but friends' gifts stay
  player.flying = false;
  player.hyper = 0;
  state.lives--;
  state.mode = 'dead';
  state.modeTimer = 80;
  sfx.hurt();
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#5fa8e8', 14);
}

// ============ DRAWING ============
// scenery themes: Hawaii (W1-3), beach (W4-7), alien planet (W8-10), Lilo's house (W11)
const THEMES = [
  { sky: ['#4a90d9', '#8ec9f0', '#b8e0f7'],
    dirt: '#b5651d', dirtSpot: '#8b4513', grass: '#5fbf3f', grassDark: '#4aa32e',
    brick: '#a0522d', brickLine: '#7a3e20', hill: '#6ab04c' },
  { sky: ['#3f9bd9', '#8fd0ee', '#ffe9c4'],
    dirt: '#dbb56e', dirtSpot: '#c19a4f', grass: '#f0d998', grassDark: '#e0bd72',
    brick: '#d8ae62', brickLine: '#b8904a', hill: '#ecd9a8' },
  { sky: ['#241040', '#4a2470', '#7a4694'],
    dirt: '#6d4090', dirtSpot: '#54307a', grass: '#6fe3c1', grassDark: '#4cc9a5',
    brick: '#5d3580', brickLine: '#43265e', hill: '#3a1f5c' },
  { sky: ['#f7e6c8', '#f3dcb2', '#eccd9c'],
    dirt: '#a06a3c', dirtSpot: '#875529', grass: '#c98d4e', grassDark: '#a87440',
    brick: '#8a5a34', brickLine: '#6d4526', hill: '#d9b98c' },
];
let theme = THEMES[0];
function draw() {
  // the fire button only exists once the pistol is found
  const showFire = player.gun ? 'flex' : 'none';
  if (btnFireEl.style.display !== showFire) btnFireEl.style.display = showFire;

  // themed sky
  const themeIdx = state.level <= 2 ? 0 : state.level <= 6 ? 1 : state.level <= 9 ? 2 : 3;
  theme = THEMES[themeIdx];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, theme.sky[0]);
  grad.addColorStop(0.7, theme.sky[1]);
  grad.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.scale(SCALE, SCALE);
  const groundY = (levelH - 2) * TILE;
  const span = levelW * TILE + 800;
  const wrap = (v) => ((v % span) + span) % span - 200;

  if (themeIdx === 2) {
    // alien night: stars and two moons
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 40; i++) {
      ctx.fillRect(wrap(i * 173 + 60 - camX * 0.1), (i * 89) % Math.max(120, groundY - 80), 2, 2);
    }
    ctx.fillStyle = '#e8d9f7';
    ctx.beginPath();
    ctx.arc(wrap(700 - camX * 0.15), 90, 34, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#b9e0d9';
    ctx.beginPath();
    ctx.arc(wrap(1500 - camX * 0.12), 150, 20, 0, Math.PI * 2);
    ctx.fill();
    // jagged spire silhouettes
    ctx.fillStyle = '#33184f';
    for (let i = 0; i < 12; i++) {
      const sx = wrap(i * 420 - camX * 0.4);
      const sh = 130 + (i % 3) * 60;
      ctx.beginPath();
      ctx.moveTo(sx, groundY);
      ctx.lineTo(sx + 45, groundY - sh);
      ctx.lineTo(sx + 62, groundY - sh + 34);
      ctx.lineTo(sx + 92, groundY - sh - 42);
      ctx.lineTo(sx + 150, groundY);
      ctx.closePath();
      ctx.fill();
    }
    // glowing crystals near the ground
    for (let i = 0; i < 14; i++) {
      const cx2 = wrap(i * 300 + 120 - camX * 0.8);
      ctx.fillStyle = i % 2 ? 'rgba(125,255,205,0.7)' : 'rgba(190,140,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(cx2, groundY);
      ctx.lineTo(cx2 + 8, groundY - 26 - (i % 3) * 9);
      ctx.lineTo(cx2 + 16, groundY);
      ctx.closePath();
      ctx.fill();
    }
  } else if (themeIdx === 3) {
    // inside Lilo's house: wainscot, night windows, family photos, furniture
    ctx.fillStyle = '#eed2a3';
    ctx.fillRect(-250, groundY - 84, span + 400, 84);
    ctx.fillStyle = '#caa06b';
    ctx.fillRect(-250, groundY - 88, span + 400, 6);
    // windows with the Hawaiian night outside
    for (let i = 0; i < 7; i++) {
      const wx = wrap(i * 620 + 80 - camX * 0.45);
      const wy = groundY - 250;
      ctx.fillStyle = '#fffbe8';
      ctx.fillRect(wx - 8, wy - 8, 116, 146);
      ctx.fillStyle = '#1d2a52';
      ctx.fillRect(wx, wy, 100, 130);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(wx + 12, wy + 18, 2, 2);
      ctx.fillRect(wx + 70, wy + 34, 2, 2);
      ctx.fillRect(wx + 40, wy + 96, 2, 2);
      ctx.fillStyle = '#f5eec9';
      ctx.beginPath();
      ctx.arc(wx + 75, wy + 22, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fffbe8';
      ctx.fillRect(wx + 48, wy, 4, 130);
      ctx.fillRect(wx, wy + 62, 100, 4);
      // curtains
      ctx.fillStyle = '#c65a4e';
      ctx.fillRect(wx - 14, wy - 8, 14, 146);
      ctx.fillRect(wx + 100, wy - 8, 14, 146);
    }
    // framed family photos
    for (let i = 0; i < 8; i++) {
      const fx = wrap(i * 540 + 320 - camX * 0.45);
      const fy = groundY - 220 + (i % 2) * 30;
      ctx.fillStyle = '#8a5a34';
      ctx.fillRect(fx, fy, 46, 36);
      ctx.fillStyle = i % 2 ? '#9fd4ef' : '#f3c98b';
      ctx.fillRect(fx + 5, fy + 5, 36, 26);
      ctx.fillStyle = i % 2 ? '#3d9c4f' : '#c65a4e';
      ctx.beginPath();
      ctx.arc(fx + 23, fy + 20, 7, 0, Math.PI * 2);
      ctx.fill();
    }
    // couch, glowing floor lamp, bookshelf with a plant
    for (let i = 0; i < 6; i++) {
      const px2 = wrap(i * 700 + 150 - camX * 0.7);
      if (i % 3 === 0) {
        ctx.fillStyle = '#b8524a';
        ctx.fillRect(px2, groundY - 46, 130, 46);
        ctx.beginPath();
        ctx.ellipse(px2 + 10, groundY - 48, 14, 20, 0, 0, Math.PI * 2);
        ctx.ellipse(px2 + 120, groundY - 48, 14, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#d0685f';
        ctx.fillRect(px2 + 14, groundY - 40, 48, 18);
        ctx.fillRect(px2 + 66, groundY - 40, 48, 18);
      } else if (i % 3 === 1) {
        ctx.strokeStyle = '#8a5a34';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(px2, groundY);
        ctx.lineTo(px2, groundY - 92);
        ctx.stroke();
        ctx.fillStyle = '#f3c98b';
        ctx.beginPath();
        ctx.moveTo(px2 - 20, groundY - 92);
        ctx.lineTo(px2 + 20, groundY - 92);
        ctx.lineTo(px2 + 12, groundY - 118);
        ctx.lineTo(px2 - 12, groundY - 118);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,220,140,0.25)';
        ctx.beginPath();
        ctx.arc(px2, groundY - 80, 40, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#8a5a34';
        ctx.fillRect(px2, groundY - 86, 78, 86);
        for (let s2 = 0; s2 < 2; s2++) {
          for (let b2 = 0; b2 < 6; b2++) {
            ctx.fillStyle = ['#c65a4e', '#3d9c4f', '#3a5da8', '#e8a13c'][(b2 + s2) % 4];
            ctx.fillRect(px2 + 6 + b2 * 11, groundY - 78 + s2 * 40, 9, 32);
          }
        }
        ctx.fillStyle = '#b8524a';
        ctx.fillRect(px2 + 92, groundY - 22, 26, 22);
        ctx.strokeStyle = '#3d9c4f';
        ctx.lineWidth = 4;
        for (const a2 of [-0.5, 0, 0.5]) {
          ctx.beginPath();
          ctx.moveTo(px2 + 105, groundY - 20);
          ctx.quadraticCurveTo(px2 + 105 + a2 * 30, groundY - 45, px2 + 105 + a2 * 44, groundY - 58);
          ctx.stroke();
        }
      }
    }
  } else {
    // clouds
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (let i = 0; i < 8; i++) {
      drawCloud(wrap(i * 420 + 100 - camX * 0.3), 60 + (i % 3) * 55);
    }
  }

  if (themeIdx === 0) {
    // Hawaii: lush volcanic mountains, green hills, palm trees
    ctx.fillStyle = '#4e7d5b';
    for (let i = 0; i < 8; i++) {
      const mx = wrap(i * 640 - camX * 0.3);
      ctx.beginPath();
      ctx.moveTo(mx, groundY);
      ctx.lineTo(mx + 160, groundY - 200 - (i % 2) * 55);
      ctx.lineTo(mx + 330, groundY);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = theme.hill;
    for (let i = 0; i < 10; i++) {
      ctx.beginPath();
      ctx.arc(wrap(i * 500 - camX * 0.5), groundY + 40, 130 + (i % 2) * 60, Math.PI, 0);
      ctx.fill();
    }
    for (let i = 0; i < 9; i++) {
      drawPalm(wrap(i * 460 + 240 - camX * 0.75), groundY, 1 + (i % 2) * 0.25);
    }
  } else if (themeIdx === 1) {
    // beach: sea on the horizon, pale dunes, palms and umbrellas
    ctx.fillStyle = '#2e86c9';
    ctx.fillRect(-250, groundY - 46, span + 400, 46);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 30; i++) {
      ctx.fillRect(wrap(i * 160 - camX * 0.45 + Math.sin(Date.now() / 900 + i) * 8), groundY - 40 + (i % 3) * 12, 26, 2.5);
    }
    ctx.fillStyle = theme.hill;
    for (let i = 0; i < 10; i++) {
      ctx.beginPath();
      ctx.arc(wrap(i * 520 - camX * 0.55), groundY + 60, 120 + (i % 2) * 50, Math.PI, 0);
      ctx.fill();
    }
    for (let i = 0; i < 8; i++) {
      const px2 = wrap(i * 520 + 200 - camX * 0.75);
      if (i % 3 === 2) drawUmbrella(px2, groundY);
      else drawPalm(px2, groundY, 1 + (i % 2) * 0.2);
    }
  }

  ctx.translate(-camX, 0);

  const startX = Math.max(0, Math.floor(camX / TILE) - 1);
  const endX = Math.min(levelW, Math.ceil((camX + W / SCALE) / TILE) + 1);

  // tiles
  for (let y = 0; y < levelH; y++) {
    for (let x = startX; x < endX; x++) {
      const t = tiles[y][x];
      if (t === ' ') continue;
      let by = y * TILE;
      const bump = bumps.find(b => b.x === x && b.y === y);
      if (bump) by -= Math.sin(bump.t / 14 * Math.PI) * 10;

      if (t === '=') drawBrick(x * TILE, by, y);
      else if (t === '?') drawQBlock(x * TILE, by);
      else if (t === 'M') drawMBlock(x * TILE, by);
      else if (t === 'F') drawFlag(x * TILE, by);
    }
  }

  // coins
  for (const c of coinsList) {
    if (c.taken) continue;
    const cx = c.x * TILE + TILE / 2 + (c.ox || 0), cy = c.y * TILE + TILE / 2 + Math.sin(c.phase) * 4 + (c.oy || 0);
    const squish = Math.abs(Math.cos(c.phase * 0.7));
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 11 * Math.max(0.25, squish), 13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d4a017';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // panini pickups
  for (const m of mushrooms) drawPanini(m);

  // thrown sandwiches
  for (const s of sandwiches) drawSandwich(s.x, s.y, 20, s.spin);

  // pistol pickups
  for (const g of guns) {
    if (g.taken) continue;
    drawPistol(g.x * TILE + TILE / 2, g.y * TILE + TILE / 2 + Math.sin(g.phase) * 4, 1.2, 1);
  }

  // parked spacecraft, hovering invitingly
  for (const sp of rideShips) {
    if (sp.taken) continue;
    drawSaucerAt(sp.x + sp.w / 2, sp.y + sp.h, Math.sin(sp.phase) * 3, false, true);
  }

  // plasma bolts
  for (const b of bolts) {
    ctx.fillStyle = b.from === 'player' ? '#7dff8a'
      : { '3': '#6db8ff', '2': '#c77dff', '0': '#ff5555' }[b.fx] || '#ffb066';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 9, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 4.5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // friends
  for (const fr of friends) drawFriend(fr);

  // enemies (squashed hamsters linger a bit longer so you can see them cry)
  for (const en of enemies) {
    if (en.kind === 'R' && (en.inShip || (en.shipLeave && en.shipLeave < 90))) drawShip(en);
    if (en.inShip) continue; // he's inside the saucer
    if (!en.alive && en.squash > ('H1'.includes(en.kind) ? 55 : 25)) continue;
    drawEnemy(en);
  }

  // player
  if (state.mode === 'play' || state.mode === 'levelclear' || state.mode === 'paused') {
    if (player.flying) drawSaucerAt(player.x + player.w / 2, player.y + player.h + 8, 0, keys.jump, false);
    if (!(player.invuln > 0 && Math.floor(player.invuln / 4) % 2)) drawPlayer();
    if (player.sleep > 0) {
      // Zzz drifting up while he naps
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 15px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const zt = Date.now() / 500;
      ctx.fillText('z', player.x + player.w / 2 + 13, player.y - 6 - (zt % 1) * 12);
      ctx.fillText('Z', player.x + player.w / 2 + 22, player.y - 16 - ((zt + 0.5) % 1) * 12);
    }
    // Jumba's shield bubble
    if (player.shield) {
      ctx.strokeStyle = 'rgba(122,220,255,0.65)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(player.x + player.w / 2, player.y + player.h / 2,
              TILE * 0.72 + Math.sin(Date.now() / 180) * 2, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  drawHUD();
  drawOverlays();
}

function drawPalm(x, gy, s) {
  ctx.save();
  ctx.translate(x, gy);
  ctx.scale(s, s);
  // curved trunk
  ctx.strokeStyle = '#9a6a3a';
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(10, -60, 34, -96);
  ctx.stroke();
  // fronds
  ctx.strokeStyle = '#3d9c4f';
  ctx.lineWidth = 7;
  for (let a = 0; a < 6; a++) {
    const ang = -Math.PI * 0.9 + a * 0.36;
    ctx.beginPath();
    ctx.moveTo(34, -96);
    ctx.quadraticCurveTo(34 + Math.cos(ang) * 30, -108 + Math.sin(ang) * 30,
                         34 + Math.cos(ang) * 62, -82 + Math.sin(ang) * 62);
    ctx.stroke();
  }
  // coconuts
  ctx.fillStyle = '#6e4a26';
  ctx.beginPath();
  ctx.arc(28, -90, 5, 0, Math.PI * 2);
  ctx.arc(40, -88, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawUmbrella(x, gy) {
  ctx.save();
  ctx.translate(x, gy);
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(10, -78);
  ctx.stroke();
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = i % 2 ? '#e85d5d' : '#fff';
    ctx.beginPath();
    ctx.moveTo(10, -78);
    ctx.arc(10, -78, 52, Math.PI + i * (Math.PI / 6), Math.PI + (i + 1) * (Math.PI / 6));
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawCloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI * 2);
  ctx.arc(x + 25, y - 8, 26, 0, Math.PI * 2);
  ctx.arc(x + 52, y, 20, 0, Math.PI * 2);
  ctx.fill();
}

function drawBrick(px, py, row) {
  const isTop = row > 0 && (!tiles[row - 1] || tiles[row - 1][Math.floor(px / TILE)] === ' ' || tiles[row - 1][Math.floor(px / TILE)] === undefined);
  if (isTop) {
    // grassy (or sandy / mossy-alien) top block
    ctx.fillStyle = theme.dirt;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = theme.dirtSpot;
    ctx.fillRect(px + 4, py + 18, 8, 8);
    ctx.fillRect(px + 24, py + 30, 10, 8);
    ctx.fillStyle = theme.grass;
    ctx.fillRect(px, py, TILE, 12);
    ctx.fillStyle = theme.grassDark;
    ctx.fillRect(px, py + 10, TILE, 3);
  } else {
    ctx.fillStyle = theme.brick;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = theme.brickLine;
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);
    ctx.beginPath();
    ctx.moveTo(px, py + TILE / 2); ctx.lineTo(px + TILE, py + TILE / 2);
    ctx.moveTo(px + TILE / 2, py); ctx.lineTo(px + TILE / 2, py + TILE / 2);
    ctx.moveTo(px + TILE / 4, py + TILE / 2); ctx.lineTo(px + TILE / 4, py + TILE);
    ctx.moveTo(px + TILE * 3 / 4, py + TILE / 2); ctx.lineTo(px + TILE * 3 / 4, py + TILE);
    ctx.stroke();
  }
}

function drawQBlock(px, py) {
  ctx.fillStyle = '#f5a623';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.strokeStyle = '#c77f00';
  ctx.lineWidth = 3;
  ctx.strokeRect(px + 2, py + 2, TILE - 4, TILE - 4);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', px + TILE / 2, py + TILE / 2 + 2);
}

function drawSandwich(cx, cy, s, rot) {
  // a little panini: crusty bread, lettuce, ham, cheese
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  const w2 = s * 0.46;
  // bottom bread
  ctx.fillStyle = '#e0a955';
  ctx.fillRect(-w2, s * 0.08, w2 * 2, s * 0.16);
  // lettuce ruffle
  ctx.fillStyle = '#7fc25c';
  ctx.beginPath();
  for (let i = -3; i <= 3; i++) ctx.arc(i * w2 / 3, s * 0.08, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // ham
  ctx.fillStyle = '#f08a8a';
  ctx.fillRect(-w2 * 0.95, -s * 0.02, w2 * 1.9, s * 0.09);
  // cheese corner poking out
  ctx.fillStyle = '#f5cf4a';
  ctx.beginPath();
  ctx.moveTo(-w2 * 0.2, -s * 0.02);
  ctx.lineTo(w2 * 0.8, s * 0.1);
  ctx.lineTo(w2 * 0.15, -s * 0.02);
  ctx.closePath();
  ctx.fill();
  // domed top bread with crust shine
  ctx.fillStyle = '#e0a955';
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.02, w2, s * 0.2, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f2d9a4';
  ctx.beginPath();
  ctx.ellipse(-w2 * 0.3, -s * 0.13, w2 * 0.3, s * 0.05, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawMBlock(px, py) {
  ctx.fillStyle = '#e8a13c';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.strokeStyle = '#b5741f';
  ctx.lineWidth = 3;
  ctx.strokeRect(px + 2, py + 2, TILE - 4, TILE - 4);
  drawSandwich(px + TILE / 2, py + TILE * 0.52, 28, 0);
}

function drawIceCream(m) {
  const cx = m.x + m.w / 2, base = m.y + m.h;
  // waffle cone
  ctx.fillStyle = '#d9a05b';
  ctx.beginPath();
  ctx.moveTo(cx - 9, base - 18);
  ctx.lineTo(cx + 9, base - 18);
  ctx.lineTo(cx, base);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#b57d3c';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - 6, base - 12); ctx.lineTo(cx + 2, base - 4);
  ctx.moveTo(cx - 2, base - 16); ctx.lineTo(cx + 6, base - 8);
  ctx.moveTo(cx + 6, base - 12); ctx.lineTo(cx - 2, base - 4);
  ctx.stroke();
  // scoops + cherry
  ctx.fillStyle = '#f7a8c9';
  ctx.beginPath(); ctx.arc(cx, base - 22, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fdf3e3';
  ctx.beginPath(); ctx.arc(cx, base - 31, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#d8283c';

}

function drawPanini(m) {
  if (m.ice) return drawIceCream(m);
  drawSandwich(m.x + m.w / 2, m.y + m.h * 0.55, m.w, 0);

  ctx.fillStyle = '#222';

}

function drawFlag(px, py) {
  // the goal: Lilo & Stitch's house — blue walls on stilts, big red roof with a dome
  const baseY = py + TILE;
  const cx = px + TILE / 2;
  const floorY = baseY - 52;
  const wallTop = floorY - 62;
  ctx.save();
  // stilts
  ctx.fillStyle = '#b9c7d6';
  for (const sx of [-38, -10, 18, 44]) ctx.fillRect(cx + sx, floorY, 6, baseY - floorY);
  // stairs up to the porch
  ctx.strokeStyle = '#dfe8f0';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(cx - 78, baseY); ctx.lineTo(cx - 44, floorY + 4);
  ctx.moveTo(cx - 66, baseY); ctx.lineTo(cx - 32, floorY + 4);
  ctx.stroke();
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let st = 1; st <= 4; st++) {
    const t = st / 5;
    ctx.moveTo(cx - 78 + 34 * t, baseY - (baseY - floorY - 4) * t);
    ctx.lineTo(cx - 66 + 34 * t, baseY - (baseY - floorY - 4) * t);
  }
  ctx.stroke();
  // porch floor
  ctx.fillStyle = '#8fa8c4';
  ctx.fillRect(cx - 52, floorY, 108, 7);
  // blue walls
  ctx.fillStyle = '#7fb4d9';
  ctx.fillRect(cx - 44, wallTop, 94, floorY - wallTop);
  ctx.fillStyle = '#5f98c4';
  ctx.fillRect(cx + 26, wallTop, 24, floorY - wallTop);
  // door + windows
  ctx.fillStyle = '#a8563e';
  ctx.fillRect(cx - 40, floorY - 34, 16, 34);
  ctx.fillStyle = '#28406b';
  ctx.fillRect(cx - 14, wallTop + 16, 18, 22);
  ctx.fillRect(cx + 12, wallTop + 16, 18, 22);
  ctx.strokeStyle = '#fffbe8';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - 14, wallTop + 16, 18, 22);
  ctx.strokeRect(cx + 12, wallTop + 16, 18, 22);
  // big red roof
  ctx.fillStyle = '#c94f3d';
  ctx.beginPath();
  ctx.moveTo(cx - 62, wallTop + 2);
  ctx.lineTo(cx + 68, wallTop + 2);
  ctx.lineTo(cx + 32, wallTop - 32);
  ctx.lineTo(cx - 22, wallTop - 32);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#a83c2e';
  ctx.fillRect(cx - 62, wallTop, 130, 5);
  // dome turret with round window
  ctx.fillStyle = '#7fb4d9';
  ctx.fillRect(cx - 6, wallTop - 50, 24, 18);
  ctx.fillStyle = '#c94f3d';
  ctx.beginPath();
  ctx.arc(cx + 6, wallTop - 50, 16, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#28406b';
  ctx.beginPath();
  ctx.arc(cx + 6, wallTop - 42, 5, 0, Math.PI * 2);
  ctx.fill();
  // welcoming glow from the door + a bouncing star
  ctx.fillStyle = 'rgba(255,220,120,0.35)';
  ctx.beginPath();
  ctx.ellipse(cx - 32, floorY - 16, 10, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = '18px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⭐', cx + 6, wallTop - 74 + Math.sin(Date.now() / 300) * 4);
  ctx.restore();
}

function drawLilo(li) {
  const cx = li.x + li.w / 2, py = li.y, w = li.w, h = li.h;
  const bob = Math.sin(li.wave) * 1.5;
  const SKIN = '#d9976a', HAIR = '#1c1b22', DRESS = '#d63a2f';
  ctx.save();
  // long black hair behind
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(cx, py + h * 0.26 + bob, w * 0.58, h * 0.26, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(cx - w * 0.58, py + h * 0.26 + bob, w * 1.16, h * 0.3);
  // arms
  ctx.strokeStyle = SKIN;
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (li.found) {
    // cheering with both arms up!
    ctx.moveTo(cx - w * 0.2, py + h * 0.52 + bob);
    ctx.lineTo(cx - w * 0.58, py + h * 0.3 + Math.sin(li.wave * 2) * 3 + bob);
    ctx.moveTo(cx + w * 0.2, py + h * 0.52 + bob);
    ctx.lineTo(cx + w * 0.58, py + h * 0.3 - Math.sin(li.wave * 2) * 3 + bob);
  } else {
    // waving hello
    ctx.moveTo(cx - w * 0.2, py + h * 0.52 + bob);
    ctx.lineTo(cx - w * 0.42, py + h * 0.68 + bob);
    ctx.moveTo(cx + w * 0.2, py + h * 0.52 + bob);
    ctx.lineTo(cx + w * 0.55, py + h * 0.38 + Math.sin(li.wave * 2) * 4 + bob);
  }
  ctx.stroke();
  // legs
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.16, py + h * 0.88);
  ctx.lineTo(cx - w * 0.16, py + h - 1);
  ctx.moveTo(cx + w * 0.16, py + h * 0.88);
  ctx.lineTo(cx + w * 0.16, py + h - 1);
  ctx.stroke();
  // red dress with white leaf pattern
  ctx.fillStyle = DRESS;
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.26, py + h * 0.42 + bob);
  ctx.lineTo(cx + w * 0.26, py + h * 0.42 + bob);
  ctx.lineTo(cx + w * 0.5, py + h * 0.92);
  ctx.lineTo(cx - w * 0.5, py + h * 0.92);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  for (const [dx, dy, rot] of [[-0.18, 0.6, 0.6], [0.15, 0.72, -0.4], [-0.02, 0.84, 0.9]]) {
    ctx.save();
    ctx.translate(cx + w * dx, py + h * dy + bob * 0.5);
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, 2, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // face + bangs
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(cx, py + h * 0.28 + bob, w * 0.4, h * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(cx, py + h * 0.19 + bob, w * 0.42, h * 0.12, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // flower in her hair
  ctx.fillStyle = '#f7f7fb';
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx + w * 0.34 + Math.cos(a) * 3, py + h * 0.15 + bob + Math.sin(a) * 3, 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#ffd54d';
  ctx.beginPath();
  ctx.arc(cx + w * 0.34, py + h * 0.15 + bob, 1.8, 0, Math.PI * 2);
  ctx.fill();
  // eyes + smile
  ctx.fillStyle = '#26211f';
  ctx.beginPath();
  ctx.arc(cx - w * 0.15, py + h * 0.28 + bob, 1.8, 0, Math.PI * 2);
  ctx.arc(cx + w * 0.15, py + h * 0.28 + bob, 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8a4b32';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, py + h * 0.31 + bob, 3.5, 0.3, Math.PI - 0.3);
  ctx.stroke();
  ctx.restore();
}

function drawPistol(cx, cy, s, dir) {
  // little sci-fi ray-gun pointing in `dir`
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s * dir, s);
  ctx.fillStyle = '#7d8898';
  ctx.fillRect(-8, -6, 18, 7);
  ctx.fillStyle = '#4dd8ff';
  ctx.fillRect(10, -5.5, 4, 6);

  ctx.strokeStyle = '#5d6a8a';
  ctx.lineWidth = 2;
  ctx.strokeRect(-8.5, -6.5, 19, 8);
  ctx.restore();
}

function drawFriend(fr) {
  if (fr.kind === 'L') drawLilo(fr);
  else if (fr.kind === 'N') drawNani(fr);
  else if (fr.kind === 'D') drawDavid(fr);
  else if (fr.kind === 'K') drawPleakley(fr);
  else if (fr.kind === 'A') drawAngel(fr);
  else if (fr.kind === 'J') drawJumba(fr);
}

  if (fr.found) {

  } else {

  ctx.beginPath();
  ctx.arc(cx, py + h * 0.06 + bob, 2, 0, Math.PI * 2);

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, py + h * 0.23 + bob, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = DGRN;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#2b2b33';
  ctx.beginPath();
  ctx.arc(cx, py + h * 0.24 + bob, 2.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5d6830';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, py + h * 0.31 + bob, 3.5, 0.4, Math.PI - 0.4);
