<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ohana Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #3f9bd9 0%, #8fd0ee 55%, #ffe9c4 100%);
    background-attachment: fixed;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: max(28px, env(safe-area-inset-top)) 20px 60px;
    text-align: center;
  }
  h1 {
    font-size: clamp(34px, 9vw, 52px);
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.18);
    margin: 18px 0 6px;
  }
  .sub {
    color: rgba(255,255,255,0.95);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 30px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }
  #games { display: flex; flex-direction: column; gap: 18px; }
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.93);
    border-radius: 20px;
    padding: 18px 20px;
    text-decoration: none;
    color: #23364a;
    box-shadow: 0 6px 18px rgba(20,60,90,0.18);
    transition: transform 0.12s ease;
    text-align: left;
  }
  .card:active { transform: scale(0.97); }
  .card .icon {
    font-size: 44px;
    flex: 0 0 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #eaf6ff, #d2ecff);
    border-radius: 16px;
  }
  .card h2 { font-size: 21px; margin-bottom: 3px; }
  .card p { font-size: 14px; color: #55708a; line-height: 1.35; }
  .card .play {
    margin-left: auto;
    flex: 0 0 auto;
    background: #2ecc71;
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 12px;
  }
  footer {
    margin-top: 44px;
    color: rgba(35,54,74,0.75);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🌺 Ohana Arcade</h1>
  <div class="sub">Pick a game and play — on iPad, iPhone or computer!</div>
  <div id="games"></div>
  <footer>Ohana means family — family means nobody gets left behind.</footer>
</div>
<script>
'use strict';
// Add new games here — the list below is always shown in alphabetical order.
const GAMES = [
  {
    title: 'Super Jumper',
    href: 'super-jumper.html',
    icon: '🌺',
    desc: '12-world platform adventure: Stitch (and Lilo!), friends with powers, experiment villains and a golden medal.',
  },
  {
    title: 'Ohana Karts',
    href: 'ohana-karts.html',
    icon: '🏎️',
    desc: 'Race Lilo or Stitch along the Hawaiian beach — dodge Gantu, Hämsterviel and Reuben to reach the finish line first!',
  },
  {
    title: 'Whack Hämsterviel',
    href: 'whack-hamsterviel.html',
    icon: '🔨',
    desc: 'Bonk Hämsterviel on the head as he pops out of his burrows — but do not hit Stitch, Lilo or Angel! Beat the clock.',
  },
];

const box = document.getElementById('games');
GAMES.sort((a, b) => a.title.localeCompare(b.title)).forEach(g => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = g.href;
  a.innerHTML = '<div class="icon"></div><div><h2></h2><p></p></div><div class="play">PLAY</div>';
  a.querySelector('.icon').textContent = g.icon;
  a.querySelector('h2').textContent = g.title;
  a.querySelector('p').textContent = g.desc;
  box.appendChild(a);
});
</script>
</body>
</html>
