  ctx.arc(cx + 6, py + h * 0.27 + bob, 1.8, 0, Math.PI * 2);
  ctx.arc(cx - 10, py + h * 0.18 + bob, 1.1, 0, Math.PI * 2);
  ctx.arc(cx + 10, py + h * 0.18 + bob, 1.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2a1a38';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, py + h * 0.3 + bob, 7, 0.25, Math.PI - 0.25);
  ctx.stroke();
  ctx.restore();
}

function drawSaucerAt(cx, baseY, bob, thrust, dome) {
  const sy = baseY + bob;
  if (dome) {
    ctx.fillStyle = 'rgba(170,225,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(cx, sy - 14, 17, 15, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#9aa7c7';
  ctx.beginPath();
  ctx.ellipse(cx, sy - 8, 30, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5d6a8a';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath();
  ctx.arc(cx - 16, sy - 7, 2.5, 0, Math.PI * 2);
  ctx.arc(cx, sy - 5, 2.5, 0, Math.PI * 2);
  ctx.arc(cx + 16, sy - 7, 2.5, 0, Math.PI * 2);
  ctx.fill();
  if (thrust) {
    ctx.fillStyle = 'rgba(125,220,255,0.6)';
    ctx.beginPath();
    ctx.ellipse(cx, sy + 3, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawShip(en) {
  // little flying saucer that delivers the red clone
  const cx = en.x + en.w / 2;
  const leave = en.shipLeave || 0;
  const sy = en.shipY - leave * leave * 0.05 + (leave ? 0 : Math.sin(en.frame) * 3);
  ctx.save();
  // glass dome (with the clone peeking out while riding)
  ctx.fillStyle = 'rgba(170,225,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(cx, sy - 10, 15, 13, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  if (en.inShip) {
    ctx.fillStyle = '#c94038';
    ctx.beginPath();
    ctx.arc(cx, sy - 12, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffd94d';
    ctx.beginPath();
    ctx.arc(cx - 3, sy - 13, 1.8, 0, Math.PI * 2);
    ctx.arc(cx + 3, sy - 13, 1.8, 0, Math.PI * 2);
    ctx.fill();
  }
  // saucer body
  ctx.fillStyle = '#9aa7c7';
  ctx.beginPath();
  ctx.ellipse(cx, sy - 6, 26, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5d6a8a';
  ctx.lineWidth = 2;
  ctx.stroke();
  // running lights
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath();
  ctx.arc(cx - 14, sy - 5, 2.5, 0, Math.PI * 2);
  ctx.arc(cx, sy - 3, 2.5, 0, Math.PI * 2);
  ctx.arc(cx + 14, sy - 5, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // thruster glow when flying away
  if (leave) {
    ctx.fillStyle = 'rgba(255,180,80,0.6)';
    ctx.beginPath();
    ctx.ellipse(cx, sy + 4, 8, 5 + leave * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawEnemy(en) {
  const px = en.x, py = en.y, w = en.w, h = en.h;
  const cx = px + w / 2;
  ctx.save();
  if (!en.alive) {
    // squashed
    ctx.translate(cx, py + h);
    ctx.scale(1.3, 0.35);
    ctx.translate(-cx, -(py + h));
  }
  const waddle = en.alive ? Math.sin(en.frame) * 2 : 0;
  const lookX = en.vx < 0 ? -1.5 : 1.5;

  if (en.kind === 'G' && en.shell && en.alive) {
    // tucked into his shell — shakes just before popping back out
    const shake = en.shellTimer < 90 ? Math.sin(en.frame * 6) * 1.5 : 0;
    ctx.fillStyle = '#68809a';
    ctx.beginPath();
    ctx.ellipse(cx + shake, py + h, w * 0.52, h * 0.52, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2e3c4e';
    ctx.beginPath();
    ctx.ellipse(cx + shake, py + h, w * 0.52, h * 0.24, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // eyes peeking out
    ctx.fillStyle = '#dfe8f0';
    ctx.beginPath();
    ctx.arc(cx - 5 + shake, py + h * 0.84, 2.2, 0, Math.PI * 2);
    ctx.arc(cx + 5 + shake, py + h * 0.84, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }
  if (en.kind === 'G') {
    // — big gray bruiser: broad shoulders, dark uniform, tiny head —
    const GRAY = '#68809a', DGRAY = '#46596f', UNI = '#2e3c4e';
    // big flat feet
    ctx.fillStyle = DGRAY;
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.26, py + h - 4 + waddle, w * 0.2, 5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.26, py + h - 4 - waddle, w * 0.2, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // massive torso, wide at the shoulders
    ctx.fillStyle = GRAY;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.48, py + h * 0.24);
    ctx.quadraticCurveTo(cx - w * 0.52, py + h * 0.72, cx - w * 0.3, py + h * 0.92);
    ctx.lineTo(cx + w * 0.3, py + h * 0.92);
    ctx.quadraticCurveTo(cx + w * 0.52, py + h * 0.72, cx + w * 0.48, py + h * 0.24);
    ctx.quadraticCurveTo(cx, py + h * 0.06, cx - w * 0.48, py + h * 0.24);
    ctx.fill();
    // thick arms
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.48, py + h * 0.52 + waddle * 0.5, w * 0.12, h * 0.22, 0.15, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.48, py + h * 0.52 - waddle * 0.5, w * 0.12, h * 0.22, -0.15, 0, Math.PI * 2);
    ctx.fill();
    // dark uniform chest
    ctx.fillStyle = UNI;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.32, py + h * 0.4);
    ctx.lineTo(cx + w * 0.32, py + h * 0.4);
    ctx.lineTo(cx + w * 0.24, py + h * 0.9);
    ctx.lineTo(cx - w * 0.24, py + h * 0.9);
    ctx.closePath();
    ctx.fill();
    // small head sunk into the shoulders
    ctx.fillStyle = GRAY;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.15, w * 0.24, h * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();
    // narrow angry eyes
    ctx.fillStyle = '#dfe8f0';
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.1 + lookX, py + h * 0.14, 3.5, 2.5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.1 + lookX, py + h * 0.14, 3.5, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a2430';
    ctx.beginPath();
    ctx.arc(cx - w * 0.1 + lookX, py + h * 0.14, 1.6, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.1 + lookX, py + h * 0.14, 1.6, 0, Math.PI * 2);
    ctx.fill();
    // blaster when armed (worlds 7+)
    if (en.armed) drawPistol(cx + (lookX > 0 ? w * 0.62 : -w * 0.62), py + h * 0.5, 1, lookX > 0 ? 1 : -1);
    // heavy scowling brows + frown
    ctx.strokeStyle = '#1a2430';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.2, py + h * 0.07);
    ctx.lineTo(cx - w * 0.04, py + h * 0.11);
    ctx.moveTo(cx + w * 0.2, py + h * 0.07);
    ctx.lineTo(cx + w * 0.04, py + h * 0.11);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, py + h * 0.26, w * 0.1, Math.PI * 1.2, Math.PI * 1.8);
    ctx.stroke();
  } else if (en.kind === 'R') {
    // — red trouble-clone: quick and bouncy —
    const RED = '#c94038', DRED = '#7e241f', RBELLY = '#eba89f';
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = DRED;
    // swept-back ears
    for (const s of [-1, 1]) {
      ctx.save();
      ctx.translate(cx + s * 8, py + 6);
      ctx.rotate(s * 1.5);
      ctx.fillStyle = RED;
      ctx.beginPath();
      ctx.ellipse(0, -8, 4.5, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    // body + belly
    ctx.fillStyle = RED;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.58 + waddle * 0.2, w * 0.46, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = RBELLY;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.66, w * 0.26, h * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    // feet
    ctx.fillStyle = RED;
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.2, py + h - 3 + waddle, 6, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.2, py + h - 3 - waddle, 6, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // blaster when armed (worlds 9+)
    if (en.armed) drawPistol(cx + (lookX > 0 ? w * 0.58 : -w * 0.58), py + h * 0.55, 0.8, lookX > 0 ? 1 : -1);
    // wicked yellow eyes
    ctx.fillStyle = '#ffd94d';
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.16 + lookX, py + h * 0.36, 3.4, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.16 + lookX, py + h * 0.36, 3.4, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#26100e';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.37, 1.6, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.37, 1.6, 0, Math.PI * 2);
    ctx.fill();
    // heavy brows + toothy grin
    ctx.strokeStyle = '#4c120e';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.3, py + h * 0.24);
    ctx.lineTo(cx - w * 0.06, py + h * 0.32);
    ctx.moveTo(cx + w * 0.3, py + h * 0.24);
    ctx.lineTo(cx + w * 0.06, py + h * 0.32);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(cx - 7, py + h * 0.52);
    ctx.lineTo(cx - 3, py + h * 0.58);
    ctx.lineTo(cx + 1, py + h * 0.52);
    ctx.lineTo(cx + 5, py + h * 0.58);
    ctx.lineTo(cx + 7, py + h * 0.52);
    ctx.closePath();
    ctx.fill();
  } else if (en.kind === 'B') {
    // — lazy golden clone: chubby, sleepy-eyed, armed with sandwiches —
    const GOLD = '#e0b13e', DGOLD = '#a67c20', GBELLY = '#f2dca4';
    const face = en.face || -1;
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = DGOLD;
    // short round ears
    for (const s of [-1, 1]) {
      ctx.save();
      ctx.translate(cx + s * 9, py + 8);
      ctx.rotate(s * 0.9);
      ctx.fillStyle = GOLD;
      ctx.beginPath();
      ctx.ellipse(0, -5, 4.5, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    // chubby body + big belly
    ctx.fillStyle = GOLD;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.58, w * 0.5, h * 0.44, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = GBELLY;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.68, w * 0.32, h * 0.26, 0, 0, Math.PI * 2);
    ctx.fill();
    // stubby feet
    ctx.fillStyle = GOLD;
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.22, py + h - 3, 6.5, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.22, py + h - 3, 6.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // sleepy half-lidded eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.16 + face * 1.5, py + h * 0.34, 4, 4.5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.16 + face * 1.5, py + h * 0.34, 4, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2b2013';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + face * 2.5, py + h * 0.36, 1.8, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + face * 2.5, py + h * 0.36, 1.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = GOLD;
    ctx.fillRect(cx - w * 0.16 - 5 + face * 1.5, py + h * 0.27, 10, 4);
    ctx.fillRect(cx + w * 0.16 - 5 + face * 1.5, py + h * 0.27, 10, 4);
    // smug little smile
    ctx.strokeStyle = '#6e5210';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(cx + face * 2, py + h * 0.47, 4, 0.4, Math.PI - 0.6);
    ctx.stroke();
    // sandwich in hand, ready to throw
    drawSandwich(cx + face * w * 0.48, py + h * 0.5, 15, face * -0.3);
  } else if (en.kind === '1') {
    // — Babyfier-151: pink fluffball with a curly antenna —
    const PK = '#f2a0c0', DPK = '#c66d92', LT = '#fbd8e6';
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = DPK;
    ctx.fillStyle = PK;
    ctx.beginPath();
    ctx.arc(cx - w * 0.26, py + h * 0.16, w * 0.17, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.26, py + h * 0.16, w * 0.17, 0, Math.PI * 2);
    ctx.fill();
    // curly antenna
    ctx.beginPath();
    ctx.arc(cx + 3, py + 3, 5, Math.PI, Math.PI * 2.6);
    ctx.stroke();
    // fluffy body + tummy
    ctx.fillStyle = PK;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.58 + waddle * 0.2, w * 0.44, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = LT;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.68, w * 0.26, h * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    // little feet
    ctx.fillStyle = DPK;
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.2, py + h - 3 + waddle, 5, 3.5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.2, py + h - 3 - waddle, 5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // big baby eyes with grumpy brows
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.38, 4.5, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.38, 4.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3a2030';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.4, 2.2, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.4, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#a04a70';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.28, py + h * 0.26);
    ctx.lineTo(cx - w * 0.08, py + h * 0.32);
    ctx.moveTo(cx + w * 0.28, py + h * 0.26);
    ctx.lineTo(cx + w * 0.08, py + h * 0.32);
    ctx.stroke();
  } else if (en.kind === '3') {
    // — Amnesio-303: blue memory-wiper with hypno eyes and buzzy wings —
    const BL = '#6db8ff', DBL = '#3a7dc2';
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = DBL;
    const flap = Math.sin(en.frame * 4) * 0.5;
    ctx.fillStyle = 'rgba(220,240,255,0.6)';
    for (const s of [-1, 1]) {
      ctx.save();
      ctx.translate(cx + s * w * 0.3, py + h * 0.3);
      ctx.rotate(s * (0.9 + flap));
      ctx.beginPath();
      ctx.ellipse(0, -8, 4, 11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = BL;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.56 + waddle * 0.2, w * 0.44, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // antennae
    ctx.strokeStyle = DBL;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 5, py + h * 0.2); ctx.lineTo(cx - 9, py + 2);
    ctx.moveTo(cx + 5, py + h * 0.2); ctx.lineTo(cx + 9, py + 2);
    ctx.stroke();
    // hypno-swirl eyes
    for (const s of [-1, 1]) {
      const ex = cx + s * w * 0.17 + lookX, ey = py + h * 0.42;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex, ey, 5.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#26418f';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.arc(ex, ey, 3.4, 0, Math.PI * 1.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ex, ey, 1.5, Math.PI, Math.PI * 2.5);
      ctx.stroke();
    }
    // dizzy little mouth
    ctx.strokeStyle = '#26418f';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(cx, py + h * 0.66, 3, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();
  } else if (en.kind === '2') {
    // — Sample-258: the beat machine with tall ears and a booming mouth —
    const YL = '#f2b035', DYL = '#c2861d';
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = DYL;
    // tall rabbit ears
    ctx.fillStyle = YL;
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(cx + s * w * 0.2, py + 4, 4.5, 12, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    // body
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.6 + waddle * 0.2, w * 0.46, h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // huge open beat-box mouth
    ctx.fillStyle = '#5a2e10';
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.68, w * 0.28, h * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - w * 0.22, py + h * 0.58, w * 0.44, 4);
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.36, 4, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.36, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3a2a10';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.37, 1.8, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.37, 1.8, 0, Math.PI * 2);
    ctx.fill();
    // bouncing music note
    ctx.fillStyle = '#7a4694';
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('♪', cx + w * 0.45, py - 4 + Math.sin(en.frame * 2) * 4);
  } else if (en.kind === '0') {
    // — Fibber-032: small, orange and DANGEROUS (two hearts!) —
    const OR = '#e8703a', DOR = '#a84618';
    // pulsing danger aura
    ctx.strokeStyle = 'rgba(255,70,70,' + (0.3 + Math.sin(en.frame * 2) * 0.15) + ')';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, py + h * 0.5, w * 0.62 + Math.sin(en.frame * 2) * 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1.6;
    ctx.strokeStyle = DOR;
    ctx.fillStyle = OR;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.6 + waddle * 0.2, w * 0.45, h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // stacked head plates
    ctx.fillStyle = DOR;
    ctx.fillRect(cx - w * 0.3, py + h * 0.14, w * 0.6, 5);
    ctx.fillRect(cx - w * 0.22, py + h * 0.05, w * 0.44, 5);
    ctx.fillRect(cx - w * 0.13, py - 3, w * 0.26, 5);
    // angry eyes
    ctx.fillStyle = '#ffe9a8';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.4, 3.6, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.4, 3.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3a1408';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.41, 1.7, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.41, 1.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5c1f0a';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.3, py + h * 0.28);
    ctx.lineTo(cx - w * 0.06, py + h * 0.34);
    ctx.moveTo(cx + w * 0.3, py + h * 0.28);
    ctx.lineTo(cx + w * 0.06, py + h * 0.34);
    ctx.stroke();
    // zigzag mouth
    ctx.strokeStyle = '#5c1f0a';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(cx - 7, py + h * 0.56);
    ctx.lineTo(cx - 3, py + h * 0.52);
    ctx.lineTo(cx + 1, py + h * 0.56);
    ctx.lineTo(cx + 5, py + h * 0.52);
    ctx.lineTo(cx + 7, py + h * 0.56);
    ctx.stroke();
  } else if (en.kind === 'T') {
    // — Mertle: red curls, glasses, freckles and a mighty scream —
    const TSKIN = '#f2c9a4', THAIR = '#c9502e', TDRESS = '#e8d44d';
    const screaming = en.scream > 0;
    if (screaming) {
      ctx.strokeStyle = 'rgba(255,255,255,' + (0.5 + Math.sin(en.frame * 6) * 0.2) + ')';
      ctx.lineWidth = 2;
      const dir2 = lookX > 0 ? 1 : -1;
      for (let ri = 1; ri <= 3; ri++) {
        const rr = 10 + ri * 9 + ((45 - en.scream) % 9);
        ctx.beginPath();
        ctx.arc(cx + dir2 * 8, py + h * 0.3, rr, dir2 > 0 ? -0.6 : Math.PI - 0.6, dir2 > 0 ? 0.6 : Math.PI + 0.6);
        ctx.stroke();
      }
    }
    // legs
    ctx.strokeStyle = TSKIN;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 5, py + h * 0.78); ctx.lineTo(cx - 5 + waddle, py + h - 1);
    ctx.moveTo(cx + 5, py + h * 0.78); ctx.lineTo(cx + 5 - waddle, py + h - 1);
    ctx.stroke();
    // yellow dress
    ctx.fillStyle = TDRESS;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.3, py + h * 0.42);
    ctx.lineTo(cx + w * 0.3, py + h * 0.42);
    ctx.lineTo(cx + w * 0.5, py + h * 0.8);
    ctx.lineTo(cx - w * 0.5, py + h * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#c9b52e';
    ctx.fillRect(cx - w * 0.4, py + h * 0.74, w * 0.8, 3);
    // arms on hips
    ctx.strokeStyle = TSKIN;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.24, py + h * 0.48); ctx.lineTo(cx - w * 0.42, py + h * 0.6);
    ctx.moveTo(cx + w * 0.24, py + h * 0.48); ctx.lineTo(cx + w * 0.42, py + h * 0.6);
    ctx.stroke();
    // head
    ctx.fillStyle = TSKIN;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.26, w * 0.34, h * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    // red curly hair
    ctx.fillStyle = THAIR;
    for (const [hx2, hy2, hr] of [[-0.3, 0.12, 0.16], [0, 0.06, 0.18], [0.3, 0.12, 0.16], [-0.42, 0.26, 0.12], [0.42, 0.26, 0.12]]) {
      ctx.beginPath();
      ctx.arc(cx + w * hx2, py + h * hy2, w * hr, 0, Math.PI * 2);
      ctx.fill();
    }
    // glasses
    ctx.strokeStyle = '#5a4632';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(cx - 5 + lookX, py + h * 0.26, 4.5, 0, Math.PI * 2);
    ctx.moveTo(cx + 9.5 + lookX, py + h * 0.26);
    ctx.arc(cx + 5 + lookX, py + h * 0.26, 4.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#2b2013';
    ctx.beginPath();
    ctx.arc(cx - 5 + lookX, py + h * 0.27, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + 5 + lookX, py + h * 0.27, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // freckles
    ctx.fillStyle = '#d99c66';
    ctx.fillRect(cx - 8, py + h * 0.31, 2, 2);
    ctx.fillRect(cx + 6, py + h * 0.31, 2, 2);
    // mouth: a huge O mid-scream, a pout otherwise
    ctx.fillStyle = '#7a2c20';
    ctx.beginPath();
    if (screaming) ctx.ellipse(cx + lookX, py + h * 0.35, 5, 6.5, 0, 0, Math.PI * 2);
    else ctx.ellipse(cx + lookX, py + h * 0.36, 3, 1.6, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // — small white hamster villain: big pink ears, red eyes, little cape —
    const FUR = '#f4f4f6', PINK = '#f3aec6', CAPE = '#c62f42';
    // cape fluttering behind
    ctx.fillStyle = CAPE;
    ctx.beginPath();
    ctx.moveTo(cx, py + h * 0.3);
    ctx.quadraticCurveTo(cx - w * 0.62 - waddle, py + h * 0.75, cx - w * 0.4, py + h - 1);
    ctx.lineTo(cx + w * 0.4, py + h - 1);
    ctx.quadraticCurveTo(cx + w * 0.62 + waddle, py + h * 0.75, cx, py + h * 0.3);
    ctx.fill();
    // big round ears
    ctx.fillStyle = FUR;
    ctx.beginPath();
    ctx.arc(cx - w * 0.27, py + h * 0.14, w * 0.2, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.27, py + h * 0.14, w * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.arc(cx - w * 0.27, py + h * 0.15, w * 0.11, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.27, py + h * 0.15, w * 0.11, 0, Math.PI * 2);
    ctx.fill();
    // round fluffy body
    ctx.fillStyle = FUR;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.58 + waddle * 0.2, w * 0.42, h * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // little pink feet
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.2, py + h - 3 + waddle, 5, 3.5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + w * 0.2, py + h - 3 - waddle, 5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // beady red eyes
    ctx.fillStyle = '#d8283c';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.44, 3.2, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.44, 3.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a0810';
    ctx.beginPath();
    ctx.arc(cx - w * 0.16 + lookX, py + h * 0.44, 1.4, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.16 + lookX, py + h * 0.44, 1.4, 0, Math.PI * 2);
    ctx.fill();
    // pink nose + whiskers
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(cx, py + h * 0.56, 2.6, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c9c9cf';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(cx - 4, py + h * 0.56); ctx.lineTo(cx - w * 0.45, py + h * 0.5);
    ctx.moveTo(cx - 4, py + h * 0.58); ctx.lineTo(cx - w * 0.45, py + h * 0.62);
    ctx.moveTo(cx + 4, py + h * 0.56); ctx.lineTo(cx + w * 0.45, py + h * 0.5);
    ctx.moveTo(cx + 4, py + h * 0.58); ctx.lineTo(cx + w * 0.45, py + h * 0.62);
    ctx.stroke();
    // grumpy brows
    ctx.strokeStyle = '#7a7a85';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.26, py + h * 0.32);
    ctx.lineTo(cx - w * 0.08, py + h * 0.38);
    ctx.moveTo(cx + w * 0.26, py + h * 0.32);
    ctx.lineTo(cx + w * 0.08, py + h * 0.38);
    ctx.stroke();
  }
  ctx.restore();

  // big teardrops rolling off the squashed hamster (drawn unsquashed)
  if (!en.alive && 'H1'.includes(en.kind)) {
    ctx.fillStyle = '#8fd0ff';
    for (const s of [-1, 1]) {
      const drip = (en.squash * 0.8) % 10;
      ctx.beginPath();
      ctx.ellipse(cx + s * w * 0.24, py + h - 10 + drip, 2.4, 3.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayer() {
  // art is authored for the small hitbox; when big, scale it up anchored at the feet
  const BW = TILE * 0.62, BH = TILE * 0.8;
  const s = player.big ? 1.32 : 1;
  const cx = player.x + player.w / 2;
  const feetY = player.y + player.h;
  const px = cx - BW / 2, py = feetY - BH, w = BW, h = BH;
  ctx.save();
  if (player.facing < 0) {
    ctx.translate(cx, 0);
    ctx.scale(-1, 1);
    ctx.translate(-cx, 0);
  }
  ctx.translate(cx, feetY);
  ctx.scale(s, s);
  ctx.translate(-cx, -feetY);
  const bob = player.onGround && Math.abs(player.vx) > 0.5 ? Math.sin(player.runFrame * 4) * 2 : 0;
  const jumpStretch = !player.onGround ? Math.min(4, Math.abs(player.vy) * 0.3) : 0;
  const legSwing = player.onGround && Math.abs(player.vx) > 0.5 ? Math.sin(player.runFrame * 4) * 6 : 0;

  const BLUE = '#3d7bc9', DARK = '#26508f', BELLY = '#bfe0f4', PINK = '#e88db4';
  const headY = py + h * 0.30 + bob - jumpStretch;
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = DARK;

  // big floppy ears (behind the head), wiggling as he runs
  const earWiggle = Math.sin(player.runFrame * 2) * 0.08;
  for (const s of [-1, 1]) {
    ctx.save();
    ctx.translate(cx + s * 12, headY - 5);
    ctx.rotate(s * (1.15 + earWiggle));
    ctx.fillStyle = BLUE;
    ctx.beginPath();
    ctx.ellipse(0, -11, 6, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(0, -9, 3.2, 8.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // stubby feet
  ctx.fillStyle = BLUE;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.ellipse(cx + s * 7 - s * 0 + (s < 0 ? legSwing : -legSwing) * 0.5, py + h - 5, 7, 5.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  // round fuzzy body
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(cx, py + h * 0.62 + bob, 12.5, h * 0.30, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // light belly patch
  ctx.fillStyle = BELLY;
  ctx.beginPath();
  ctx.ellipse(cx, py + h * 0.66 + bob, 7.5, h * 0.20, 0, 0, Math.PI * 2);
  ctx.fill();

  // extra lower arms once Lilo joins the team
  const armSwing = -legSwing;
  if (player.fast) {
    for (const sgn of [-1, 1]) {
      ctx.save();
      ctx.translate(cx + sgn * 13, py + h * 0.58 + bob);
      ctx.rotate(sgn * 1.25 - sgn * armSwing * 0.05);
      ctx.fillStyle = BLUE;
      ctx.beginPath();
      ctx.ellipse(0, 6, 3.8, 8.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }

  // little arms swinging
  for (const sgn of [-1, 1]) {
    ctx.save();
    ctx.translate(cx + sgn * 12, py + h * 0.52 + bob);
    ctx.rotate(sgn * 0.35 + sgn * armSwing * 0.04);
    ctx.fillStyle = BLUE;
    ctx.beginPath();
    ctx.ellipse(0, 6, 4, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // plasma pistol in his front paw
  if (player.gun) {
    drawPistol(cx + 16, py + h * 0.52 + bob, 0.9, 1);
    if (player.fireAnim) {
      ctx.fillStyle = 'rgba(125,255,138,0.9)';
      ctx.beginPath();
      ctx.arc(cx + 30, py + h * 0.48 + bob, 3 + player.fireAnim, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // wide head
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(cx, headY, 15.5, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // lighter muzzle
  ctx.fillStyle = BELLY;
  ctx.beginPath();
  ctx.ellipse(cx, headY + 4.5, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // big dark teardrop eyes
  ctx.fillStyle = '#14181f';
  for (const s of [-1, 1]) {
    ctx.save();
    ctx.translate(cx + s * 6.2, headY - 1.5);
    ctx.rotate(s * 0.35);
    ctx.beginPath();
    ctx.ellipse(0, 0, 3.6, 5.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // eye glints
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - 5.4, headY - 3, 1.3, 0, Math.PI * 2);
  ctx.arc(cx + 7, headY - 3, 1.3, 0, Math.PI * 2);
  ctx.fill();

  // wide nose
  ctx.fillStyle = '#1b2a45';
  ctx.beginPath();
  ctx.ellipse(cx, headY + 3.8, 4.2, 2.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // big grin
  ctx.strokeStyle = '#1b2a45';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.arc(cx, headY + 5, 6, 0.35, Math.PI - 0.35);
  ctx.stroke();

  ctx.restore();
}

function drawHUD() {
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const pad = Math.max(14, H * 0.02);
  // hearts (Nani can raise the maximum to 5)
  for (let i = 0; i < state.maxLives; i++) {
    ctx.fillStyle = i < state.lives ? '#ff4d6d' : 'rgba(0,0,0,0.25)';
    drawHeart(pad + i * 32, pad + 4, 12);
  }
  // coin count
  const coinX = pad + state.maxLives * 32 + 16;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(coinX, pad + 12, 9, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a017';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  ctx.strokeText('× ' + state.coins, coinX + 18, pad + 2);
  ctx.fillText('× ' + state.coins, coinX + 18, pad + 2);
  // score + level (+ speed boost indicator)
  ctx.textAlign = 'right';
  const label = (player.sleep > 0 ? '💤 ' : '') + (player.hyper > 0 ? '🎵 ' : '') + (player.fast ? '⚡ ' : '') + 'WORLD ' + (state.level + 1) + '   ★ ' + state.score;
  ctx.strokeText(label, W - pad, pad + 2);
  ctx.fillText(label, W - pad, pad + 2);
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.3);
  ctx.bezierCurveTo(x - s, y + s * 0.8, x, y + s * 1.1, x, y + s * 1.4);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.8, x + s, y + s * 0.3);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function drawOverlays() {
  if (state.mode === 'play') return;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';

  const big = Math.min(64, W * 0.09, H * 0.13);
  const small = Math.min(24, W * 0.04, H * 0.06);
  ctx.textBaseline = 'top';
  const y0 = H * 0.32;
  const line1 = y0 + big * 1.4;
  const line2 = line1 + small * 1.8;

  if (state.mode === 'title') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('SUPER JUMPER', W / 2, y0);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + small + 'px -apple-system, sans-serif';
    ctx.fillText('Tap anywhere to start!', W / 2, line1);
    ctx.font = small * 0.8 + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#bbb';
    ctx.fillText('◀ ▶ to run  ·  ⬆ to jump  ·  stomp the baddies  ·  grab coins  ·  reach the flag!', W / 2, line2);
    ctx.font = small * 0.75 + 'px -apple-system, sans-serif';
    ctx.fillText('⌨  arrows / A D to run  ·  SPACE to jump  ·  F to fire  ·  P to pause', W / 2, line2 + small * 1.3);
    // top-3 leaderboard
    const best = loadScores();
    if (best.length) {
      ctx.font = 'bold ' + small * 0.9 + 'px -apple-system, sans-serif';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('🏆 HIGH SCORES 🏆', W / 2, line2 + small * 3);
      ctx.fillStyle = '#fff';
      for (let i = 0; i < Math.min(3, best.length); i++) {
        ctx.fillText((i + 1) + '.  ' + best[i].name + '  —  ' + best[i].score, W / 2, line2 + small * (4.4 + i * 1.4));
      }
    }
  } else if (state.mode === 'paused') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillText('⏸ PAUSED', W / 2, y0);
    ctx.font = 'bold ' + small + 'px -apple-system, sans-serif';
    ctx.fillText('Press P or tap the screen to continue', W / 2, line1);
  } else if (state.mode === 'amnesia') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#6db8ff';
    ctx.fillText('🌀 Amnesio!', W / 2, y0);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + small + 'px -apple-system, sans-serif';
    ctx.fillText('Stitch forgot everything… back to World 3!', W / 2, line1);
  } else if (state.mode === 'dead') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillText('Ouch!', W / 2, y0);
    ctx.font = small + 'px -apple-system, sans-serif';
    ctx.fillText(state.lives > 0 ? 'Try again — you can do it!' : '', W / 2, line1);
  } else if (state.mode === 'levelclear') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('LEVEL CLEAR! ⭐', W / 2, y0);
  } else if (state.mode === 'gameover') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillText('Game Over', W / 2, y0);
    ctx.font = 'bold ' + small + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('Score: ' + state.score, W / 2, line1);
    ctx.fillStyle = '#fff';
    ctx.fillText('Tap to play again!', W / 2, line2);
  } else if (state.mode === 'win') {
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('🏆 YOU WIN! 🏆', W / 2, y0);
    ctx.font = 'bold ' + small + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Score: ' + state.score + '   Coins: ' + state.coins, W / 2, line1);
    ctx.fillText('Tap to play again!', W / 2, line2);
  }
}

// ============ MAIN LOOP ============
loadLevel(0);
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(t) {
  requestAnimationFrame(loop);
  if (!last) last = t;
  acc += Math.min(t - last, 100);
  last = t;
  while (acc >= STEP) {
    update();
    acc -= STEP;
  }
  draw();
}
requestAnimationFrame(loop);
</script>
